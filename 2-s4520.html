{num:"2",title:"Minimum Sipariş Değerini Test Etme",app:"Manage Purchase Orders",path:["Purchase Order Processing","Manage Purchase Orders","Create"],fields:[["Supplier","S520-0##"],["Purchasing Organization","101C"],["Purchasing Group","Z##"],["Company Code","1010"],["Material","A500-##"],["Order Quantity","1"],["Net Order Price","51"],["Plant","1010"]],steps:["<b>Manage Purchase Orders</b> uygulamasını başlatın (tile grubu <b>Purchase Order Processing</b>).","<b>Create</b>'e tıklayın.","Supplier <b>S520-0##</b> girin — iki giriş listelenir; <b>101C satın alma organizasyonu</b> için olanı seçin. Purchasing group ve company code otomatik dolar.","<b>Items</b> sekmesine tıklayın.","<b>Items</b> bölümünde <b>Create</b>'e tıklayın; tablodaki item verilerini girin ve <b>Enter</b>'a basın.","Ekranın sol altındaki <b>(Messages)</b> ikonuna tıklayın.","Mesajı not edin ve kaydetmeden uygulamayı <b>Discard Draft</b> → <b>Discard</b> ile kapatın."],info:null,warn:null,result:"Uyarı mesajı: 'Order value 49,00 EUR below minimum order value.'"},

]},

{num:"1",title:"Task 1 – S520-0## İçin OA Partner Rolü Atama",app:"Manage Supplier Master Data",path:["Supplier and BP","Manage Supplier Master Data"],fields:[["Business Partner","S520-0##"],["Purchasing Organization","101C"],["Partner Role","OA (Ordering Address)"],["Partner Number","T-S52A##"]],steps:["<b>Manage Supplier Master Data</b> uygulamasını başlatın (tile grubu <b>Supplier and BP</b>).","<b>S520-0##</b> girin ve <b>Go</b>'ya tıklayın.","S520-0## satırında sağdaki <b>arrow</b>'a tıklayın.","<b>Edit</b>'e tıklayın.","<b>Purchasing Organizations</b> bölümünde 101C satırında sağdaki <b>arrow</b>'a tıklayın.","Purchasing Organization penceresinde <b>Partner Functions</b> sekmesine tıklayın.","<b>Create</b>'e tıklayın; Partner role <b>OA</b>, Partner number <b>T-S52A##</b> girin.","<b>Apply</b> ve ardından <b>Save</b>'e tıklayın."],info:null,warn:null,result:null},
{num:"2",title:"Task 1 – OA Partnerinin PO'da Otomatik Belirlenmesini Kontrol Etme",app:"Manage Purchase Orders",path:["Purchase Order Processing","Manage Purchase Orders","Create"],fields:[["Supplier","S520-0## (101C için)"],["Partner sekmesi","T-S52A## — Role BA (OA = Ordering Address)"]],steps:["<b>Manage Purchase Orders</b> uygulamasını başlatın.","<b>Create</b>'e tıklayın.","Supplier <b>S520-0##</b>'yi <b>101C purchasing organization</b> için girin ve <b>Enter</b>'a basın.","<b>Partner</b> sekmesine tıklayın.","Kaydetmeden uygulamadan çıkın."],info:null,warn:null,result:"T-S52A## partner olarak role BA (OA = Ordering Address) ile görüntülenir."},
{num:"3",title:"Task 2 – Account Group ve Partner Şeması Analizi",app:"SAP GUI – XK03 / SPRO",path:["Logistics","Materials Management","Purchasing","Master Data","Vendor","Central","Display (XK03)"],fields:[["T-S52A## Account Group","SUPL (Supplier (FI Vendor; a-z))"],["S520-0## Account Group","SUPL"],["SUPL Account Group Partner Şeması","SUPL"],["SUPL Şemasındaki Partner Fonksiyonları","AD, CP, AZ, OA, VN, PI, CA, GS, ER"],["PO Doküman Tipi NB Partner Şeması","0002"],["0002 Şemasında OA","Evet — mevcut"]],steps:["SAP Easy Access'te <b>Logistics → Materials Management → Purchasing → Master Data → Vendor → Central → Display (XK03)</b>'e gidin.","Supplier <b>T-S52A##</b>, <b>Address</b> checkbox'ını seçin ve <b>Enter</b>'a basın.","<b>Vendor: General Data</b> sekmesinde: Account group <b>SUPL</b> olduğunu görün.","S520-0## için aynı adımları tekrarlayın — aynı account group.","<b>SPRO → SAP Reference IMG → Materials Management → Purchasing → Partner Determination → Partner Roles → Define Permissible Partner Roles per Account Group</b>'a gidin.","CPD, EMPL ve SUPL hesap gruplarının OA partner rolünü üstlenebileceğini görün.","<b>Partner Settings in Supplier Master Record → Assign Partner Schemas to Account Groups</b>: SUPL account group → SUPL şeması.","<b>Partner Settings in Supplier Master Record → Define Partner Schemas in Supplier Master Record</b>: SUPL şemasında listedeki fonksiyonları görün.","<b>Partner Settings in Purchasing Documents → Assign Partner Schemas to Document Types</b>: NB → 0002 şeması.","<b>Define Partner Schemas in Purchasing Documents</b>: 0002 şemasında OA mevcut."],info:null,warn:null,result:null}
]},

{num:"1",title:"BRFplus Output Control'ün Aktif Olduğunu Doğrulama",app:"SAP GUI – SPRO",path:["SPRO","SAP Reference IMG","Cross Application Components","Output Control","Manage Application Object Type Activation"],fields:[["Purchase Order Status","Application Active (olmalı)"]],steps:["SAP Easy Access'te <b>SPRO</b> girin → <b>SAP Reference IMG</b>.","<b>Cross Application Components → Output Control → Manage Application Object Type Activation</b>'a gidin.","<b>Purchase Order</b> için status <b>Application Active</b> olmalıdır; değilse değiştirin ve kaydedin."],info:"Bu adım isteğe bağlı egzersizdir.",warn:null,result:null},
{num:"2",title:"T-S52A## İçin Email Adresini Doğrulama",app:"Manage Supplier Master Data",path:["Supplier and BP","Manage Supplier Master Data"],fields:[["Business Partner","T-S52A##"],["Email Adresi","info##@etf-parts.com (Standard Communication)"]],steps:["<b>Manage Supplier Master Data</b> uygulamasını başlatın.","<b>T-S52A##</b> girin ve <b>Go</b>'ya tıklayın.","T-S52A## satırında sağdaki <b>arrow</b>'a tıklayın.","<b>Address</b> sekmesine tıklayın.","<b>Standard Communication</b> alanında email adresini kontrol edin: <b>info##@etf-parts.com</b>."],info:null,warn:null,result:null},
{num:"3",title:"Output Parameter Determination İçin Yeni İş Kuralı Oluşturma",app:"Output Parameter Determination",path:["S4520 tile group","Output Parameter Determination"],fields:[["Show Rules for","Purchase Order"],["Determination Step","Channel"],["Output Type","PURCHASE_ORDER"],["Document Type","FO"],["Role","BA"],["Recipient","T-S52A##"],["Channel","EMAIL"],["Exclusive Indicator","- (false)"]],steps:["SAP Fiori Launchpad'de <b>Output Parameter Determination</b> uygulamasını başlatın (tile grubu <b>S4520</b>).","<b>Select Business Rules</b> bölümünde: Show Rules for → <b>Purchase Order</b>, Determination Step → <b>Channel</b>.","<b>Maintain Business Rules</b> bölümünde <b>Edit</b>'e tıklayın.","Tablonun sol üstündeki <b>plus ikonu</b>'na tıklayarak yeni giriş ekleyin.","Her alan için <b>arrow</b>'a tıklayın → <b>Direct Value Input</b> → değeri girin → <b>OK</b>.","Tablodaki tüm değerleri girin.","<b>Activate</b>'e tıklayın ve aktivasyon mesajını <b>Yes</b> ile onaylayın."],info:null,warn:"Tüm alanları görmüyorsanız önce aşağı, ardından tabloda sağa kaydırın.",result:null},
{num:"4",title:"Ek Mesajın Oluşturulduğunu Kontrol Etme",app:"Create Purchase Order – Advanced",path:["Purchase Order Processing","Create Purchase Order – Advanced"],fields:[["Purchasing Document Type","FO (Framework Order)"],["Supplier","S520-0##"],["Purchasing Organization","101C"],["Purchasing Group","Z##"]],steps:["SAP Fiori Launchpad'de <b>Create Purchase Order – Advanced</b> uygulamasını başlatın (tile grubu <b>Purchase Order Processing</b>).","Purchasing document type <b>FO</b>'yu seçin.","Supplier <b>S520-0##</b>, purchasing organization <b>101C</b>, purchasing group <b>Z##</b> girin ve <b>Enter</b>'a basın.","<b>Print Preview</b> butonuna tıklayın.","Kaydetmeden uygulamadan çıkın."],info:null,warn:null,result:"Edit Purchase Order: Output penceresinde PURCHASE_ORDER output type için iki giriş görünür: (1) Role BA, receiver T-S52A##, channel EMAIL. (2) Role LF, receiver S4520-0##, channel PRINT."}
]}

{unit:2,title:"Sources of Supply and Conditions",ex:[
{id:7,title:"Examine Condition Types and Calculation Schemas",app:"SAP GUI – ME21N / SPRO",sc:"PO kalemlerine ek koşullar (indirim/ek ücret) girmek istiyorsunuz. Hesaplama şemasını inceleyeceksiniz.",tasks:[
{num:"1",title:"Koşul Tipli PO Oluşturma",app:"SAP GUI – ME21N",path:["Logistics","Materials Management","Purchasing","Purchase Order","Create","Vendor/Supplying Plant Known (ME21N)"],fields:[["Supplier","T-S50A##"],["Purchasing Organization","101C"],["Purchasing Group","Z##"],["Item 1: Material","B500-##"],["Item 1: PO Quantity","1 PC"],["Item 1: Plant","1010"],["Item 1: Condition Type","ZC00 (Surcharge/Quantity) — EUR 60"],["Item 1: Ek Koşul","RA00 (Discount % on Net) — 10%"],["Item 2: Kopyalandı","Item 1'den"],["Item 2: Ek Koşul","RA01 (Discount % on Gross) — 10%"]],steps:["SAP Easy Access: <b>Logistics → Materials Management → Purchasing → Purchase Order → Create → Vendor/Supplying Plant Known (ME21N)</b>.","Header ve Item 1 verilerini girin.","ZC00 koşulunu eklemek için Item Overview'da Item 1'in Net Price'ını çift tıklayın — Item Details'ta Conditions sekmesi açılır. Condition type <b>ZC00</b>, amount <b>60</b> girin.","Item Overview'da Item 1'i seçin ve <b>(Copy Item)</b>'a tıklayın.","Item 1'e ek koşul ekleyin: <b>RA00</b>, amount <b>10</b>%.","Item 2'ye ek koşul ekleyin: <b>RA01</b>, amount <b>10</b>%.","Henüz kaydetmeyin — sonraki adımı önce tamamlayın."],info:null,warn:null,result:null},
{num:"2",title:"Net Fiyat ve Koşul Değeri Analizi — Hesaplama Şeması",app:"SAP GUI – ME21N",path:["ME21N","Item Details","Conditions Tab","Analysis"],fields:[["Item 1: Net Price","450 EUR"],["Item 1: RA00 koşul değeri","50 EUR"],["Item 2: Net Price","456 EUR"],["Item 2: RA01 koşul değeri","44 EUR"],["Hesaplama Şeması","RM0000"]],steps:["Item Overview'da net fiyatları direkt görün.","Her kalem için koşul tutarını EUR cinsinden görmek için item koşul detaylarını açın — <b>Conditions Value</b> kolonuna bakın.","Hesaplama şemasını belirlemek için Conditions sekmesinde <b>Analysis</b> butonuna tıklayın — sol üstte <b>RM0000</b> görünür.","PO'yu kaydedin."],info:"Item 1 (RA00): Net = 450 EUR, koşul = 50 EUR | Item 2 (RA01): Net = 456 EUR, koşul = 44 EUR | Şema: RM0000",warn:null,result:null},
{num:"3",title:"RM0000 Hesaplama Şemasını Customizing'de İnceleme",app:"SAP GUI – SPRO",path:["Materials Management Customizing","Purchasing","Conditions","Define Price Determination Process","Set Calculation Schema – Purchasing"],fields:[["RA01 From Step","Step 1 (PB00 — sadece gross fiyattan hesaplar)"],["RA00 From Step","Yok — gross + ek ücret dahil hesaplar"],["Fark nedeni","RA00: 10% × 500 EUR (440+60) = 50 EUR | RA01: 10% × 440 EUR = 44 EUR"]],steps:["Customizing'de <b>Materials Management → Purchasing → Conditions → Define Price Determination Process → Set Calculation Schema – Purchasing</b>'e gidin.","<b>RM0000</b> şemasını seçin.","Dialog Structure'da <b>Control data</b>'yı çift tıklayın.","RA00 ve RA01 koşul tiplerinin girişlerine bakın: RA01'in From Step kolonunda <b>1 (PB00)</b> yazıyor — yalnızca gross fiyattan hesaplar. RA00'ın From Step'i boş — gross + ek ücretle birlikte hesaplar."],info:"RA01 sadece gross fiyat üzerinden indirir (10% × 440 = 44 EUR). RA00 ise gross + ZC00 ek ücretini birlikte alır (10% × 500 = 50 EUR). PO'daki koşun sırası step numarasına göre; step aynıysa giriş sırasına göre dizilir.",warn:null,result:null}
]},
{id:8,title:"Create a Purchasing Info Record",app:"Manage Purchasing Info Records",sc:"Belirli malzemeleri aynı tedarikçiden düzenli olarak satın alıyorsunuz. Bilgi kaydı oluşturacaksınız.",tasks:[

]},
{id:9,title:"Create Texts in Info Records",app:"Create Purchasing Info Record / Manage Purchase Orders",sc:"Satın alma bilgi kayıtlarında metin yönetmek istiyorsunuz. Plant'a özgü ve genel info record'lar oluşturacaksınız.",tasks:[
{num:"1",title:"Plant 1010 İçin Plant-Spesifik Info Record (Metinli)",app:"Create Purchasing Info Record",path:["Source of Supply Management","Create Purchasing Info Record"],fields:[["Supplier","S520-0##"],["Material","B520-1##"],["Purchasing Organization","101C"],["Plant","1010"],["Pl. Deliv. Time","15"],["Purch. Group","Z##"],["Standard Qty","25"],["Net Price","EUR 3,000 / PC"],["No MText","X (Seçili — Sadece info record metni kullanılsın)"],["Purchase Order Text","European Origin guaranteed"]],steps:["SAP Fiori Launchpad'de <b>Create Purchasing Info Record</b> uygulamasını başlatın (tile grubu <b>Source of Supply Management</b>).","Supplier <b>S520-0##</b>, Material <b>B520-1##</b>, Purchasing Organization <b>101C</b>, Plant <b>1010</b> girin.","<b>Enter</b>'a basın.","<b>Purch. Org. Data 1</b> butonuna tıklayın.","Planned delivery time <b>15</b>, Standard quantity <b>25</b>, Net price <b>3000</b> girin.","Info record metninin malzeme ana kaydı metnini geçersiz kılması için <b>No MText</b> checkbox'ını seçin.","<b>Texts</b> butonuna tıklayın.","<b>Purchase Order Text</b> bölümüne <b>European Origin guaranteed</b> metnini ekleyin.","<b>Save</b>'e tıklayın."],info:null,warn:"Manage Purchasing Info Records uygulaması mevcut sürümde metin yönetimini desteklemez. Create Purchasing Info Record uygulamasını veya ME11 işlemini kullanın.",result:null},
{num:"2",title:"Genel Info Record Oluşturma (Plant Olmadan)",app:"Create Purchasing Info Record",path:["Source of Supply Management","Create Purchasing Info Record"],fields:[["Supplier","S520-0##"],["Material","B520-1##"],["Purchasing Organization","101C"],["Plant","Boş bırakın"],["Pl. Deliv. Time","15"],["Purch. Group","Z##"],["Standard Qty","25"],["Net Price","EUR 2,850 / PC"]],steps:["<b>Create Purchasing Info Record</b> uygulamasını başlatın.","Supplier <b>S520-0##</b>, Material <b>B520-1##</b>, Purchasing Organization <b>101C</b> girin.","<b>Plant</b> alanını boş bırakın; <b>Enter</b>'a basın.","<b>Purch. Org. Data 1</b>'e tıklayın.","Delivery time <b>15</b>, Standard qty <b>25</b>, Net price <b>2850</b> girin.","<b>Save</b>'e tıklayın."],info:null,warn:null,result:null},
{num:"3",title:"PO Oluşturma ve Koşul/Metin Kontrolü",app:"Manage Purchase Orders",path:["Purchase Order Processing","Manage Purchase Orders","Create"],fields:[["Supplier","S520-0##"],["Purch. Org.","101C"],["Purch. Group","Z##"],["Company Code","1010"],["Item 10: Material/Plant/Qty","B520-1## / 1010 / 50 PC → Fiyat: EUR 3,000"],["Item 20: Material/Plant/Qty","B520-1## / 1020 / 50 PC → Fiyat: EUR 2,850"],["Item 10 Info Record PO Text","European Origin guaranteed (info record metni — malzeme metni yok)"],["Item 20 Material PO Text","Malzeme ana kaydı metni (info record metni yok)"]],steps:["<b>Manage Purchase Orders</b> uygulamasını başlatın.","<b>Create</b>'e tıklayın.","Supplier <b>S520-0##</b>, Purchasing Organization <b>101C</b> girin — purchasing group ve company code otomatik dolar.","<b>Items</b> bölümünde iki kez <b>Create</b>'e tıklayın.","Item 10: Material <b>B520-1##</b>, Plant <b>1010</b>, qty <b>50</b>.","Item 20: Material <b>B520-1##</b>, Plant <b>1020</b>, qty <b>50</b>.","<b>Enter</b>'a basın.","Item detaylarını açmak için kalem satırına tıklayın; <b>Notes</b> sekmesinde metinleri kontrol edin.","Önceki/sonraki oklarla kalemler arasında gezinin.","<b>Apply</b>'a tıklayın, ardından <b>Order</b>'a tıklayın."],info:null,warn:null,result:"Item 10 (Plant 1010): EUR 3,000 fiyat belirlenir. Info record PO text: 'European Origin guaranteed'. Material PO Text yok. | Item 20 (Plant 1020): EUR 2,850 fiyat belirlenir. Sadece material master'dan PO text; info record metni yok."}

{unit:4,title:"Purchasing Optimization",ex:[
{id:25,title:"Assign and Process Purchase Requisitions",app:"Assign and Process Purchase Requisitions",sc:"Atanmamış satın alma taleplerini kaynak belirleme ve RFQ işlemiyle işleyeceksiniz.",tasks:[
{num:"1",title:"Toplu Kaynak Atama ve Takip Belge Oluşturma",app:"Assign and Process Purchase Requisitions",path:["S4520 tile group","Assign and Process Purchase Requisitions"],fields:[["Purchasing Group","Z##"],["Released Requisitions Only","X (Seçili)"]],steps:["SAP Fiori Launchpad'de <b>Assign and Process Purchase Requisitions</b> uygulamasını başlatın (tile grubu <b>S4520</b>).","Purchasing Group <b>Z##</b> girin; <b>Released Requisitions Only</b> checkbox'ını seçin; <b>Execute</b>.","Gerekirse item overview'u genişletin.","Tüm kalemleri seçin (<b>Select All</b>) ve <b>(Assign Source of Supply)</b>'a tıklayın.","İkon anlamları: Yeşil ışık = benzersiz kaynak atandı | Gri arka plan ok = birden fazla kaynak | Renkli arka plan ok = manuel atama yapıldı | İkon yok = kaynak bulunamadı.","Kaynak bulunamayan kalem varsa: Kalemi seçin; <b>(RFQ with Vendor)</b>'a tıklayın. Birinci satıra S520-0## ve 101C, ikinci satıra S520-1## ve 101C girin; <b>(Adopt)</b>.","<b>Save</b>'e tıklayın.","<b>Requests for Quotations</b> sekmesini açın; RFQ oluşturmak için bir satır seçin; <b>(Create RFQs)</b>; teklif son tarihi <b>bugün + 1 hafta</b>; RFQ'yu kaydedin.","<b>Assignments</b> sekmesinde PO oluşturmak için bir satır seçin; <b>(Create purchase order)</b>; PO'yu kaydedin."],info:"Sources of Supply sembol anlamları: Yeşil ışık = Assigned Source | Gri ok = Sources of Supply (birden fazla) | Renkli ok = Sources of Supply (assigned, manuel)",warn:null,result:null}
]},
{id:26,title:"Process Assigned Purchase Requisitions",app:"Create Purchase Order via Purchase Requisition Assignment List / Create Purchase Order – Advanced",sc:"Atanmış satın alma taleplerini atama listesi ve belge genel görünümü ile işleyeceksiniz.",tasks:[

]},

const UC=['u1','u2','u3','u4','u5','u6','u7','u8','u9'];

function path(a){if(!a||!a.length)return'';return'<div class="pr">'+a.map((p,i)=>`<span class="pc">${p}</span>${i<a.length-1?'<span class="pa">›</span>':''}`).join('')+'</div>';}

function tbl(f){if(!f||!f.length)return'';return'<table class="fvt"><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>'+f.map(([a,b])=>`<tr><td>${a}</td><td>${b}</td></tr>`).join('')+'</tbody></table>';}

function steps(s){if(!s||!s.length)return'';return'<ol class="sl">'+s.map(x=>`<li><span></span>${x}</li>`).join('')+'</ol>';}

function task(t){
let h=`<div class="task"><div class="thdiv"><span class="tn">Adım ${t.num}</span><span class="tt">${t.title}</span>${t.app?`<span class="ab">${t.app}</span>`:''}</div>`;
h+=path(t.path);
h+=tbl(t.fields);
h+=steps(t.steps);
if(t.info)h+=`<div class="box info"><span class="bi">ℹ</span><div>${t.info}</div></div>`;
if(t.warn)h+=`<div class="box warn"><span class="bi">⚠</span><div>${t.warn}</div></div>`;
if(t.result)h+=`<div class="box result"><span class="bi">✓</span><div>${t.result}</div></div>`;
h+=`</div>`;
return h;
}

function card(e,uid){
let html=`<div class="card" id="ex${e.id}" data-u="${uid}">`;
html+=`<div class="ch" onclick="toggle(this)"><span class="exn">${e.id}</span><div class="cl"><div class="ct">${e.title}</div><div class="ca">${e.app}</div></div><div class="cr"><span class="sb">${e.tasks.length} Adım</span><span class="chev">›</span></div></div>`;
html+=`<div class="cb">`;
if(e.sc)html+=`<div class="scenario">${e.sc}</div>`;
e.tasks.forEach(t=>html+=task(t));
html+=`</div></div>`;
return html;
}

function unit(u,i){
const uid=`u${u.unit}`;
const colors=['#06b6d4','#a855f7','#60a5fa','#f59e0b','#22c55e','#ef4444','#fbbf24','#34d399','#818cf8'];
let h=`<div class="ug ${uid}" id="${uid}"><div class="uh"><span class="ubadge" style="border-color:${colors[i]}30;color:${colors[i]};background:${colors[i]}18">Unit ${u.unit}</span><span class="utitle">${u.title}</span><span class="uc">${u.ex.length} egzersiz</span></div>`;
u.ex.forEach(e=>h+=card(e,uid));
h+=`</div>`;
return h;
}

// ── RENDER ──
const app=document.getElementById('app');
const frow=document.getElementById('frow');
const cnt=document.getElementById('cnt');
const TOTAL=D.reduce((a,u)=>a+u.ex.length,0);
cnt.textContent=TOTAL;

D.forEach((u,i)=>{
app.innerHTML+=unit(u,i);
const b=document.createElement('button');
b.className='fb';b.dataset.u=`u${u.unit}`;
b.textContent=`U${u.unit}: ${u.title.length>22?u.title.slice(0,22)+'…':u.title}`;
frow.appendChild(b);
});

function toggle(h){
const c=h.parentElement;
c.classList.toggle('open');
}

// Search
let term='',filterU='all';
const srch=document.getElementById('search');
const clr=document.getElementById('clr');
const nores=document.getElementById('nores');
const xpb=document.getElementById('xpb');
let allOpen=false;

function hl(t,q){
if(!q)return t;
const r=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
return t.replace(r,'<mark>$1</mark>');
}

function run(){
const q=term.toLowerCase().trim();
let vis=0;

document.querySelectorAll('.ug').forEach(ug=>{
const uid=ug.id;
const uMatch=filterU==='all'||filterU===uid;
let uVis=false;

ug.querySelectorAll('.card').forEach(card=>{
if(!uMatch){card.classList.add('hid');return;}
const raw=card.querySelector('.ch').textContent+card.querySelector('.cb').innerHTML;
const m=!q||raw.toLowerCase().includes(q);
if(m){card.classList.remove('hid');vis++;uVis=true;}
else{card.classList.add('hid');}
});

ug.classList.toggle('hid',!uVis||!uMatch);
});

cnt.textContent=vis||(!q&&filterU==='all'?TOTAL:vis);
nores.style.display=(vis===0&&(q||filterU!=='all'))?'block':'none';
clr.style.display=q?'inline':'none';
}

srch.addEventListener('input',e=>{term=e.target.value;run();});
srch.addEventListener('keydown',e=>{if(e.key==='Escape'){term='';srch.value='';run();}});
clr.addEventListener('click',()=>{term='';srch.value='';run();srch.focus();});

frow.addEventListener('click',e=>{
const b=e.target.closest('.fb');
if(!b)return;
filterU=b.dataset.u;
document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
b.classList.add('on');
run();
});
document.querySelector('.fb[data-u="all"]').classList.add('on');

xpb.addEventListener('click',()=>{
allOpen=!allOpen;
document.querySelectorAll('.card:not(.hid)').forEach(c=>c.classList.toggle('open',allOpen));
xpb.textContent=allOpen?'Tümünü Kapat':'Tümünü Aç';
xpb.classList.toggle('active',allOpen);
});
</script>
</body>
</html>
