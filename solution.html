<head>

<meta name="description" content="SAP IEE2E End-to-End Solution Tree — 56 egzersiz, 5 unit">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SAP IEE2E">

<style>
:root {
  --bg: #0f172a;
  --surface: #1e293b;
  --surface2: #263447;
  --border: #334155;
  --border2: #1e293b;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --accent: #38bdf8;
  --ok: #34d399;
  --ok-bg: rgba(52,211,153,0.08);
  --ok-border: rgba(52,211,153,0.25);
  --warn: #fbbf24;
  --warn-bg: rgba(251,191,36,0.08);
  --warn-border: rgba(251,191,36,0.25);
  --info: #818cf8;
  --info-bg: rgba(129,140,248,0.08);
  --info-border: rgba(129,140,248,0.25);
  --radius: 8px;
  --radius-sm: 5px;
}
*{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'IBM Plex Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
  min-height:100vh;
  font-size:14px;
  line-height:1.6;
}
/* HEADER */
.app-header{
  position:sticky;top:0;z-index:100;
  background:rgba(15,23,42,0.95);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:12px 16px;
}
.header-top{
  display:flex;align-items:center;gap:10px;margin-bottom:10px;
}
.app-logo{
  font-family:'IBM Plex Mono',monospace;
  font-size:13px;font-weight:500;
  color:var(--accent);
  letter-spacing:0.05em;
  white-space:nowrap;
}
.app-subtitle{
  font-size:11px;color:var(--text3);
  flex:1;
}
.ex-counter{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;color:var(--text3);
  background:var(--surface);
  padding:3px 8px;border-radius:20px;
  border:1px solid var(--border);
  white-space:nowrap;
}
/* SEARCH */
.search-wrap{position:relative;margin-bottom:8px}
.search-icon{
  position:absolute;left:10px;top:50%;transform:translateY(-50%);
  font-size:13px;color:var(--text3);pointer-events:none;
}
.search-bar{
  width:100%;
  padding:8px 12px 8px 32px;
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:var(--radius);
  color:var(--text);
  font-family:'IBM Plex Sans',sans-serif;
  font-size:13px;
  outline:none;
  transition:border-color .2s;
}
.search-bar::placeholder{color:var(--text3)}
.search-bar:focus{border-color:var(--accent)}
/* FILTERS */
.filters{display:flex;gap:6px;flex-wrap:wrap}
.fb{
  padding:4px 10px;
  border:1px solid var(--border);
  border-radius:20px;
  background:transparent;
  font-size:11px;
  font-family:'IBM Plex Sans',sans-serif;
  color:var(--text2);
  cursor:pointer;
  transition:all .15s;
  white-space:nowrap;
}
.fb:hover{border-color:var(--text2);color:var(--text)}
.fb.active{border-color:var(--accent);color:var(--accent);background:rgba(56,189,248,0.08)}
/* MAIN */
.main{padding:12px 16px 40px}
/* UNIT BLOCK */
.unit-block{margin-bottom:16px}
.unit-hdr{
  display:flex;align-items:center;gap:8px;
  padding:8px 12px;
  border-radius:var(--radius);
  cursor:pointer;
  user-select:none;
  margin-bottom:6px;
  transition:opacity .15s;
}
.unit-hdr:hover{opacity:.85}
.unit-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.unit-lbl{
  font-family:'IBM Plex Mono',monospace;
  font-size:12px;font-weight:500;flex:1;
}
.unit-cnt{font-size:11px;opacity:.6}
.unit-chev{font-size:14px;opacity:.5;transition:transform .2s;flex-shrink:0}
.unit-chev.open{transform:rotate(90deg)}
.unit-body{
  padding-left:14px;
  border-left:1px solid var(--border);
  margin-left:7px;
}
/* EX CARD */
.ex-card{
  border:1px solid var(--border);
  border-radius:var(--radius);
  background:var(--surface);
  margin-bottom:6px;
  overflow:hidden;
  transition:border-color .15s;
}
.ex-card:hover{border-color:var(--border2)}
.ex-card-hdr{
  display:flex;align-items:center;gap:10px;
  padding:10px 12px;
  cursor:pointer;
  user-select:none;
}
.ex-card-hdr:hover{background:rgba(255,255,255,0.02)}
.ex-num{
  font-family:'IBM Plex Mono',monospace;
  font-size:11px;font-weight:500;
  padding:3px 7px;border-radius:var(--radius-sm);
  flex-shrink:0;min-width:38px;text-align:center;
}
.ex-title-block{flex:1;min-width:0}
.ex-title{
  font-size:13px;font-weight:500;
  color:var(--text);
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
}
.ex-app{
  font-size:11px;color:var(--text3);margin-top:1px;
  white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  font-family:'IBM Plex Mono',monospace;
}
.ex-tc{
  font-size:10px;
  padding:2px 7px;border-radius:20px;
  background:var(--surface2);
  color:var(--text3);
  border:1px solid var(--border);
  white-space:nowrap;flex-shrink:0;
  font-family:'IBM Plex Mono',monospace;
}
.ex-chev{font-size:14px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.ex-chev.open{transform:rotate(90deg)}
/* EX BODY */
.ex-body{display:none;padding:0 12px 12px}
.ex-body.open{display:block}
.goal-row{
  padding:8px 10px;
  background:var(--surface2);
  border-radius:var(--radius-sm);
  margin-bottom:10px;
  font-size:12px;color:var(--text2);line-height:1.6;
  border-left:2px solid var(--border);
}
/* TASK */
.task-block{
  margin-bottom:6px;
  border:1px solid var(--border);
  border-radius:var(--radius-sm);
  overflow:hidden;
}
.task-hdr{
  display:flex;align-items:center;gap:8px;
  padding:7px 10px;
  background:var(--surface2);
  cursor:pointer;user-select:none;
  transition:background .15s;
}
.task-hdr:hover{background:rgba(255,255,255,0.04)}
.task-num{
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;font-weight:500;
  padding:2px 6px;border-radius:4px;flex-shrink:0;
}
.task-action{font-size:12px;font-weight:500;color:var(--text);flex:1}
.task-app-badge{
  font-size:10px;font-family:'IBM Plex Mono',monospace;
  padding:2px 6px;
  background:rgba(56,189,248,0.1);
  color:var(--accent);
  border-radius:4px;flex-shrink:0;
  max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.task-chev{font-size:12px;color:var(--text3);transition:transform .2s;flex-shrink:0}
.task-chev.open{transform:rotate(90deg)}
.task-body{display:none;padding:10px}
.task-body.open{display:block}
/* PATH */
.path-row{
  display:flex;align-items:center;gap:4px;flex-wrap:wrap;
  margin-bottom:8px;padding:5px 8px;
  background:rgba(15,23,42,0.5);
  border-radius:var(--radius-sm);
  border:1px solid var(--border);
}
.path-lbl{
  font-size:10px;color:var(--text3);
  font-family:'IBM Plex Mono',monospace;
  font-weight:500;margin-right:2px;flex-shrink:0;
}
.path-chip{
  font-size:11px;font-weight:500;
  padding:1px 6px;border-radius:3px;
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text2);white-space:nowrap;
  font-family:'IBM Plex Mono',monospace;
}
.path-arr{font-size:10px;color:var(--text3)}
/* DATA TABLE */
.dt{
  width:100%;border-collapse:collapse;
  font-size:11px;margin-bottom:8px;
  border-radius:var(--radius-sm);overflow:hidden;
}
.dt th{
  text-align:left;padding:5px 8px;
  background:rgba(15,23,42,0.6);
  color:var(--text3);font-weight:500;
  border-bottom:1px solid var(--border);
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;letter-spacing:0.05em;text-transform:uppercase;
}
.dt td{
  padding:4px 8px;
  border-bottom:1px solid rgba(51,65,85,0.5);
  color:var(--text2);
  vertical-align:top;
}
.dt td:first-child{
  color:var(--text3);width:42%;
  font-family:'IBM Plex Mono',monospace;font-size:11px;
}
.dt td strong{color:var(--text);font-weight:500}
.dt tr:last-child td{border-bottom:none}
/* STEPS */
.sl{list-style:none}
.si{display:flex;gap:8px;margin-bottom:6px;align-items:flex-start}
.sd{
  width:18px;height:18px;border-radius:50%;
  font-family:'IBM Plex Mono',monospace;
  font-size:10px;font-weight:500;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;margin-top:1px;
}
.st{font-size:12px;color:var(--text2);line-height:1.65;flex:1}
.st strong{color:var(--text);font-weight:500}
/* SUBSTEPS */
.subl{list-style:none;margin-top:4px;padding-left:2px}
.subi{display:flex;gap:6px;margin-bottom:3px;align-items:flex-start}
.subd{
  width:4px;height:4px;border-radius:50%;
  background:var(--border);flex-shrink:0;margin-top:8px;
}
.subt{font-size:11px;color:var(--text3);line-height:1.5}
/* BOXES */
.warn-box{
  background:var(--warn-bg);border-left:2px solid var(--warn-border);
  padding:5px 9px;font-size:11px;color:var(--warn);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-top:5px;
}
.info-box{
  background:var(--info-bg);border-left:2px solid var(--info-border);
  padding:5px 9px;font-size:11px;color:var(--info);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-top:5px;
}
.ok-box{
  background:var(--ok-bg);border-left:2px solid var(--ok-border);
  padding:5px 9px;font-size:11px;color:var(--ok);
  border-radius:0 var(--radius-sm) var(--radius-sm) 0;margin-top:5px;
}
/* NO RESULTS */
.no-res{
  text-align:center;padding:3rem 1rem;
  color:var(--text3);font-size:13px;
  font-family:'IBM Plex Mono',monospace;
}
/* SCROLLBAR */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}
</style>
</head>

let activeUnit='all', searchTerm='';

function matches(ex,term){
  if(!term)return true;
  const s=term.toLowerCase();
  return ex.title.toLowerCase().includes(s)||ex.app.toLowerCase().includes(s)||ex.goal.toLowerCase().includes(s)||
    ex.tasks.some(tk=>tk.action.toLowerCase().includes(s)||tk.app.toLowerCase().includes(s)||
      (tk.path||[]).some(p=>p.toLowerCase().includes(s))||
      (tk.data||[]).some(d=>d[0].toLowerCase().includes(s)||d[1].toLowerCase().includes(s))||
      tk.steps.some(st=>st.t.toLowerCase().includes(s)||(st.subs||[]).some(sub=>sub.toLowerCase().includes(s))));
}

function buildHTML(ex,C,B){
  let h=`<div class="goal-row">${ex.goal}</div>`;
  ex.tasks.forEach(task=>{
    h+=`<div class="task-block"><div class="task-hdr">
      <span class="task-num" style="background:${B};color:${C}">Task ${task.num}</span>
      <span class="task-action">${task.action}</span>
      <span class="task-app-badge">${task.app.split('→')[0].split('(')[0].trim()}</span>
      <i class="task-chev">›</i></div><div class="task-body">`;
    if(task.path&&task.path.length>1){
      h+=`<div class="path-row"><span class="path-lbl">PATH</span>`;
      task.path.forEach((s,i)=>{h+=`<span class="path-chip">${s}</span>`;if(i<task.path.length-1)h+=`<span class="path-arr">›</span>`;});
      h+=`</div>`;
    }
    if(task.data&&task.data.length){
      h+=`<table class="dt"><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>`;
      task.data.forEach(r=>{h+=`<tr><td>${r[0]}</td><td><strong>${r[1]}</strong></td></tr>`;});
      h+=`</tbody></table>`;
    }
    h+=`<ul class="sl">`;
    task.steps.forEach((s,i)=>{
      h+=`<li class="si"><span class="sd" style="background:${B};color:${C}">${i+1}</span><div class="st">${s.t}`;
      if(s.subs){h+=`<ul class="subl">`;s.subs.forEach(sub=>{h+=`<li class="subi"><span class="subd"></span><span class="subt">${sub}</span></li>`;});h+=`</ul>`;}
      if(s.w)h+=`<div class="warn-box">⚠ ${s.w}</div>`;
      if(s.info)h+=`<div class="info-box">ℹ ${s.info}</div>`;
      if(s.ok)h+=`<div class="ok-box">✓ ${s.ok}</div>`;
      h+=`</div></li>`;
    });
    h+=`</ul></div></div>`;
  });
  return h;
}

function render(){
  const tree=document.getElementById('tree');
  tree.innerHTML='';
  let total=0,shown=0;
  UNITS.forEach(u=>{total+=u.exs.length;});

  UNITS.forEach(unit=>{
    if(activeUnit!=='all'&&unit.id!==parseInt(activeUnit))return;
    const filtered=unit.exs.filter(ex=>matches(ex,searchTerm));
    if(!filtered.length)return;
    shown+=filtered.length;

    const ub=document.createElement('div');
    ub.className='unit-block';

    const uh=document.createElement('div');
    uh.className='unit-hdr';
    uh.style.cssText=`background:${unit.B};`;
    uh.innerHTML=`<span class="unit-dot" style="background:${unit.dot}"></span><span class="unit-lbl" style="color:${unit.C}">${unit.label}</span><span class="unit-cnt" style="color:${unit.C}">${filtered.length} egzersiz</span><span class="unit-chev open" style="color:${unit.C}">›</span>`;

    const ubody=document.createElement('div');
    ubody.className='unit-body';

    filtered.forEach(ex=>{
      const card=document.createElement('div');
      card.className='ex-card';
      const hdr=document.createElement('div');
      hdr.className='ex-card-hdr';
      hdr.innerHTML=`<span class="ex-num" style="background:${unit.B};color:${unit.C}">Ex ${ex.num}</span><div class="ex-title-block"><div class="ex-title">${ex.title}</div><div class="ex-app">${ex.app}</div></div><span class="ex-tc">${ex.tasks.length} task</span><span class="ex-chev">›</span>`;
      const body=document.createElement('div');
      body.className='ex-body';
      body.innerHTML=buildHTML(ex,unit.C,unit.B);
      body.querySelectorAll('.task-hdr').forEach(th=>{
        th.addEventListener('click',()=>{
          const tb=th.nextElementSibling,ch=th.querySelector('.task-chev'),open=tb.classList.contains('open');
          tb.classList.toggle('open',!open);ch.classList.toggle('open',!open);
        });
      });
      hdr.addEventListener('click',()=>{
        const ch=hdr.querySelector('.ex-chev'),open=body.classList.contains('open');
        body.classList.toggle('open',!open);ch.classList.toggle('open',!open);
      });
      card.appendChild(hdr);card.appendChild(body);ubody.appendChild(card);
    });

    uh.addEventListener('click',()=>{
      const ch=uh.querySelector('.unit-chev'),open=ubody.style.display!=='none';
      ubody.style.display=open?'none':'block';ch.classList.toggle('open',!open);
    });
    ub.appendChild(uh);ub.appendChild(ubody);tree.appendChild(ub);
  });

  document.getElementById('counter').textContent=`${shown} / ${total}`;
  if(!shown)tree.innerHTML='<div class="no-res">// sonuç bulunamadı</div>';
}

let debounce;
document.getElementById('srch').addEventListener('input',e=>{
  clearTimeout(debounce);
  debounce=setTimeout(()=>{searchTerm=e.target.value;render();},250);
});
document.getElementById('filters').querySelectorAll('.fb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');activeUnit=btn.dataset.u;render();
  });
});

render();

// Service Worker registration
if('serviceWorker' in navigator){
  navigator.serviceWorker.register('sw.js').catch(()=>{});
}
