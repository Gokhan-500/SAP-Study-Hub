/* ── ARAMA SONUÇ PANELİ ── */
var srPanel=document.createElement('div');
srPanel.id='sr-panel';
document.getElementById('app').parentNode.insertBefore(
  srPanel, document.getElementById('app')
);

function escRe(s){return s.replace(/[.+?^${}()|[\]\\]/g,'\\$&');}

function hlStr(s,re){
  if(!s||!re)return s||'';
  re.lastIndex=0;
  return String(s).replace(re,function(m){return'<mark>'+m+'</mark>';});
}

function clearSearch(){
  document.getElementById('search').value='';
  run();
  document.getElementById('search').focus();
}

function buildSearchPanel(q,re,unitFilter){
  srPanel.innerHTML='';
  if(!q)return;
  var results=[];
  D.forEach(function(unit){
    var uid='u'+unit.unit;
    if(unitFilter!=='all'&&unitFilter!==uid)return;
    unit.ex.forEach(function(ex){
      ex.tasks.forEach(function(t){
        var fieldsTxt=(t.fields||[]).map(function(f){return f[0]+' '+f[1];}).join(' ');
        var stepsTxt=(t.steps||[]).join(' ').replace(/<[^>]+>/g,' ');
        var txt=[ex.title,ex.app||'',ex.sc||'',t.title,t.app||'',
                 fieldsTxt,stepsTxt,t.warn||'',t.info||'',t.result||''].join(' ');
        if(txt.toLowerCase().indexOf(q)>=0)
          results.push({unit:unit,ex:ex,task:t,uid:uid});
      });
    });
  });
  if(!results.length)return;
  var bar=document.createElement('div');
  bar.className='sr-bar';
  bar.innerHTML='<span class="sr-count"><b>'+results.length+'</b> görev bulundu</span>'+
    '<button class="sr-close" onclick="clearSearch()">✕ Aramayı Temizle</button>';
  srPanel.appendChild(bar);
  var COLORS={1:'#06b6d4',2:'#a855f7',3:'#60a5fa',4:'#f59e0b',
              5:'#22c55e',6:'#ef4444',7:'#fbbf24',8:'#34d399',9:'#818cf8'};
  results.forEach(function(r){
    var t=r.task,ex=r.ex,u=r.unit;
    var c=COLORS[u.unit]||'#60a5fa';
    var div=document.createElement('div');
    div.className='sr-card';
    var bc='<div class="sr-bc">'+
      '<span class="sr-unit" style="color:'+c+';border-color:'+c+'40;background:'+c+'12">'+
        'U'+u.unit+' · '+u.title+
      '</span>'+
      '<span class="sr-sep">›</span>'+
      '<span class="sr-exn">EX '+ex.id+' · '+hlStr(ex.title,re)+'</span>'+
      '<span class="sr-sep">›</span>'+
      '<span class="sr-tn">'+t.num+'</span>'+
    '</div>';
    var th='<div class="sr-th">'+
      '<span class="sr-tt">'+hlStr(t.title,re)+'</span>'+
      (t.app?'<span class="sr-ab">'+hlStr(t.app,re)+'</span>':'')+
    '</div>';
    var sc=ex.sc?'<div class="sr-sc">'+hlStr(ex.sc,re)+'</div>':'';
    var ph='';
    if(t.path&&t.path.length){
      ph='<div class="sr-path">'+t.path.map(function(p,i){
        return'<span class="sr-pc">'+hlStr(p,re)+'</span>'+
          (i<t.path.length-1?'<span class="sr-pa">›</span>':'');
      }).join('')+'</div>';
    }
    var fh='';
    if(t.fields&&t.fields.length){
      var rows=t.fields.map(function(f){
        if(f[0].startsWith('──'))
          return'<tr class="fvt-sec"><td colspan="2">'+f[0]+'</td></tr>';
        return'<tr><td>'+hlStr(f[0],re)+'</td><td>'+hlStr(f[1],re)+'</td></tr>';
      }).join('');
      fh='<table class="fvt"><thead><tr><th>Field</th><th>Value</th></tr></thead>'+
         '<tbody>'+rows+'</tbody></table>';
    }
    var sh='';
    if(t.steps&&t.steps.length){
      sh='<ol class="sl">'+t.steps.map(function(s){
        return'<li><span></span>'+hlStr(s,re)+'</li>';
      }).join('')+'</ol>';
    }
    div.innerHTML=bc+th+sc+ph+
      (t.warn?'<div class="box warn"><span class="bi">⚠</span><div>'+hlStr(t.warn,re)+'</div></div>':'')+
      (t.info?'<div class="box info"><span class="bi">ℹ</span><div>'+hlStr(t.info,re)+'</div></div>':'')+
      fh+sh+
      (t.result?'<div class="box result"><span class="bi">✓</span><div>'+hlStr(t.result,re)+'</div></div>':'');
    srPanel.appendChild(div);
  });
}

function run(){
  var raw=document.getElementById('search').value.trim();
  var q=raw.toLowerCase();
  var re=raw?new RegExp(escRe(raw),'gi'):null;
  document.getElementById('clr').style.display=raw?'block':'none';
  if(raw){
    document.getElementById('app').style.display='none';
    document.getElementById('nores').style.display='none';
    document.getElementById('xpb').style.display='none';
    buildSearchPanel(q,re,filterU);
    srPanel.style.display='block';
    var cnt=srPanel.querySelectorAll('.sr-card').length;
    document.getElementById('cnt').textContent=String(cnt);
    if(!cnt){srPanel.style.display='none';document.getElementById('nores').style.display='block';}
  } else {
    document.getElementById('app').style.display='';
    srPanel.style.display='none';
    srPanel.innerHTML='';
    document.getElementById('nores').style.display='none';
    document.getElementById('xpb').style.display='';
    var shown=0;
    document.querySelectorAll('.ug').forEach(function(ug){
      var badge=ug.querySelector('.ubadge');
      var uNum=badge?badge.textContent.replace(/[^0-9]/g,''):'';
      var ok=(filterU==='all'||filterU===('u'+uNum)||filterU===uNum);
      ug.classList.toggle('hid',!ok);
      if(ok){ug.querySelectorAll('.card').forEach(function(c){c.classList.remove('hid');shown++;});}
    });
    document.getElementById('cnt').textContent=String(shown);
  }
}

function path(a){if(!a||!a.length)return'';return'<div class="pr">'+a.map((p,i)=>`<span class="pc">${p}</span>${i<a.length-1?'<span class="pa">›</span>':''}`).join('')+'</div>';}
function tbl(f){if(!f||!f.length)return'';const rows=f.map(([a,b])=>{if(a.startsWith('──'))return`<tr class="fvt-sec"><td colspan="2">${a}</td></tr>`;return`<tr><td>${a}</td><td>${b}</td></tr>`;}).join('');return`<table class="fvt"><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>${rows}</tbody></table>`;}
function steps(s){if(!s||!s.length)return'';return'<ol class="sl">'+s.map(x=>`<li><span></span>${x}</li>`).join('')+'</ol>';}
function task(t){const body=path(t.path)+(t.warn?`<div class="box warn"><span class="bi">⚠</span><div>${t.warn}</div></div>`:'')+( t.info?`<div class="box info"><span class="bi">ℹ</span><div>${t.info}</div></div>`:'')+tbl(t.fields)+steps(t.steps)+(t.result?`<div class="box result"><span class="bi">✓</span><div>${t.result}</div></div>`:'');return`<div class="task"><div class="thdiv" onclick="togTask(this)"><span class="tn">${t.num}</span><span class="tt">${t.title}</span>${t.app?`<span class="ab">${t.app}</span>`:''}<span class="task-chev">›</span></div><div class="task-body">${body}</div></div>`;}
function card(e,uid){let h=`<div class="card" id="ex${e.id}" data-u="${uid}"><div class="ch" onclick="toggle(this)"><span class="exn">${e.id}</span><div class="cl"><div class="ct">${e.title}</div><div class="ca">${e.app}</div></div><div class="cr"><span class="sb">${e.tasks.length} Adım</span><span class="chev">›</span></div></div><div class="cb">`;if(e.sc)h+=`<div class="scenario">${e.sc}</div>`;e.tasks.forEach(t=>h+=task(t));h+=`</div></div>`;return h;}
function unit(u){const uid=`u${u.unit}`;const colors={1:'#06b6d4',2:'#a855f7',3:'#60a5fa',4:'#f59e0b',5:'#22c55e'};const c=colors[u.unit]||'#60a5fa';let h=`<div class="ug collapsed ${uid}" id="${uid}"><div class="uh" onclick="togUnit(this)"><span class="ubadge" style="border-color:${c}30;color:${c};background:${c}18">Unit ${u.unit}</span><span class="utitle">${u.title}</span><span class="uc">${u.ex.length} egzersiz</span><span class="uchev">›</span></div><div class="ug-body">`;u.ex.forEach(e=>h+=card(e,uid));return h+'</div></div>';}
function toggle(h){h.parentElement.classList.toggle('open');}
function togUnit(uh){
  uh.closest('.ug').classList.toggle('collapsed');
}
function togTask(hdr){hdr.parentElement.classList.toggle('open');}
/* run() defined above with search panel support */
const app=document.getElementById('app');const frow=document.getElementById('frow');const cnt=document.getElementById('cnt');const nores=document.getElementById('nores');const srch=document.getElementById('search');const clr=document.getElementById('clr');const xpb=document.getElementById('xpb');const TOTAL=D.reduce((a,u)=>a+u.ex.length,0);cnt.textContent=TOTAL;let term='',filterU='all',allOpen=false;
D.forEach(u=>{app.innerHTML+=unit(u);const b=document.createElement('button');b.className='fb';b.dataset.u=`u${u.unit}`;b.textContent=`U${u.unit}: ${u.title.length>22?u.title.slice(0,22)+'…':u.title}`;frow.appendChild(b);});
srch.addEventListener('input',e=>{term=e.target.value;run();});
srch.addEventListener('keydown',e=>{if(e.key==='Escape'){term='';srch.value='';run();}});
clr.addEventListener('click',()=>{term='';srch.value='';run();srch.focus();});
frow.addEventListener('click',e=>{const b=e.target.closest('.fb');if(!b)return;filterU=b.dataset.u;document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));b.classList.add('on');run();});
document.querySelector('.fb[data-u="all"]').classList.add('on');
xpb.addEventListener('click',()=>{allOpen=!allOpen;document.querySelectorAll('.card:not(.hid)').forEach(c=>c.classList.toggle('open',allOpen));xpb.textContent=allOpen?'Tümünü Kapat':'Tümünü Aç';xpb.classList.toggle('active',allOpen);});
</script>
