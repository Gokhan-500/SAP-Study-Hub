<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0f172a">
<title>Service Notlar — Yakında</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--border:#334155;--text:#e2e8f0;--tm:#94a3b8;--td:#64748b;--blue:#3b82f6;--bl:#60a5fa;--bbg:rgba(59,130,246,.10);--bbd:rgba(59,130,246,.30);--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);display:flex;align-items:center;justify-content:center;text-align:center;padding:24px;}
.card{max-width:420px;}
.tag{display:inline-block;font-family:var(--mono);font-size:11px;color:var(--bl);background:var(--bbg);border:1px solid var(--bbd);padding:3px 10px;border-radius:4px;letter-spacing:.06em;margin-bottom:18px;}
h1{font-size:20px;font-weight:600;margin-bottom:10px;}
p{font-family:var(--mono);font-size:13px;color:var(--tm);line-height:1.7;}
a{display:inline-block;margin-top:22px;font-family:var(--mono);font-size:12px;color:var(--bl);text-decoration:none;border:1px solid var(--border);border-radius:5px;padding:7px 16px;transition:border-color .15s;}
a:hover{border-color:var(--bbd);}
</style>
</head>
<body>
<div class="card">
<span class="tag">SERVICE</span>
<h1>Notlar yakında eklenecek</h1>
<p>Bu bölümün notları henüz hazırlanmadı. Çözüm ağacı sekmesinden mevcut içeriğe ulaşabilirsin.</p>
<a href="../../index.html">← Ana sayfaya dön</a>
</div>
</body>
</html>
