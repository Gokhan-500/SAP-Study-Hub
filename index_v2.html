let activeUnit='all', searchTerm='';

function matches(ex, term){
  if(!term) return true;
  const s=term.toLowerCase();
  return ex.title.toLowerCase().includes(s)||ex.app.toLowerCase().includes(s)||ex.goal.toLowerCase().includes(s)||
    ex.tasks.some(tk=>tk.action.toLowerCase().includes(s)||tk.app.toLowerCase().includes(s)||
      tk.steps.some(st=>st.t.toLowerCase().includes(s)||(st.subs||[]).some(sub=>sub.toLowerCase().includes(s))));
}

function buildHTML(ex,C,B){
  let h=`<div class="goal-row">${ex.goal}</div>`;
  ex.tasks.forEach(task=>{
    h+=`<div class="task-block"><div class="task-hdr"><span class="task-num" style="background:${B};color:${C}">Task ${task.num}</span><span class="task-action">${task.action}</span><span class="task-app">${task.app}</span><i class="ti ti-chevron-right task-chev"></i></div><div class="task-body">`;
    if(task.path&&task.path.length>1){h+=`<div class="path-row"><span class="path-lbl">PATH</span>`;task.path.forEach((s,i)=>{h+=`<span class="path-chip">${s}</span>`;if(i<task.path.length-1)h+=`<span class="path-arr">›</span>`;});h+=`</div>`;}
    if(task.data&&task.data.length){h+=`<table class="dt"><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>`;task.data.forEach(r=>{h+=`<tr><td>${r[0]}</td><td><strong>${r[1]}</strong></td></tr>`;});h+=`</tbody></table>`;}
    h+=`<ul class="sl">`;
    task.steps.forEach((s,i)=>{
      h+=`<li class="si"><span class="sd" style="background:${B};color:${C}">${i+1}</span><div class="st">${s.t}`;
      if(s.subs){h+=`<ul class="subl">`;s.subs.forEach(sub=>{h+=`<li class="subi"><span class="subd"></span><span class="subt">${sub}</span></li>`;});h+=`</ul>`;}
      if(s.w)h+=`<div class="warn">⚠ ${s.w}</div>`;
      if(s.info)h+=`<div class="info">ℹ ${s.info}</div>`;
      if(s.ok)h+=`<div class="ok">✓ ${s.ok}</div>`;
      h+=`</div></li>`;
    });
    h+=`</ul></div></div>`;
  });
  return h;
}

function render(){
  const tree=document.getElementById('tree');
  tree.innerHTML='';
  let totalShown=0;
  UNITS.forEach(unit=>{
    if(activeUnit!=='all'&&unit.id!==parseInt(activeUnit)) return;
    const filtered=unit.exs.filter(ex=>matches(ex,searchTerm));
    if(!filtered.length) return;
    totalShown+=filtered.length;
    const ub=document.createElement('div');
    ub.className='unit-block';
    const uh=document.createElement('div');
    uh.className='unit-hdr';
    uh.style.cssText=`background:${unit.B};color:${unit.C}`;
    uh.innerHTML=`<span class="unit-lbl">${unit.label}</span><span class="unit-cnt">${filtered.length} egzersiz</span><i class="ti ti-chevron-right unit-chev open"></i>`;
    const ubody=document.createElement('div');
    ubody.className='unit-body';
    filtered.forEach(ex=>{
      const card=document.createElement('div');
      card.className='ex-card';
      const hdr=document.createElement('div');
      hdr.className='ex-card-hdr';
      hdr.innerHTML=`<span class="ex-num" style="background:${unit.B};color:${unit.C}">Ex ${ex.num}</span><div class="ex-title-block"><div class="ex-title">${ex.title}</div><div class="ex-app">${ex.app}</div></div><span class="ex-tc">${ex.tasks.length} task</span><i class="ti ti-chevron-right ex-chev"></i>`;
      const body=document.createElement('div');
      body.className='ex-body';
      body.innerHTML=buildHTML(ex,unit.C,unit.B);
      body.querySelectorAll('.task-hdr').forEach(th=>{
        th.addEventListener('click',()=>{
          const tb=th.nextElementSibling,ch=th.querySelector('.task-chev'),open=tb.classList.contains('open');
          tb.classList.toggle('open',!open);ch.classList.toggle('open',!open);
        });
      });
      hdr.addEventListener('click',()=>{
        const ch=hdr.querySelector('.ex-chev'),open=body.classList.contains('open');
        body.classList.toggle('open',!open);ch.classList.toggle('open',!open);
      });
      card.appendChild(hdr);card.appendChild(body);ubody.appendChild(card);
    });
    uh.addEventListener('click',()=>{
      const ch=uh.querySelector('.unit-chev'),open=ubody.style.display!=='none';
      ubody.style.display=open?'none':'block';ch.classList.toggle('open',!open);
    });
    ub.appendChild(uh);ub.appendChild(ubody);tree.appendChild(ub);
  });
  if(!totalShown) tree.innerHTML='<div class="no-res">Sonuç bulunamadı.</div>';
}

document.getElementById('srch').addEventListener('input',e=>{
  searchTerm=e.target.value;render();
});
document.getElementById('filters').querySelectorAll('.fb').forEach(btn=>{
  btn.addEventListener('click',()=>{
    document.querySelectorAll('.fb').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');activeUnit=btn.dataset.u;render();
  });
});

render();
</script>
