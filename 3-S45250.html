<title>SAP S45250 – Consumption-Based Planning &amp; Forecasting Çözüm Ağacı</title>

<style>
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#263145;--border:#334155;--bh:#475569;--text:#e2e8f0;--tm:#94a3b8;--td:#64748b;--blue:#3b82f6;--bl:#60a5fa;--bbg:rgba(59,130,246,.10);--bbd:rgba(59,130,246,.30);--green:#22c55e;--gbg:rgba(34,197,94,.10);--gbd:rgba(34,197,94,.30);--yellow:#f59e0b;--ybg:rgba(245,158,11,.10);--ybd:rgba(245,158,11,.35);--red:#ef4444;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh;}
header{background:linear-gradient(135deg,#0f1f3d 0%,#0f172a 60%);border-bottom:1px solid var(--border);padding:18px 32px 14px;position:relative;}
header .meta{display:flex;align-items:baseline;gap:12px;margin-bottom:3px;}
.cid{font-family:var(--mono);font-size:11px;color:var(--bl);background:var(--bbg);border:1px solid var(--bbd);padding:2px 8px;border-radius:4px;letter-spacing:.06em;}
header h1{font-size:19px;font-weight:600;letter-spacing:-.3px;}
.sub{font-family:var(--mono);font-size:11px;color:var(--td);letter-spacing:.04em;margin-top:2px;}
.sr{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap;}
.st{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--tm);}
.st .n{color:var(--bl);font-weight:600;}
#homebtn{position:absolute;top:18px;right:32px;font-family:var(--mono);font-size:11px;background:var(--bg2);color:var(--tm);border:1px solid var(--border);border-radius:5px;padding:5px 12px;cursor:pointer;transition:border-color .15s,color .15s;}
#homebtn:hover{border-color:var(--bbd);color:var(--bl);}
html{scroll-padding-top:120px;}
#toolbar{position:sticky;top:0;z-index:100;background:rgba(15,23,42,.97);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:8px 32px 10px;}
#search-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;margin-bottom:7px;}
#search-wrap{position:relative;}
#search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--td);pointer-events:none;width:13px;height:13px;}
#search{width:100%;font-family:var(--mono);font-size:12px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:6px 30px 6px 29px;outline:none;transition:border-color .18s;}
#search:focus{border-color:var(--bbd);background:#1a2744;}
#search::placeholder{color:var(--td);}
#clr{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--td);cursor:pointer;font-size:13px;line-height:1;padding:2px;display:none;border-radius:3px;transition:color .15s;}
#clr:hover{color:var(--text);}
#sctr{font-family:var(--mono);font-size:11px;color:var(--tm);white-space:nowrap;text-align:right;}
#sctr b{color:var(--bl);font-weight:600;}
#xpb{font-family:var(--mono);font-size:11px;background:var(--bg2);color:var(--tm);border:1px solid var(--border);border-radius:4px;padding:5px 11px;cursor:pointer;white-space:nowrap;transition:border-color .15s,color .15s,background .15s;}
#xpb:hover{border-color:var(--bbd);color:var(--bl);background:var(--bbg);}
#xpb.active{border-color:var(--bbd);color:var(--bl);background:var(--bbg);}

#frow{display:flex;gap:5px;flex-wrap:wrap;}
.fb{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.05em;padding:3px 9px;border-radius:3px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--td);transition:all .15s;white-space:nowrap;}
.fb:hover{color:var(--text);border-color:var(--bh);}
.fb[data-u="all"]{border-color:var(--bh);color:var(--tm);}
.fb[data-u="all"].on{background:var(--bg2);border-color:var(--bh);color:var(--text);}
.fb[data-u="u2"].on{background:rgba(6,182,212,.15);color:#06b6d4;border-color:rgba(6,182,212,.4);}
.fb[data-u="u3"].on{background:rgba(168,85,247,.15);color:#a855f7;border-color:rgba(168,85,247,.4);}
.fb[data-u="u4"].on{background:rgba(59,130,246,.15);color:var(--bl);border-color:var(--bbd);}
.fb[data-u="u5"].on{background:rgba(245,158,11,.15);color:var(--yellow);border-color:var(--ybd);}
.fb[data-u="u6"].on{background:rgba(34,197,94,.15);color:var(--green);border-color:var(--gbd);}
.fb[data-u="u7"].on{background:rgba(239,68,68,.15);color:var(--red);border-color:rgba(239,68,68,.4);}
.fb[data-u="u8"].on{background:rgba(251,191,36,.15);color:#fbbf24;border-color:rgba(251,191,36,.4);}
mark{background:rgba(245,158,11,.32);color:#fef08a;border-radius:2px;padding:0 2px;font-style:normal;}
#nores{display:none;max-width:1100px;margin:0 auto;text-align:center;padding:80px 20px;font-family:var(--mono);font-size:13px;color:var(--td);}
#nores .ico{display:block;font-size:34px;margin-bottom:12px;opacity:.3;}
#nores .hint{display:block;margin-top:8px;font-size:11px;color:var(--td);opacity:.7;}
.card.hid,.ug.hid{display:none;}
main{max-width:1100px;margin:0 auto;padding:26px 22px 60px;}
.ug{margin-bottom:34px;}
.uh{display:flex;align-items:center;gap:12px;margin-bottom:13px;padding-bottom:9px;border-bottom:1px solid var(--border);}
.ubadge{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;padding:3px 10px;border-radius:3px;text-transform:uppercase;}
.utitle{font-size:15px;font-weight:600;}
.uc{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--td);}
.u2 .ubadge{background:rgba(6,182,212,.15);color:#06b6d4;border:1px solid rgba(6,182,212,.3);}
.u3 .ubadge{background:rgba(168,85,247,.15);color:#a855f7;border:1px solid rgba(168,85,247,.3);}
.u4 .ubadge{background:rgba(59,130,246,.15);color:var(--bl);border:1px solid var(--bbd);}
.u5 .ubadge{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid var(--ybd);}
.u6 .ubadge{background:rgba(34,197,94,.15);color:var(--green);border:1px solid var(--gbd);}
.u7 .ubadge{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.u8 .ubadge{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:9px;overflow:hidden;transition:border-color .18s;}
.card:hover{border-color:var(--bh);}
.card.open{border-color:var(--bbd);}
.ch{display:flex;align-items:center;gap:13px;padding:13px 17px;cursor:pointer;user-select:none;}
.ch:hover{background:rgba(255,255,255,.02);}
.exn{font-family:var(--mono);font-size:10px;color:var(--td);min-width:28px;flex-shrink:0;}
.cl{flex:1;min-width:0;}
.ct{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ca{font-family:var(--mono);font-size:10.5px;color:var(--td);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cr{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.sb{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:20px;background:var(--bg3);color:var(--td);border:1px solid var(--border);white-space:nowrap;}
.chev{color:var(--td);font-size:12px;transition:transform .2s;flex-shrink:0;}
.card.open .chev{transform:rotate(90deg);}
.cb{display:none;padding:0 17px 17px;border-top:1px solid var(--border);}
.card.open .cb{display:block;}
.scenario{font-style:italic;color:var(--tm);font-size:13px;border-left:3px solid var(--bbd);padding:9px 13px;margin:13px 0;background:var(--bbg);border-radius:0 6px 6px 0;line-height:1.7;}
.task{margin-bottom:20px;}
.thdiv{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;gap:9px;}
.tn{font-family:var(--mono);font-size:11px;color:var(--bl);font-weight:600;flex-shrink:0;}
.tt{font-size:13px;font-weight:500;flex:1;}
.ab{font-family:var(--mono);font-size:10px;padding:2px 9px;border-radius:4px;background:var(--bbg);color:var(--bl);border:1px solid var(--bbd);white-space:nowrap;flex-shrink:0;}
.pr{display:flex;align-items:center;flex-wrap:wrap;gap:0;margin:7px 0 9px;}
.pc{font-family:var(--mono);font-size:10.5px;background:var(--bg3);color:var(--tm);padding:3px 9px;border:1px solid var(--border);}
.pc:first-child{border-radius:4px 0 0 4px;}
.pc:last-child{border-radius:0 4px 4px 0;}
.pc:only-child{border-radius:4px;}
.pa{font-size:10px;color:var(--td);padding:0 1px;background:var(--bg3);border-top:1px solid var(--border);border-bottom:1px solid var(--border);height:25px;display:flex;align-items:center;}
.fvt{width:100%;border-collapse:collapse;margin:7px 0 11px;font-size:12.5px;}
.fvt th{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--td);background:var(--bg3);padding:5px 9px;border:1px solid var(--border);text-align:left;}
.fvt td{padding:5px 9px;border:1px solid var(--border);vertical-align:top;}
.fvt td:first-child{font-family:var(--mono);font-size:11.5px;color:var(--tm);background:rgba(30,41,59,.6);white-space:nowrap;}
.fvt td:last-child{color:var(--text);}
.fvt tr:hover td{background:rgba(255,255,255,.02);}
.sl{list-style:none;counter-reset:s;margin:7px 0;}
.sl li{counter-increment:s;display:flex;gap:9px;margin-bottom:5px;font-size:13px;color:var(--tm);line-height:1.6;}
.sl li::before{content:counter(s);font-family:var(--mono);font-size:10px;font-weight:600;color:var(--bl);background:var(--bbg);border:1px solid var(--bbd);border-radius:3px;padding:1px 5px;min-width:22px;text-align:center;flex-shrink:0;line-height:17px;margin-top:2px;}
.box{display:flex;gap:9px;padding:9px 12px;border-radius:6px;margin:9px 0;font-size:12.5px;line-height:1.6;}
.bi{font-size:14px;flex-shrink:0;margin-top:1px;}
.warn{background:var(--ybg);border:1px solid var(--ybd);color:#fde68a;}
.info{background:var(--bbg);border:1px solid var(--bbd);color:#bfdbfe;}
.result{background:var(--gbg);border:1px solid var(--gbd);color:#bbf7d0;}
.sl2{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--td);margin:11px 0 5px;}
.dv{height:1px;background:var(--border);margin:13px 0;}
b{color:var(--text);font-weight:500;}
@media(max-width:600px){#toolbar{padding:8px 14px 9px;}#search-row{grid-template-columns:1fr auto;}#sctr{display:none;}main{padding:18px 12px 60px;}header{padding:14px 16px 12px;}#homebtn{top:14px;right:16px;}}
</style>

{num:"T2",title:"Lot Boyutu Varyasyonları — 6 Sütunlu Test",app:"Change Material + MRP-Individual Planning-Single Level",path:["SAP Fiori Launchpad","Change Material"],fields:[["Value 1 (EX)","Sonuç: 1 PR × 80 PC"],["Value 2 (EX + Min 100)","Sonuç: 1 PR × 100 PC"],["Value 3 (EX + Max 50)","Sonuç: 1 PR × 50 PC + 1 PR × 30 PC"],["Value 4 (EX + Max 50 + Rounding 50)","Sonuç: 2 PR × 50 PC"],["Value 5 (HB + Max Stock 800)","Sonuç: 1 PR × 800 PC"],["Value 6 (HB + Max Stock 900 + Rounding Profile 0001)","Sonuç: 1 PR × 900 PC"]],steps:["Her sütun için: <b>Change Material</b> uygulamasını başlatın; L5250-## + MRP 1 görünümü + Plant 1010.","<b>MRP 1</b> sekmesinde <b>Lot-size data</b> bölümündeki alanları tabloya göre doldurun (diğer alanları temizleyin); <b>Save</b>.","Simülasyon için: <b>MRP-Individual Planning-Single Level</b> uygulamasını başlatın; Material <b>L5250-##</b>, Plant <b>1010</b>; <b>Display Results Prior to Saving</b> seçin.","<b>Enter</b>; uyarı mesajını onaylayın.","<b>Rec./reqd</b> kolonundaki sonuçları not edin; kaydetmeden başlangıç ekranına dönün.","Tüm sütunlar için tekrarlayın."],info:"Value 1: Lot=EX | Value 2: Lot=EX, Min=100 | Value 3: Lot=EX, Max=50 | Value 4: Lot=EX, Max=50, Rounding=50 | Value 5: Lot=HB, MaxStock=800 | Value 6: Lot=HB, MaxStock=900, RoundingProfile=0001",warn:"Her değişiklikten önce diğer Lot-size data alanlarının boş olduğundan emin olun.",result:"V1: 80 PC | V2: 100 PC | V3: 50+30 PC | V4: 2×50 PC | V5: 800 PC | V6: 900 PC"},
{num:"T3",title:"Fiyat Skalasına Göre Optimum Lot: Yuvarlama Profili Mantığı",app:"Analiz",path:[],fields:[["PO Qty 1","100 EUR/PC"],["PO Qty 100","80 EUR/PC"],["PO Qty 1000","68 EUR/PC"],["Sonuç","Yuvarlama profili kullanılmalı"],["80 PC üzeri","100'e yuvarla (80 × 100 / 100 = 80 EUR — eşit değer)"],["850 PC üzeri","1000'e yuvarla (68 × 1000 / 80 = 850 PC eşdeğer)"]],steps:["80 PC üzerindeki miktarları 100'e yuvarlamak karlıdır (80 × 100 EUR = 100 × 80 EUR).","850 PC üzerindeki miktarları 1000'e yuvarlamak karlıdır (68 × 1000 = 850 × 80).","Bu eşik değerleri yuvarlama profiline girilecek."],info:null,warn:null,result:"Yuvarlama profili (static) oluşturarak fiyat skalasından en iyi şekilde yararlanılır."},
{num:"T4",title:"Z0## Yuvarlama Profili Oluşturma (OWD1) ve Test",app:"SAP GUI – SPRO (OWD1) + Change Material + MRP-Individual Planning-Single Level",path:["SAP GUI","Materials Management","Consumption-Based Planning","Planning","Lot-Size Calculation","Maintain Rounding Profile (OWD1)"],fields:[["Rounding Profile","Z0##"],["Type","Static"],["Profile Name","Rounding Profile Z0##"],["Threshold Value 1","80 → Rounding Value: 100"],["Threshold Value 2","850 → Rounding Value: 1000"],["Test: Material","L5250-##"],["Test: MRP Lot Size","HB"],["Test: Maximum Stock Level","80"],["Test: Rounding Profile","Z0##"],["Test Sonucu","1 PR × 100 PC"]],steps:["SAP back-end sisteminde Customizing'e gidin: <b>Materials Management → Consumption-Based Planning → Planning → Lot-Size Calculation → Maintain Rounding Profile (OWD1)</b>.","Rounding Profile alanına <b>Z0##</b> girin; <b>Static</b>'i seçin.","Profile Name: <b>Rounding Profile Z0##</b>; tabloyu doldurun: 80→100, 850→1000.","<b>Save</b>.","Test için: <b>Change Material</b>'ı başlatın; L5250-## + MRP 1 + Plant 1010.","Lot Sizing Procedure <b>HB</b>, Maximum Stock Level <b>80</b>, Rounding Profile <b>Z0##</b>; <b>Save</b>.","<b>MRP-Individual Planning-Single Level</b>: L5250-##, Plant 1010, <b>Display Results Prior to Saving</b> seçin; <b>Enter</b>; onaylayın."],info:"Plant alanını boş bırakın — yuvarlama profilleri plant olmadan da tanımlanabilir.",warn:null,result:"Stok 20 PC, max stok 80 PC. Gereksinim = 60 PC. Eşik değere (80) göre 100'e yuvarlanır. Sonuç: 1 PR × 100 PC."}
]}
]},

{unit:6,title:"Performing Planning",ex:[
{id:5,title:"Execute a Planning Run for a Material",app:"Create Material / Manage Stock / Monitor Material Coverage Net/Individual Segments / Monitor Stock/Requirements List (MD04)",sc:"Monitor Material Coverage Net/Individual Segments uygulamasıyla malzeme durumu izlenecek ve MRP çalıştırılacak; ardından MD04 uygulaması test edilecektir.",tasks:[
{num:"T1",title:"B5250-## Malzemesi Oluşturma",app:"Create Material",path:["SAP Fiori Launchpad","Create Material"],fields:[["Material","B5250-##"],["Material Type","Raw materials"],["Industry","Mechanical Engineering"],["Copy from Material","A5250-##"],["Views","Purchasing / MRP1 / MRP 2 / General Plant Data/Storage 1 / Accounting 1"],["Plant","1010 (Copy from: 1010)"],["Storage Location","101A (Copy from: 101A)"],["Purchasing: Descr.","Raw material B5250-##"],["MRP1: MRP Type","VB"],["MRP1: Reorder Point","200"],["MRP1: MRP Controller","0##"],["MRP1: Lot Sizing Procedure","HB (Replenish to maximum stock level)"],["MRP1: Maximum Stock Level","500"],["MRP2: Procurement Type","F (kopyadan)"],["MRP2: Safety Stock","10 (kopyadan)"]],steps:["<b>Create Material</b>'ı başlatın; Material <b>B5250-##</b>, Copy from <b>A5250-##</b>; <b>Continue</b>.","View'leri seçin + <b>Create views selected</b>; <b>Org. Levels</b>: Plant <b>1010</b>/Copy <b>1010</b>, Stor.Loc. <b>101A</b>/Copy <b>101A</b>; <b>Continue</b>.","<b>Purchasing</b>: Descr. <b>Raw material B5250-##</b>; <b>Enter</b>.","<b>MRP 1</b>: MRP Type <b>VB</b>, Reorder Point <b>200</b>, MRP Controller <b>0##</b>, Lot Sizing <b>HB</b>, Maximum Stock Level <b>500</b>; <b>Enter</b>.","<b>MRP 2</b> değerlerini not edin (F / 10 PC); <b>Save</b>."],info:"HB = Maksimum Stok Seviyesine Tamamlama | Reorder Point = 200 | Max Stock = 500 → 50 stokla MRP sonucu: 500-50=450 PC",warn:null,result:null},
{num:"T2",title:"B5250-## Başlangıç Stoğu (Plant 1010, 101A, 50 PC)",app:"Manage Stock",path:["SAP Fiori Launchpad","Manage Stock"],fields:[["Plant","Plant 1 DE (1010)"],["Material","B5250-##"],["Storage Location","Std. storage 1 (101A)"],["Stock Type","Unrestricted-Use Stock"],["Special Stock Type","Standard Stock"],["Stock Change","Initial Entry"],["Quantity","50 PC"]],steps:["<b>Manage Stock</b>'u arayın ve açın.","Plant <b>Plant 1 DE (1010)</b>, Material <b>B5250-##</b>; <b>Enter</b>.","<b>Std. storage 1 (101A)</b>'da Unrestricted-Use Stock butonuna tıklayın.","Tablodaki verileri girin; <b>Post</b>; <b>OK</b>."],info:null,warn:null,result:null},
{num:"T3",title:"Monitor Material Coverage Net/Individual Segments ile MRP",app:"Monitor Material Coverage - Net and Individual Segments",path:["SAP Fiori Launchpad","Monitor Material Coverage - Net and Individual Segments"],fields:[["Plant","1010"],["MRP Controller","0##"],["B5250-## İlk Eksiklik Tarihi","Bugün"],["Mevcut Stok","50 PC"],["Safety Stock","80 PC (Monitor Material Coverage gösteriminde — stok 50 PC, SS 80 PC → 30 PC eksiklik)"],["MRP Sonucu","1 PR × 450 PC"]],steps:["SAP Fiori Launchpad'de <b>Monitor Material Coverage - Net and Individual Segments</b> uygulamasını bulun ve açın.","<b>Welcome!</b> dialog'unda <b>OK</b>; <b>My Area of Responsibility</b>'de Plant 1DE (1010), MRP Controller 0## satırını seçin; <b>Assign</b>; <b>Back</b>.","<b>Go</b>'ya tıklayın — sorumluluk alanınızdaki malzemelerin kıtlık miktarları ve 21 günlük stok durumu görünür.","B5250-## satırını seçin; <b>Manage Materials</b>'e tıklayın — Manage Material Coverage'a yönlendirilirsiniz.","Sağ tarafta <b>Stock/Requirements List</b> sekmesinde durumu not edin (Stok: 50, Safety Stock: 10 → 30 PC eksiklik var).","Kullanıcı profilinizden <b>MRP Settings → MRP Run Parameters</b>'ı kontrol edin; <b>Cancel</b>; <b>OK</b>.","Sağ üstteki <b>Start MRP Run</b>'a tıklayın; 'MRP run in progress' mesajını bekleyin.","Stock/Requirements List'te 450 PC satın alma talebi oluşturulduğunu doğrulayın."],info:"Net Gereksinim: Stok (50) < Reorder Point (200) → MRP tetiklenir. HB lot boyutu: Max Stock (500) - Stok (50) = 450 PC. Not: Monitor Material Coverage, güvenlik stoğu (80 PC) nedeniyle bugün 30 PC eksiklik gösterir (50-80=-30).",warn:null,result:"1 satın alma talebi × 450 PC oluşturulur."},
{num:"T4",title:"Monitor Stock/Requirements List (MD04) Testi",app:"Monitor Stock/Requirements List (MD04)",path:["SAP Fiori Launchpad","Monitor Stock / Requirements List (MRP tile group)"],fields:[["Material","B5250-##"],["Plant","1010"],["Güncelleme","PR miktarı 700 PC'ye değiştirilir"],["Valuation Price (gerekirse)","10"],["Firming Indicator","* (manuel güncelleme sonrası set edilir)"],["Dates sekmesi","Availability date gösteriliyor"],["Display sekmesi","With header details for matl seçilmeli"],["Navigation Profile","ZSCM001 atanır"]],steps:["SAP Fiori Launchpad'de <b>Monitor Stock / Requirements List</b> uygulamasını başlatın (MRP tile group). Veya Back-end: <b>Logistics → Materials Management → MRP → MRP → Evaluations → Stock/Reqmts List (MD04)</b>.","Material <b>B5250-##</b>, Plant <b>1010</b>; <b>Enter</b>.","Listede önceki adımda oluşturulan satın alma talebini görün. Ekrandan ayrılmayın.","Satın alma talebi için <b>Details of Element</b>'e tıklayın; <b>Change Element</b>; Quantities/Dates sekmesinde miktarı <b>700</b> olarak değiştirin; <b>Enter</b>; istenirse Valuation Price <b>10</b>; <b>Save</b>; <b>Refresh</b>.","Firming indicator (<b>*</b>) set edildiğini not edin — manuel değişiklik nedeniyle MRP bu talebi artık değiştiremez.","<b>Menu → Settings → User Settings</b>: <b>Dates</b> sekmesinde <b>Availability date</b> görüntülendiğini not edin.","<b>Display</b> sekmesinde <b>With header details for matl</b> seçin; <b>Continue</b>; header detayları görünür; <b>Collapse header details</b>.","<b>Menu → Environment → Navigation Profile → Assign</b>; Navigation profile <b>ZSCM001</b> seçin; <b>Save</b>; <b>Continue</b>."],info:"Firming indicator (*): Satın alma talebi manuel güncellendikten sonra otomatik set edilir. MRP bir sonraki çalışmada bu talebi değiştiremez.",warn:"Navigation profil atandıktan sonra MRP Live veya Sng-item seçeneklerini test edebilirsiniz ama planlama çalışması başlatmayın.",result:null}
]},
{id:6,title:"Schedule a Planning Run",app:"Schedule MRP Runs",sc:"Schedule MRP Runs uygulamasıyla bir iş oluşturup günlük MRP çalışmaları zamanlayacaksınız.",tasks:[
{num:"1",title:"MRP Çalışması Zamanlama",app:"Schedule MRP Runs",path:["SAP Fiori Launchpad","Schedule MRP Runs","Create"],fields:[["Job Template","Material Requirements Planning (MRP) (varsayılan)"],["Job Name","Material Requirements Planning (MRP) Group ##"],["Start Immediately","X (Seçili)"],["Job Start","Bugünün tarihi (değiştirme)"],["Recurrence Pattern","Daily"],["Every","1 Day(s)"],["End","None"],["On Non-Working Day","No restriction"],["Calendar","Germany (Standard)"],["Plant","1010"],["MRP Controller","0##"],["Material Scope","All Materials"],["Planning Mode","Adapt Planning Data (1)"]],steps:["SAP Fiori Launchpad'de <b>Schedule MRP Runs</b> uygulamasını arayın ve açın.","<b>Application Jobs</b> ekranında <b>Create</b> butonuna tıklayın.","<b>Template Selection</b>: Job Template <b>Material Requirements Planning (MRP)</b> varsayılan; Job Name <b>Material Requirements Planning (MRP) Group ##</b>.","<b>Step 2</b>'ye geçin; <b>Scheduling Options</b>: <b>Define Recurrence Pattern</b>'a tıklayın; tablodaki verileri <b>Scheduling Information</b> dialog'una girin; <b>OK</b>.","<b>Step 3</b>'e geçin; <b>Parameters</b>: Plant <b>1010</b>, MRP Controller <b>0##</b>, Material Scope <b>All Materials</b>, Planning Mode <b>Adapt Planning Data (1)</b>.","<b>Check</b>'e tıklayın — 'You can go ahead and schedule the job' mesajı görünür.","<b>Schedule</b>'a tıklayın; Application Jobs ekranına dönersiniz.","<b>Go</b>'ya tıklayarak listeyi yenileyin; Status <b>Finished</b> olan kendi kullanıcınızla oluşturulmuş işi bulun.","<b>Log</b> kolonundaki butona tıklayarak log detaylarını görün.","<b>Back</b>'e tıklayarak Application Jobs ekranına dönün."],info:"Recurrence Pattern: Daily, Her 1 gün, Bitiş Yok, İş Günü Dışında: Kısıtlama Yok, Takvim: Germany (Standard)",warn:null,result:null}

const UC=['u2','u3','u4','u5','u6','u7','u8'];

function path(a){if(!a||!a.length)return'';return'<div class="pr">'+a.map((p,i)=>`<span class="pc">${p}</span>${i<a.length-1?'<span class="pa">›</span>':''}`).join('')+'</div>';}

function tbl(f){if(!f||!f.length)return'';return'<table class="fvt"><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>'+f.map(([a,b])=>`<tr><td>${a}</td><td>${b}</td></tr>`).join('')+'</tbody></table>';}

function steps(s){if(!s||!s.length)return'';return'<ol class="sl">'+s.map(x=>`<li><span></span>${x}</li>`).join('')+'</ol>';}

function task(t){
let h=`<div class="task"><div class="thdiv"><span class="tn">Adım ${t.num}</span><span class="tt">${t.title}</span>${t.app?`<span class="ab">${t.app}</span>`:''}</div>`;
h+=path(t.path);
h+=tbl(t.fields);
h+=steps(t.steps);
if(t.info)h+=`<div class="box info"><span class="bi">ℹ</span><div>${t.info}</div></div>`;
if(t.warn)h+=`<div class="box warn"><span class="bi">⚠</span><div>${t.warn}</div></div>`;
if(t.result)h+=`<div class="box result"><span class="bi">✓</span><div>${t.result}</div></div>`;
h+=`</div>`;
return h;
}

function card(e,uid){
let html=`<div class="card" id="ex${e.id}" data-u="${uid}">`;
html+=`<div class="ch" onclick="toggle(this)"><span class="exn">${e.id}</span><div class="cl"><div class="ct">${e.title}</div><div class="ca">${e.app}</div></div><div class="cr"><span class="sb">${e.tasks.length} Adım</span><span class="chev">›</span></div></div>`;
html+=`<div class="cb">`;
if(e.sc)html+=`<div class="scenario">${e.sc}</div>`;
e.tasks.forEach(t=>html+=task(t));
html+=`</div></div>`;
return html;
}

function unit(u,i){
const uid=`u${u.unit}`;
const colors=['#06b6d4','#a855f7','#60a5fa','#f59e0b','#22c55e','#ef4444','#fbbf24'];
let h=`<div class="ug ${uid}" id="${uid}"><div class="uh"><span class="ubadge" style="border-color:${colors[i]}30;color:${colors[i]};background:${colors[i]}18">Unit ${u.unit}</span><span class="utitle">${u.title}</span><span class="uc">${u.ex.length} egzersiz</span></div>`;
u.ex.forEach(e=>h+=card(e,uid));
h+=`</div>`;
return h;
}

const app=document.getElementById('app');
const frow=document.getElementById('frow');
const cnt=document.getElementById('cnt');
const TOTAL=D.reduce((a,u)=>a+u.ex.length,0);
cnt.textContent=TOTAL;

D.forEach((u,i)=>{
app.innerHTML+=unit(u,i);
const b=document.createElement('button');
b.className='fb';b.dataset.u=`u${u.unit}`;
b.textContent=`U${u.unit}: ${u.title.length>22?u.title.slice(0,22)+'…':u.title}`;
frow.appendChild(b);
});

function toggle(h){
const c=h.parentElement;
c.classList.toggle('open');
}

let term='',filterU='all';
const srch=document.getElementById('search');
const clr=document.getElementById('clr');
const nores=document.getElementById('nores');
const xpb=document.getElementById('xpb');
let allOpen=false;

function run(){
const q=term.toLowerCase().trim();
let vis=0;
document.querySelectorAll('.ug').forEach(ug=>{
const uid=ug.id;
const uMatch=filterU==='all'||filterU===uid;
let uVis=false;
ug.querySelectorAll('.card').forEach(card=>{
if(!uMatch){card.classList.add('hid');return;}
const raw=card.querySelector('.ch').textContent+card.querySelector('.cb').innerHTML;
const m=!q||raw.toLowerCase().includes(q);
if(m){card.classList.remove('hid');vis++;uVis=true;}
else{card.classList.add('hid');}
});
ug.classList.toggle('hid',!uVis||!uMatch);
});
cnt.textContent=vis||(!q&&filterU==='all'?TOTAL:vis);
nores.style.display=(vis===0&&(q||filterU!=='all'))?'block':'none';
clr.style.display=q?'inline':'none';
}

srch.addEventListener('input',e=>{term=e.target.value;run();});
srch.addEventListener('keydown',e=>{if(e.key==='Escape'){term='';srch.value='';run();}});
clr.addEventListener('click',()=>{term='';srch.value='';run();srch.focus();});

frow.addEventListener('click',e=>{
const b=e.target.closest('.fb');
if(!b)return;
filterU=b.dataset.u;
document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
b.classList.add('on');
run();
});
document.querySelector('.fb[data-u="all"]').classList.add('on');

xpb.addEventListener('click',()=>{
allOpen=!allOpen;
document.querySelectorAll('.card:not(.hid)').forEach(c=>c.classList.toggle('open',allOpen));
xpb.textContent=allOpen?'Tümünü Kapat':'Tümünü Aç';
xpb.classList.toggle('active',allOpen);
});
</script>
</body>
</html>
