<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>SAP Study Hub</title>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --border:#334155;
    --text:#f1f5f9;
    --muted:#94a3b8;

    --blue:#3b82f6;
    --green:#22c55e;
    --purple:#a855f7;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Segoe UI, Arial, sans-serif;
    min-height:100vh;
}

.header{
    text-align:center;
    padding:50px 20px 30px;
}

.header h1{
    font-size:38px;
    margin-bottom:10px;
}

.header p{
    color:var(--muted);
    font-size:15px;
}

.grid{
    max-width:1200px;
    margin:auto;
    padding:20px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
    gap:25px;
}

.card{
    background:var(--card);
    border:1px solid var(--border);
    border-radius:16px;
    padding:25px;
    transition:.2s;
}

.card:hover{
    transform:translateY(-3px);
}

.card h2{
    margin-bottom:8px;
}

.card p{
    color:var(--muted);
    margin-bottom:20px;
}

.btn{
    display:block;
    text-decoration:none;
    color:white;
    padding:12px 14px;
    border-radius:10px;
    margin-bottom:10px;
    font-size:14px;
}

.iee2e{
    background:rgba(59,130,246,.15);
    border:1px solid rgba(59,130,246,.3);
}

.proc{
    background:rgba(34,197,94,.15);
    border:1px solid rgba(34,197,94,.3);
}

.service{
    background:rgba(168,85,247,.15);
    border:1px solid rgba(168,85,247,.3);
}

footer{
    text-align:center;
    color:var(--muted);
    padding:30px;
    font-size:13px;
}
</style>
</head>

<body>

<div class="header">
    <h1>SAP Study Hub</h1>
    <p>IEE2E • Procurement • Service</p>
</div>

<div class="grid">

    <div class="card">
        <h2>📦 IEE2E</h2>
        <p>S/4HANA Cloud End-to-End</p>

        <a class="btn iee2e" href="iee2e/cozum-agaci/iee2e.html">
            🌳 Solution Tree
        </a>

        <a class="btn iee2e" href="iee2e/cozum-agaci/exam.html">
            📝 Exam Tree
        </a>

        <a class="btn iee2e" href="iee2e/notlar/00-kavramlar-sozlugu.html">
            📚 Notes
        </a>
    </div>

    <div class="card">
        <h2>🛒 Procurement</h2>
        <p>C_TS452 Certification</p>

        <a class="btn proc" href="procurement/cozum-agaci/p1-s4500.html">
            🌳 Solution Trees
        </a>

        <a class="btn proc" href="procurement/notlar/00-yakinda-eklenecek.html">
            📚 Notes
        </a>
    </div>

    <div class="card">
        <h2>🔧 Service</h2>
        <p>S/4HANA Service Learning</p>

        <a class="btn service" href="service/cozum-agaci/s2-47000.html">
            🌳 Solution Trees
        </a>

        <a class="btn service" href="service/notlar/00-yakinda-eklenecek.html">
            📚 Notes
        </a>
    </div>

</div>

<footer>
    SAP Study Hub
</footer>

</body>
</html>
