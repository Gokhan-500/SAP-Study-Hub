<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAP S4500 – S/4HANA Sourcing &amp; Procurement Çözüm Ağacı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#263145;--border:#334155;--bh:#475569;--text:#e2e8f0;--tm:#94a3b8;--td:#64748b;--blue:#3b82f6;--bl:#60a5fa;--bbg:rgba(59,130,246,.10);--bbd:rgba(59,130,246,.30);--green:#22c55e;--gbg:rgba(34,197,94,.10);--gbd:rgba(34,197,94,.30);--yellow:#f59e0b;--ybg:rgba(245,158,11,.10);--ybd:rgba(245,158,11,.35);--red:#ef4444;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh;}
header{background:linear-gradient(135deg,#0f1f3d 0%,#0f172a 60%);border-bottom:1px solid var(--border);padding:18px 32px 14px;}
header .meta{display:flex;align-items:baseline;gap:12px;margin-bottom:3px;}
.cid{font-family:var(--mono);font-size:11px;color:var(--bl);background:var(--bbg);border:1px solid var(--bbd);padding:2px 8px;border-radius:4px;letter-spacing:.06em;}
header h1{font-size:19px;font-weight:600;letter-spacing:-.3px;}
.sub{font-family:var(--mono);font-size:11px;color:var(--td);letter-spacing:.04em;margin-top:2px;}
.sr{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap;}
.st{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--tm);}
.st .n{color:var(--bl);font-weight:600;}
main{max-width:1100px;margin:0 auto;padding:26px 22px 60px;}
.ug{margin-bottom:34px;}
.uh{display:flex;align-items:center;gap:12px;margin-bottom:13px;padding-bottom:9px;border-bottom:1px solid var(--border);}
.ubadge{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;padding:3px 10px;border-radius:3px;text-transform:uppercase;}
.utitle{font-size:15px;font-weight:600;}
.uc{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--td);}
.u1 .ubadge{background:rgba(6,182,212,.15);color:#06b6d4;border:1px solid rgba(6,182,212,.3);}
.u2 .ubadge{background:rgba(168,85,247,.15);color:#a855f7;border:1px solid rgba(168,85,247,.3);}
.u3 .ubadge{background:rgba(59,130,246,.15);color:var(--bl);border:1px solid var(--bbd);}
.u4 .ubadge{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid var(--ybd);}
.u5 .ubadge{background:rgba(34,197,94,.15);color:var(--green);border:1px solid var(--gbd);}
.u6 .ubadge{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.u7 .ubadge{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
.u8 .ubadge{background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.3);}
.u9 .ubadge{background:rgba(129,140,248,.15);color:#818cf8;border:1px solid rgba(129,140,248,.3);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:9px;overflow:hidden;transition:border-color .18s;}
.card:hover{border-color:var(--bh);}
.card.open{border-color:var(--bbd);}
.ch{display:flex;align-items:center;gap:13px;padding:13px 17px;cursor:pointer;user-select:none;}
.ch:hover{background:rgba(255,255,255,.02);}
.exn{font-family:var(--mono);font-size:10px;color:var(--td);min-width:28px;flex-shrink:0;}
.cl{flex:1;min-width:0;}
.ct{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ca{font-family:var(--mono);font-size:10.5px;color:var(--td);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cr{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.sb{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:20px;background:var(--bg3);color:var(--td);border:1px solid var(--border);white-space:nowrap;}
.chev{color:var(--td);font-size:12px;transition:transform .2s;flex-shrink:0;}
.card.open .chev{transform:rotate(90deg);}
.cb{display:none;padding:0 17px 17px;border-top:1px solid var(--border);}
.card.open .cb{display:block;}
.scenario{font-style:italic;color:var(--tm);font-size:13px;border-left:3px solid var(--bbd);padding:9px 13px;margin:13px 0;background:var(--bbg);border-radius:0 6px 6px 0;line-height:1.7;}
.task{margin-bottom:20px;}
.thdiv{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;gap:9px;}
.tn{font-family:var(--mono);font-size:11px;color:var(--bl);font-weight:600;flex-shrink:0;}
.tt{font-size:13px;font-weight:500;flex:1;}
.ab{font-family:var(--mono);font-size:10px;padding:2px 9px;border-radius:4px;background:var(--bbg);color:var(--bl);border:1px solid var(--bbd);white-space:nowrap;flex-shrink:0;}
.pr{display:flex;align-items:center;flex-wrap:wrap;gap:0;margin:7px 0 9px;}
.pc{font-family:var(--mono);font-size:10.5px;background:var(--bg3);color:var(--tm);padding:3px 9px;border:1px solid var(--border);}
.pc:first-child{border-radius:4px 0 0 4px;}
.pc:last-child{border-radius:0 4px 4px 0;}
.pc:only-child{border-radius:4px;}
.pa{font-size:10px;color:var(--td);padding:0 1px;background:var(--bg3);border-top:1px solid var(--border);border-bottom:1px solid var(--border);height:25px;display:flex;align-items:center;}
.fvt{width:100%;border-collapse:collapse;margin:7px 0 11px;font-size:12.5px;}
.fvt th{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--td);background:var(--bg3);padding:5px 9px;border:1px solid var(--border);text-align:left;}
.fvt td{padding:5px 9px;border:1px solid var(--border);vertical-align:top;}
.fvt td:first-child{font-family:var(--mono);font-size:11.5px;color:var(--tm);background:rgba(30,41,59,.6);white-space:nowrap;}
.fvt td:last-child{color:var(--text);}
.fvt tr:hover td{background:rgba(255,255,255,.02);}
.sl{list-style:none;counter-reset:s;margin:7px 0;}
.sl li{counter-increment:s;display:flex;gap:9px;margin-bottom:5px;font-size:13px;color:var(--tm);line-height:1.6;}
.sl li::before{content:counter(s);font-family:var(--mono);font-size:10px;font-weight:600;color:var(--bl);background:var(--bbg);border:1px solid var(--bbd);border-radius:3px;padding:1px 5px;min-width:22px;text-align:center;flex-shrink:0;line-height:17px;margin-top:2px;}
.box{display:flex;gap:9px;padding:9px 12px;border-radius:6px;margin:9px 0;font-size:12.5px;line-height:1.6;}
.bi{font-size:14px;flex-shrink:0;margin-top:1px;}
.warn{background:var(--ybg);border:1px solid var(--ybd);color:#fde68a;}
.info{background:var(--bbg);border:1px solid var(--bbd);color:#bfdbfe;}
.result{background:var(--gbg);border:1px solid var(--gbd);color:#bbf7d0;}
.sl2{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--td);margin:11px 0 5px;}
.dv{height:1px;background:var(--border);margin:13px 0;}
b{color:var(--text);font-weight:500;}

/* ── TOOLBAR ── */
html{scroll-padding-top:120px;}
#toolbar{position:sticky;top:0;z-index:100;background:rgba(15,23,42,.97);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:8px 32px 10px;}
#search-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;margin-bottom:7px;}
#search-wrap{position:relative;}
#search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--td);pointer-events:none;width:13px;height:13px;}
#search{width:100%;font-family:var(--mono);font-size:12px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:6px 30px 6px 29px;outline:none;transition:border-color .18s;}
#search:focus{border-color:var(--bbd);background:#1a2744;}
#search::placeholder{color:var(--td);}
#clr{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--td);cursor:pointer;font-size:13px;line-height:1;padding:2px;display:none;border-radius:3px;transition:color .15s;}
#clr:hover{color:var(--text);}
#sctr{font-family:var(--mono);font-size:11px;color:var(--tm);white-space:nowrap;text-align:right;}
#sctr b{color:var(--bl);font-weight:600;}
#xpb{font-family:var(--mono);font-size:11px;background:var(--bg2);color:var(--tm);border:1px solid var(--border);border-radius:4px;padding:5px 11px;cursor:pointer;white-space:nowrap;transition:border-color .15s,color .15s,background .15s;}
#xpb:hover{border-color:var(--bbd);color:var(--bl);background:var(--bbg);}
#xpb.active{border-color:var(--bbd);color:var(--bl);background:var(--bbg);}
/* filter row */
#frow{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.fb{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.05em;padding:3px 9px;border-radius:3px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--td);transition:all .15s;white-space:nowrap;}
.fb:hover{color:var(--text);border-color:var(--bh);}
.fb[data-u="all"]{border-color:var(--bh);color:var(--tm);}
.fb[data-u="all"].on{background:var(--bg2);border-color:var(--bh);color:var(--text);}
.fb[data-u="1"].on{background:rgba(6,182,212,.15);color:#06b6d4;border-color:rgba(6,182,212,.4);}
.fb[data-u="2"].on{background:rgba(168,85,247,.15);color:#a855f7;border-color:rgba(168,85,247,.4);}
.fb[data-u="3"].on{background:rgba(59,130,246,.15);color:var(--bl);border-color:var(--bbd);}
.fb[data-u="4"].on{background:rgba(245,158,11,.15);color:var(--yellow);border-color:var(--ybd);}
.fb[data-u="5"].on{background:rgba(34,197,94,.15);color:var(--green);border-color:var(--gbd);}
.fb[data-u="6"].on{background:rgba(239,68,68,.15);color:var(--red);border-color:rgba(239,68,68,.4);}
.fb[data-u="7"].on{background:rgba(251,191,36,.15);color:#fbbf24;border-color:rgba(251,191,36,.4);}
.fb[data-u="8"].on{background:rgba(52,211,153,.15);color:#34d399;border-color:rgba(52,211,153,.4);}
.fb[data-u="9"].on{background:rgba(129,140,248,.15);color:#818cf8;border-color:rgba(129,140,248,.4);}
/* highlight */
mark{background:rgba(245,158,11,.32);color:#fef08a;border-radius:2px;padding:0 2px;font-style:normal;}
/* no result */
#nores{display:none;max-width:1100px;margin:0 auto;text-align:center;padding:80px 20px;font-family:var(--mono);font-size:13px;color:var(--td);}
#nores .ico{display:block;font-size:34px;margin-bottom:12px;opacity:.3;}
#nores .hint{display:block;margin-top:8px;font-size:11px;color:var(--td);opacity:.7;}
/* hidden */
.card.hid,.ug.hid{display:none;}
/* mobile */
@media(max-width:600px){
  #toolbar{padding:8px 14px 9px;}
  #search-row{grid-template-columns:1fr auto;gap:6px;}
  #sctr{display:none;}
  main{padding:18px 12px 60px;}
}
</style>
</head>

{num:"2",title:"PO Listesi ve Tedarikçi Mesajı Kontrolü",app:"Manage Purchase Orders",path:["Manage Purchase Orders","Filter (Supplier + Purch. Group)","Go","Output Management"],fields:[["Supplier","T-S50A##"],["Purchasing Group","Z##"]],steps:["<b>Manage Purchase Orders</b> uygulamasını başlatın.","Filtre olarak Supplier <b>T-S50A##</b> ve Purchasing Group <b>Z##</b> girin.","<b>Go</b>'ya tıklayın.","PO numaranıza veya satır sağındaki <b>(arrow)</b> ikonuna tıklayın.","<b>Output Management</b> alanına kadar aşağı kaydırın.","Gerekirse <b>Show More per Row</b>'a tıklayın.","<b>(Display Document)</b> ikonuna tıklayın — mesaj önizlemesi yeni sekmede açılır."],info:null,warn:null,result:"Tedarikçiye gönderilen satın alma mesajı ekranda görüntülenir."}
]},

]},
{id:6,title:"Enter an Invoice",app:"Create Supplier Invoice / Supplier Invoices List",sc:"Tedarikçiden gelen faturayı sisteme girecek ve sipariş ile mal girişi verileriyle karşılaştıracaksınız.",tasks:[

{num:"2",title:"Fatura Listesi Kolon Ayarları ve Varyant Kaydetme",app:"Supplier Invoices List",path:["Supplier Invoice Processing","Supplier Invoices List"],fields:[["Company Code","1010"],["Kolonlar (bu sırayla)","Invoicing Party → Blocked (Logistics) → Reference → Invoice Number → Status → Gross Invoice Amount → Entry Type → Posting Date"],["Sıralama","Reference — Descending (Azalan)"],["Varyant Adı","Sorted by Reference ##"],["Set as Default","Evet"]],steps:["<b>Supplier Invoices List</b> uygulamasını başlatın.","Company Code <b>1010</b> girin ve <b>Go</b>'ya tıklayın.","<b>(Settings)</b> ikonuna tıklayın.","Tablodaki kolonları seçin, diğerlerini kaldırın; yukarı/aşağı okları ile sıralamayı ayarlayın.","<b>Sort</b> sekmesini seçin: <b>Reference</b> ve <b>Descending</b>'i seçin.","<b>OK</b>'e tıklayın.","Listenin sol üstünden <b>(Select View)</b>'e tıklayın ve <b>Save As</b>'i seçin.","Ad: <b>Sorted by Reference ##</b>, <b>Set as Default</b>'ı işaretleyin ve <b>Save</b>'e tıklayın."],info:null,warn:null,result:null},
{num:"3",title:"Fatura Detayı ve PO Bağlantısı",app:"Supplier Invoices List",path:["Supplier Invoices List","Invoice Number","Purchasing Document References"],fields:[],steps:["Listeden T-S50A## tedarikçisine ait fatura numaranıza tıklayın.","<b>Purchasing Document References</b> sekmesini açın.","Satın alma siparişi numarasının burada görüntülendiğini doğrulayın."],info:null,warn:null,result:"PO numarası fatura belgesinde görüntülenir — 3'lü eşleşme (PO–GR–Invoice) tamamdır."}
]}

{num:"3",title:"Muhasebe Atama Bilgisini Kontrol Etme",app:"Display Purchasing Documents by Supplier",path:["SAP Fiori Search","Display Purchasing Documents by Supplier"],fields:[["Supplier","T-S50A##"],["Account Assignment Category","K (Cost center)"]],steps:["SAP Fiori Search'te <b>Display Purchasing Documents by Supplier</b>'ı arayın; yeni sekmede açılır.","Supplier <b>T-S50A##</b>, Account Assignment Category <b>K</b> girin; <b>Execute</b>.","Satın alma fiyatlarını ve muhasebe atamasını kontrol edin.","Daha fazla bilgi için: <b>More → Account Assignment</b>."],info:null,warn:null,result:"Muhasebe atama bilgisi (cost center) talepten PO'ya aktarılmıştır. Malzeme ana kaydı olan kalemlerin fiyatı kaynak (info record) üzerinden belirlenir. Sadece malzeme ana kaydı ve kaynağı olmayan External Hard Disk'in teklif fiyatı (EUR 77) PO'ya aktarılır."}
]},

{num:"1",title:"Varsayılan Cost Center'ı Değiştirme",app:"My Purchase Requisitions – New",path:["Employee Self Services V2","My Purchase Requisitions – New","(Profile of Employee)","Default Settings for User"],fields:[["Cost Center","10101201"]],steps:["<b>My Purchase Requisitions – New</b> uygulamasını başlatın (tile grubu <b>Employee Self Services V2</b>).","Sağ üst köşede <b>(Profile of Employee)</b> ikonuna tıklayın.","<b>Default Settings for User</b>'ı seçin.","<b>Cost Center</b> alanına <b>10101201</b> girin.","<b>Save</b>'e tıklayın.","Uygulamada kalın."],info:null,warn:"Varsayılan değerleri değiştirdikten sonra <b>My Catalogs</b> alanında giriş görünmüyorsa F5 ile tarayıcıyı yenileyin veya uygulamayı yeniden başlatın.",result:null},
{num:"2",title:"Katalogdan Notebook ve Aksesuar Siparişi",app:"My Purchase Requisitions – New",path:["My Purchase Requisitions – New","My Catalogs","Employee Catalog"],fields:[["Material 1","Notebook T520 / 1 PC"],["Material 2","Privacy filter for notebook T520 / 1 PC"],["Material 3","Keyboard MS natural Ergon / 1 PC"],["Supplier (tümü için)","IT-Service Hamburg (T-S52IT)"],["Purchasing Group","Z##"],["Purchasing Organization","101C"],["Plant","Hamburg (1010)"],["Account Assignment Category","K (Cost center)"],["Cost Center","Purch & Store 1 (DE) (10101201)"],["Cart Name","Notebook Employee ##"]],steps:["<b>My Catalogs</b> bölümünde <b>Employee Catalog</b>'a tıklayın — ayrı bir tarayıcı penceresi açılır.","Arama alanına <b>T520</b> girin ve <b>Enter</b>'a basın.","Sonuçlardan <b>Lenovo T520</b> ve <b>Privacy filter 3M</b>'i seçin; <b>Add to Shopping Cart</b> butonuna tıklayın.","Sol menüden <b>Mobile, Hard and Software → IT Accessories → Keyboards, Mouse etc.</b>'ye gidin.","<b>Keyboard MS natural Ergon</b>'u sepete ekleyin.","Sepeti kontrol etmek için sağ üstteki <b>Display</b>'e tıklayın — tüm malzemelerin tedarikçisi <b>IT-Service Hamburg (T-S52IT)</b> olmalıdır.","<b>Order</b>'a tıklayarak SAP S/4HANA'ya aktar.","SAP S/4HANA'da sağ üstteki popover'da <b>View Cart</b>'a tıklayın.","<b>Items</b> sekmesine tıklayın.","T520 kalemine tıklayın — item detaylarında Purchasing Group, Plant vb. bilgileri görüntüleyin; <b>Account Assignment</b> bölümünde <b>(arrow)</b>'a tıklayarak Cost Center'ı kontrol edin.","<b>Apply</b>'a iki kez tıklayın.","<b>General Information</b> sekmesini seçin; Description alanına <b>Notebook Employee ##</b> girin.","<b>Order</b>'a tıklayın; uyarı mesajlarını <b>Create</b> ile onaylayın.","Uygulamada kalın."],info:null,warn:null,result:"Satın alma talebi oluşturulur."},
{num:"3",title:"Katalogdan Kupa Siparişi",app:"My Purchase Requisitions – New",path:["My Purchase Requisitions – New","My Catalogs","Employee Catalog"],fields:[["Material","SAP Mug, white, 6 pcs / 2 Set"],["Cart Name","Mugs Employee ##"]],steps:["<b>Employee Catalog</b>'a gidin.","Arama alanına <b>Mug</b> girin ve <b>Enter</b>'a basın.","<b>SAP Mug, white, 6 pcs</b>'i bulun; miktarı <b>2</b> olarak değiştirin ve sepete ekleyin.","Sepeti görüntüleyin; item detaylarında stok miktarını kontrol edin.","<b>Order</b>'a tıklayın.","SAP S/4HANA'da <b>View Cart</b>'a tıklayın.","Description olarak <b>Mugs Employee ##</b> girin; <b>Order</b>'a ve uyarı mesajı için <b>Create</b>'e tıklayın.","Satın alma talebi oluşturulur."],info:null,warn:null,result:"Mugs talebi için follow-on document (PO) otomatik oluşur."},
{num:"4",title:"Satın Alma Talebi Durumu Kontrolü",app:"My Purchase Requisitions – New",path:["Employee Self Services V2","My Purchase Requisitions – New"],fields:[],steps:["<b>My Purchase Requisitions – New</b> uygulamasını başlatın (tile grubu <b>Employee Self Services V2</b>).","<b>My Recent Purchase Requisitions</b> listesinde iki talebiniz gösterilir.","<b>Mugs Employee ##</b> talebinin follow-on document (PO) zaten oluşturulmuş olduğunu görürsünüz.","Daha fazla detay için <b>Number of Items</b> kolonunda <b>1 Item</b> veya <b>3 Items</b> metnine tıklayın; popover'da bir malzemeye tıklayarak durumu inceleyin."],info:null,warn:null,result:null}
]},

{num:"1",title:"Talebi PO'ya Dönüştürme",app:"Process Purchase Requisitions (V2)",path:["Purchase Requisition Processing","Process Purchase Requisitions (V2)"],fields:[["Purchasing Group","Z##"],["Processing Status","Not edited"],["Search (Supplier)","T-S53IT → T-S52IT atanmış 3 kalemi seçin"]],steps:["<b>Process Purchase Requisitions (V2)</b> uygulamasını başlatın (tile grubu <b>Purchase Requisition Processing</b>).","Filtre çubuğuna: Search alanına <b>T-S53IT</b>, Purchasing Group <b>Z##</b>, Processing Status <b>Not edited</b> girin; <b>Go</b>.","Atanmış tedarikçisi <b>T-S52IT</b> olan 3 kalemi kontrol etmek için <b>(Show More per Row)</b>'a tıklayın.","3 kalemi seçin ve <b>Create Purchase Order</b>'a tıklayın.","Gerekirse tüm mesajları onaylayın ve satın alma siparişini kaydedin."],info:null,warn:null,result:"Satın alma siparişi oluşturulur."},
{num:"2",title:"Çalışan Olarak Talep Durumunu Kontrol Etme",app:"My Purchase Requisitions – New",path:["Employee Self Services V2","My Purchase Requisitions – New"],fields:[],steps:["<b>My Purchase Requisitions – New</b> uygulamasını başlatın.","<b>Notebook Employee ##</b> talebinin durumunun artık <b>Follow on Document Created</b> olduğunu görün.","<b>3 Items</b> metnine tıklayın; popover'da bir malzeme seçin — tüm kalemler için PO follow-on belge olarak görünür."],info:null,warn:null,result:"Talep durumu: Follow on Document Created — tüm kalemler için PO oluşturulmuştur."}
]},

{unit:7,title:"Advanced Transactions in Procurement",ex:[
{id:24,title:"Create a Contract",app:"SAP GUI – ME31K",sc:"Satın alma departmanı T-S52A## tedarikçisiyle miktar sözleşmesi yaptı. Sözleşmeyi ME31K işlemiyle oluşturun.",tasks:[
{num:"1",title:"Quantity Contract (MK) Oluşturma",app:"SAP GUI – ME31K",path:["Logistics","Materials Management","Purchasing","Outline Agreement","Contract","Create (ME31K)"],fields:[["Supplier","T-S52A##"],["Agreement Type","MK (Quantity Contract)"],["Purchasing Organization","101C"],["Purchasing Group","Z##"],["Plant","------- (Tüm fabrikalar)"],["Validity Start","<Önceki ayın 1. günü>"],["Validity End","<Bugün + 2 ay>"],["Item 10: Material / Target Qty / Net Price","A500-## / 10,000 PC / EUR 50"],["Item 20: Material / Target Qty / Net Price","C500-## (Wheel bearing) / 40,000 PC / EUR 48"],["Item 30: Material / Target Qty / Net Price","D500-## (Suspension) / 40,000 PC / EUR 66"],["Header Condition RA01","5% (Discount % on Gross)"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Outline Agreement → Contract → Create (ME31K)</b>'e gidin.","Initial Screen'de tablodaki değerleri girin; <b>Enter</b>'a basın.","<b>Header Data</b>'da geçerlilik tarihlerini girin; <b>Enter</b>'a basın.","Geçerlilik tarihi mesajlarını <b>Enter</b> ile onaylayın.","<b>Item Overview</b>'da 3 kalemi tablodaki gibi girin; hesap atama mesajlarını <b>Enter</b> ile onaylayın.","<b>Header → Conditions</b>'a gidin.","<b>RA01</b> koşul tipi için değer <b>5</b> girin.","<b>Valid from</b> tarihini <b>önceki ayın 1. günü</b> olarak değiştirin.","<b>(Save)</b>'e tıklayın ve sözleşme numarasını not edin."],info:"Agreement Type: MK = Quantity Contract",warn:null,result:"Quantity Contract (MK) oluşturulur. Sözleşme numarasını not edin."}
]},
{id:25,title:"Maintain the Source List",app:"SAP GUI – ME01 / ME05",sc:"T-S52A## ile sözleşme yapıldıktan sonra, sözleşme kalemlerinin malzeme için otomatik kaynak olarak kullanılmasını sağlayın.",tasks:[
{num:"1",title:"A500-## İçin Kaynak Listesi (ME01)",app:"SAP GUI – ME01",path:["Logistics","Materials Management","Purchasing","Master Data","Source List","Maintain (ME01)"],fields:[["Material","A500-##"],["Plant","1010"],["Valid From","<Önceki ayın 1. günü>"],["Valid To","<Yılsonuna kadar>"],["Fixed (Sabit kaynak göstergesi)","X"],["MRP Indicator","1 (MRP'de dikkate al)"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Master Data → Source List → Maintain (ME01)</b>'e gidin.","Material <b>A500-##</b>, Plant <b>1010</b> girin; <b>Enter</b>'a basın.","<b>Edit → Generate Records</b>'u seçin.","Dialog'da geçerlilik tarihlerini girin ve <b>(Continue)</b>'ya basın.","Sistem iki kaynak otomatik oluşturur: T-S52A## (sözleşme) ve T-S50A## (info record).","Sözleşme kalemi satırında <b>Fixed</b> ve <b>MRP 1</b> göstergelerini işaretleyin.","<b>(Save)</b>'e tıklayın."],info:"Sistem otomatik 2 kaynak oluşturur: T-S52A## (contract) ve T-S50A## (info record).",warn:null,result:null},
{num:"2",title:"C500-## ve D500-## İçin Toplu Kaynak Oluşturma (ME05)",app:"SAP GUI – ME05",path:["Logistics","Materials Management","Purchasing","Master Data","Source List","Follow-On Functions","Generate (ME05)"],fields:[["Material","C500-## ve D500-## (TEK DEĞER olarak — range değil!)"],["Generate: Outline Agreements Only","X"],["Existing Records: Become Invalid","X"],["Test Run","Seçili DEĞİL"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Master Data → Source List → Follow-On Functions → Generate (ME05)</b>'e gidin.","Material alanına <b>C500-##</b> girin.","<b>(Multiple Selection)</b> ikonuna tıklayın; <b>Select Single Values</b> sekmesinde <b>D500-##</b>'yi ayrıca girin.","<b>(Copy)</b>'ye tıklayın.","Diğer alanları tablodaki gibi doldurun.","<b>(Execute)</b>'e tıklayın.","Sonuç listesinde tüm kalemleri seçin ve <b>Fix</b>'e tıklayın.","Tüm kalemleri tekrar seçin ve değişiklikleri kaydedin."],info:null,warn:"C500-## ile D500-## arasında RANGE SEÇMEYİN. Yalnızca tek değerleri (single values) girin.",result:"Kaynak listesi kayıtları oluşturulur."}
]},
{id:26,title:"Create a Purchase Requisition with the Advanced Transaction ME51N",app:"SAP GUI – ME51N / ME5A",sc:"Gelişmiş işlem ME51N ile satın alma talepleri oluşturun. Kaynakların otomatik atanmasını sağlayın.",tasks:[
{num:"1",title:"ME51N Varsayılan Değerlerini Ayarlama",app:"SAP GUI – ME51N",path:["Logistics","Materials Management","Purchasing","Purchase Requisition","Create (ME51N)","(Personal Setting)","Default Values"],fields:[["Purchasing Group","Z## (Purch. Group Z##)"],["Plant","1010"],["Tracking Number","GR##"],["Source Determination","X (Seçili)"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Purchase Requisition → Create (ME51N)</b>'e gidin.","<b>(Personal Setting)</b> ikonuna tıklayın.","<b>Default Values</b> sekmesini seçin.","Eksik alanları eklemek için <b>More Fields...</b>'a tıklayın — <b>Source Determination</b>, <b>Plant</b> ve <b>Purchasing Group</b>'u gizli alanlar listesinden seçin ve <b>(Show Selected Fields)</b>'e tıklayın; <b>Copy</b>'ye tıklayın.","Tablodaki değerleri girin.","<b>(Save)</b>'e tıklayın.","İşlemden çıkmayın."],info:null,warn:null,result:null},
{num:"2",title:"Stok Malzemeleri İçin Talep Oluşturma",app:"SAP GUI – ME51N",path:["ME51N","Item Overview","Item Details","Source of Supply Tab"],fields:[["Item 10","B500-## (Oil tray 500/##) / 20 PC"],["Item 20","C500-## (Wheel bearing 500/##) / 100 PC"],["Item 30","D500-## (Suspension 500/##) / 100 PC"],["Item 10 Fixed Vendor","T-S50A## — Info Record"],["Item 20 Fixed Vendor","T-S52A## — Contract item"],["Item 30 Fixed Vendor","T-S52A## — Contract item"]],steps:["Item Overview'da kalemleri tablodaki gibi girin (gerekirse <b>(Expand Items)</b> ikonuna tıklayın).","<b>Enter</b>'a basın.","Item Details'ı açmak için <b>(Expand Item Details)</b>'a tıklayın.","<b>Source of Supply</b> sekmesinde kaynak bilgisini not edin; <b>(Next item)</b> ile diğer kalemlere geçin.","<b>(Save)</b>'e tıklayın; belge numarasını not edin.","İşlemden çıkmayın."],info:"B500-##: Fixed Vendor T-S50A## — Info Record | C500-##: Fixed Vendor T-S52A## — Contract item | D500-##: Fixed Vendor T-S52A## — Contract item",warn:null,result:null},
{num:"3",title:"Çoklu Hesap Atama ile Talep",app:"SAP GUI – ME51N",path:["ME51N","Item Overview","Account Assignment Tab","(Multiple Account Assignment)"],fields:[["Account Assignment Category (A)","K (Cost center)"],["Material","A500-##"],["Quantity","10"],["4 PC → Cost Center / G/L","T-ENG## / 51700000"],["6 PC → Cost Center / G/L","T-CCB## / 51100000"],["Item 10 Fixed Vendor","T-S52A## — Contract item"]],steps:["Item Overview'da A500-##, miktar <b>10</b>, Account Assignment Category <b>K</b> girin.","<b>Enter</b>'a basın.","<b>Account Assignment</b> sekmesinde <b>(Multiple Account Assignment)</b> ikonuna tıklayın.","Her iki satır için miktar, cost center ve G/L hesabını girin; <b>Enter</b>'a basın.","<b>Source of Supply</b> sekmesinde Fixed Vendor'ı not edin: T-S52A## — Contract item.","<b>(Save)</b>'e tıklayın; belge numarasını not edin."],info:"A500-## Fixed Vendor: T-S52A## — Contract item (kaynak listesinden gelir).",warn:null,result:null},
{num:"4",title:"Talep Listesini Görüntüleme (ME5A)",app:"SAP GUI – ME5A",path:["Logistics","Materials Management","Purchasing","Purchase Requisition","List Displays","General (ME5A)"],fields:[["Tracking Number","GR##"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Purchase Requisition → List Displays → General (ME5A)</b>'ya gidin.","Tracking Number <b>GR##</b> girin; <b>(Execute)</b>'e tıklayın.","Listede bir talep kalem numarasını çift tıklayın — talep açılır.","Item Details'ta <b>Status</b> sekmesini seçin: durum <b>Not edited</b> olmalıdır.","<b>(Back)</b> ile listeye dönün."],info:"Listede 2. kolon işleme durumunu gösterir (N = Not edited). Fixed vendor ve sözleşme/info record numaraları da listede görünür.",warn:null,result:"İşlem durumu: N = Not edited. Fixed vendor ve kaynak numaraları listede görülür."}
]},
{id:27,title:"Create a Purchase Order with the Advanced Transaction ME21N",app:"SAP GUI – ME21N",sc:"T-S50A## tedarikçisine atanmış 20 adet oil tray talebini ME21N ile manuel olarak PO'ya dönüştürün.",tasks:[
{num:"1",title:"Belge Genel Görünümü Yapılandırma ve Varyant Kaydetme",app:"SAP GUI – ME21N",path:["Logistics","Materials Management","Purchasing","Purchase Order","Create","Vendor/Supplying Plant Known (ME21N)"],fields:[["Selection Variant Adı","SV##"],["Selection Variant Açıklaması","PurchRequ Group ##"],["Filtre","Assigned + open + released / Purchasing Group Z##"],["Layout Adı","L##"],["Layout Açıklaması","Layout Group ##"],["Gruplandırma","Fixed vendor / Purchase Requisition / PR Item"],["Ek Kolonlar","Material / Short Text"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Purchase Order → Create → Vendor/Supplying Plant Known (ME21N)</b>'e gidin.","Gerekirse <b>(Close)</b> ile yardım alanını kapatın.","<b>Document Overview On</b>'a tıklayın.","<b>(Selection Variant)</b>'a tıklayın, ardından <b>Purchase Requisitions</b>'ı seçin.","<b>Assigned, open, and released</b> bayrağını seçin; Purchasing Group <b>Z##</b> girin; diğer tüm değerleri silin.","<b>(Save as Variant...)</b>'e tıklayın: Variant Name <b>SV##</b>, Description <b>PurchRequ Group ##</b>; <b>(Save)</b>'e tıklayın.","<b>(Execute)</b>'e tıklayın — Z## satın alma grubu talepleri görünür.","<b>(Change breakdown)</b>'a tıklayın: Column Set'ten <b>Fixed vendor</b>'ı, Sort Criteria'dan <b>Purchase Requisition</b>'ı seçin; <b>(Add sort criterion)</b> ve <b>(Transfer)</b>'e tıklayın.","Layout butonunun küçük üçgenine tıklayın: <b>Change layout…</b> → <b>Material</b>'ı seçin → <b>(Show Selected Fields)</b> → <b>Short Text</b> için aynısını yapın → <b>(Transfer)</b>.","Layout butonunun üçgenine tekrar tıklayın: <b>Save layout…</b> → Layout <b>L##</b>, Description <b>Layout Group ##</b>, <b>User-specific</b> seçin → <b>Save</b>."],info:null,warn:null,result:null},
{num:"2",title:"T-S50A## Taleplerini PO'ya Dönüştürme",app:"SAP GUI – ME21N",path:["ME21N","Document Overview","Fixed Vendor T-S50A##","(Adopt)"],fields:[],steps:["Document Overview'da <b>Fixed Vendor T-S50A##</b> satırını seçin.","<b>(Adopt)</b> ikonuna tıklayın.","<b>(Save)</b>'e tıklayın; PO numarasını not edin.","ME21N işleminden çıkmayın."],info:null,warn:null,result:"PO başarıyla oluşturulur."},
{num:"3",title:"Dönüştürülen Talebin İşlem Durumu",app:"SAP GUI – ME21N",path:["Document Overview","Purchase Requisition Number","Item Details","Status Tab"],fields:[["İşlem Durumu","PO created"]],steps:["Document Overview'da dönüştürdüğünüz talep numarasını çift tıklayın.","B500-## (Oil tray 500/##) kalemi için item detail'i açın.","<b>Status</b> sekmesine tıklayın — işlem durumu <b>PO created</b> olmalıdır."],info:null,warn:null,result:"İşlem durumu: PO created."}
]},
{id:28,title:"Convert Purchase Requisitions Automatically to Purchase Order",app:"SAP GUI – MK02 / MM02 / ME59N / ME23N",sc:"T-S52A## tedarikçisine atanmış tüm talepler otomatik olarak PO'ya dönüştürülmeli.",tasks:[
{num:"1",title:"Tedarikçi T-S52A## Automatic PO Göstergesini Kontrol Et (MK02)",app:"SAP GUI – MK02",path:["Logistics","Materials Management","Purchasing","Master Data","Vendor","Purchasing","Change Current (MK02)"],fields:[["Supplier","T-S52A##"],["Purchasing Organization","101C"],["Purchasing Data","X"],["Change in BP role","FLVN01 Supplier (Maintained)"],["Automatic Purchase Order göstergesi","X (Zaten set edilmiş)"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Master Data → Vendor → Purchasing → Change (Current) (MK02)</b>'ye gidin.","Supplier <b>T-S52A##</b>, Purchasing Organization <b>101C</b>, Purchasing Data <b>X</b> girin; <b>Enter</b>.","<b>Change in BP role</b> alanının <b>FLVN01 Supplier (Maintained)</b> olduğunu kontrol edin; değilse değiştirin.","<b>Purchasing</b>'e tıklayın.","<b>Purchasing Data</b> sekmesinde <b>Automatic Purchase Order</b> göstergesini kontrol edin — set edilmiş olmalıdır."],info:"Gösterge zaten set edilmiş durumdadır.",warn:null,result:null},
{num:"2",title:"Malzemelerde Automatic PO Göstergesini Kontrol Et (MM02)",app:"SAP GUI – MM02",path:["Logistics","Materials Management","Material Master","Material","Change","Immediately (MM02)"],fields:[["Malzemeler","A500-## / C500-## / D500-##"],["View","Purchasing"],["Plant","1010"],["Automatic PO","X (Set edilmiş)"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Material Master → Material → Change → Immediately (MM02)</b>'ye gidin.","Material <b>A500-##</b> girin; <b>Enter</b>.","<b>Purchasing</b> görünümünü seçin; Plant <b>1010</b> girin; <b>Enter</b>.","<b>Automatic PO</b> göstergesini kontrol edin — set edilmiş olmalıdır.","İlk material için view seçimini ve org. levels'ı varsayılan olarak kaydedin.","C500-## ve D500-## için aynı adımları tekrarlayın."],info:"Tüm malzemelerde Automatic PO göstergesi set edilmiş olmalıdır.",warn:null,result:null},
{num:"3",title:"Otomatik PO Dönüşümü (ME59N)",app:"SAP GUI – ME59N",path:["Logistics","Materials Management","Purchasing","Purchase Requisition","Follow-On Functions","Create Purchase Order","Automatically via Purchase Requisitions (ME59N)"],fields:[["Purchasing Group","Z##"],["Fixed Vendor","T-S52A##"],["New PO — Per Purchasing Group","Selected (Seçili)"],["Detailed Log","2 (All Messages)"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Purchase Requisition → Follow-On Functions → Create Purchase Order → Automatically via Purchase Requisitions (ME59N)</b>'ye gidin.","Tablodaki değerleri girin.","<b>(Execute)</b>'e tıklayın.","Fonksiyon tamamlandığında mesajları not edin.","PO numarasını not edin."],info:null,warn:null,result:"'Purchase order successfully created, Requisition successfully converted.' mesajı görünür. PO numarasını not edin."},
{num:"4",title:"PO'da Referans Bilgileri ve Sözleşme Indirimi",app:"SAP GUI – ME23N",path:["Logistics","Materials Management","Purchasing","Purchase Order","Display (ME23N)"],fields:[["PO numarası","<ME59N'den not alınan>"],["PR numarası (sağa kaydırınca)","PR No. / PR Item görünür"],["Outline Agreement","Contract numarası görünür"],["%5 Header Condition","Conditions sekmesinde RA01 ile"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Purchase Order → Display (ME23N)</b>'e gidin.","<b>Purchase Order → Other Purchase Order</b>; PO numarasını girin ve <b>Other Document</b>'e tıklayın.","Item overview'da sağa kaydırın — <b>Purchase Requisition</b>, <b>Requisition Item</b> ve <b>Outline Agreement</b>, <b>Contract Item</b> kolonlarını görün.","Bir kalemin net fiyatını çift tıklayın — <b>Conditions</b> sekmesinde %5 header condition indirimi (RA01) görünür.","Sonraki adım için işlemden çıkmayın."],info:null,warn:null,result:"PO kalemlerinde PR numarası, sözleşme numarası ve %5 indirim görüntülenir."},
{num:"5",title:"Sözleşme Release Dokümantasyonu",app:"SAP GUI – ME23N",path:["ME23N","Item Overview","Contract Number","Item","Statistics","Release Documentation"],fields:[],steps:["Item overview'da sözleşme numarasını çift tıklayın — sözleşme açılır.","Bir sözleşme kalemini seçin.","<b>Item → Statistics → Release Documentation</b>'a gidin.","PO numarasının dokümantasyona eklendiğini doğrulayın."],info:null,warn:null,result:"Release dokümantasyonu doğru şekilde güncellenmiştir."}
]},
{id:29,title:"Post Goods Receipt with Transaction for Goods Movements",app:"SAP GUI – MIGO_GR / MMBE",sc:"T-S50A## ve T-S52A## tedarikçileri malzemeleri teslim ediyor. Mal girişlerini MIGO ile kaydedin.",tasks:[
{num:"1",title:"MIGO Varsayılan Değerlerini Ayarlama",app:"SAP GUI – MIGO_GR",path:["Logistics","Materials Management","Inventory Management","Goods Movement","GR for Purchase Order (MIGO_GR)","Settings","Default Values"],fields:[["Storage Location","0001"],["Plant","1010"],["Propose the OK Function in Future","X"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Inventory Management → Goods Movement → GR for Purchase Order (MIGO_GR)</b>'ye gidin.","<b>Settings → Default Values</b>'a gidin.","Tablodaki değerleri girin.","<b>Adopt</b>'a tıklayın; ipucu mesajını <b>(Continue)</b> ile onaylayın.","İşlemden çıkmayın."],info:null,warn:null,result:null},
{num:"2",title:"T-S52A## Teslimatı İçin Mal Girişi",app:"SAP GUI – MIGO",path:["MIGO","Goods Receipt","Purchase Order","(Find Purch. Order)"],fields:[["Transaction","Goods Receipt"],["Reference Document","Purchase Order"],["Find PO – Vendor","T-S52A##"],["Find PO – Plant","1010 (NOT Supplying Plant)"],["Delivery Note","DN##06"],["Stock Type","Unrestricted-Use"],["Storage Location","0001 (Material)"]],steps:["Transaction <b>Goods Receipt</b>, reference document <b>Purchase Order</b>'ı seçin.","<b>(Find Purch. Order)</b>'a tıklayın.","Vendor <b>T-S52A##</b>, Plant <b>1010</b> girin (Supplying Plant değil!); <b>Find</b>'a tıklayın.","PO'nuzun tüm kalemlerini seçin; <b>(Adopt)</b>'a tıklayın.","Arama alanını <b>(Close Search Result)</b> ile kapatın.","<b>General</b> sekmesinde Delivery Note <b>DN##06</b>'yı girin.","Tüm kalemler için <b>OK</b> checkbox'larının seçili olduğunu kontrol edin.","Stok malzemeleri için Storage Location'ın <b>Material (0001)</b> olduğunu kontrol edin.","<b>Post</b>'a tıklayın; materyal belge numarasını not edin.","İşlemden çıkmayın."],info:null,warn:null,result:null},
{num:"3",title:"Materyal Belgesi ve Muhasebe Belgesi İnceleme",app:"SAP GUI – MIGO",path:["MIGO","Display","Material Document","(Execute)","Document info tab","FI Documents"],fields:[],steps:["<b>Display</b> transaction'ını seçin — <b>Material Document</b> referans belgesi ve son materyal belge numaranız otomatik önerilir.","<b>(Execute)</b>'e tıklayın.","Header data'da <b>Document info</b> sekmesine tıklayın.","<b>FI Documents</b>'a tıklayarak muhasebe belgesine gidin.","<b>List of Documents in Accounting</b> dialog'unda muhasebe belgesini çift tıklayın.","<b>(Back)</b> ile materyal belgesine dönün."],info:null,warn:null,result:null},
{num:"4",title:"B500-## Stok Analizi (Mal Girişi Öncesi)",app:"SAP GUI – MMBE",path:["Logistics","Materials Management","Inventory Management","Environment","Stock","Stock Overview (MMBE)"],fields:[["Material","B500-##"],["Plant","1010"],["Unrestricted use","10 PC"],["Quality inspection","0 PC"],["On-Order Stock","20 PC"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Inventory Management → Environment → Stock → Stock Overview (MMBE)</b>'ye gidin.","Material <b>B500-##</b>, Plant <b>1010</b> girin; <b>(Execute)</b>'e tıklayın.","Unrestricted-use, Quality inspection ve On-Order Stock değerlerini tablodaki beklenen değerlerle karşılaştırın."],info:null,warn:null,result:"Unrestricted use: 10 PC | Quality inspection: 0 PC | On-Order Stock: 20 PC"},
{num:"5",title:"B500-## Kalite Muayene Stoğuna Mal Girişi",app:"SAP GUI – MIGO",path:["MIGO","Goods Receipt","Purchase Order","Item Detail","Where Tab","Quality Inspection Stock"],fields:[["Material","B500-##"],["Supplier","T-S50A##"],["Delivery Note","DN##07"],["Plant","1010"],["Stock Type","Quality Inspection"],["Storage Location","0001"]],steps:["MIGO'da Goods Receipt, Purchase Order'ı seçin.","Kendi PO numaranızı girin (bilmiyorsanız: <b>(Find Purch. Order)</b> → material <b>B500-##</b>, vendor <b>T-S50A##</b>, plant <b>1010</b>).","<b>General</b> sekmesinde Delivery Note <b>DN##07</b>'yi girin.","Gerekirse item number'a tıklayarak item detayını açın.","<b>Where</b> sekmesinde Stock Type olarak <b>Quality Inspection</b>'ı seçin.","<b>Post</b>'a tıklayın; materyal belge numarasını not edin."],info:null,warn:null,result:"Materyal belgesi oluşturulur."},
{num:"6",title:"B500-## Stok Analizi (Mal Girişi Sonrası)",app:"SAP GUI – MMBE",path:["Logistics","Materials Management","Inventory Management","Environment","Stock","Stock Overview (MMBE)"],fields:[["Material","B500-##"],["Plant","1010"],["Unrestricted use","10 PC"],["Quality inspection","20 PC"],["On-Order Stock","0 PC"]],steps:["<b>MMBE</b>'ye gidin; B500-##, Plant 1010.","<b>(Execute)</b>'e tıklayın; stok değerlerini not edin."],info:null,warn:null,result:"Unrestricted use: 10 PC | Quality inspection: 20 PC | On-Order Stock: 0 PC"}
]},
{id:30,title:"Enter an Invoice with Advanced Transaction",app:"SAP GUI – MIRO",sc:"T-S52A## tedarikçisi fatura IV##06 için MIRO işlemini kullanarak lojistik fatura doğrulama ile fatura girin.",tasks:[
{num:"1",title:"MIRO ile Fatura Girişi",app:"SAP GUI – MIRO",path:["Logistics","Materials Management","Logistics Invoice Verification","Document Entry","Enter Invoice (MIRO)"],fields:[["Company Code","1010"],["Invoice Date","<Bugünün tarihi>"],["Reference","IV##06"],["Amount","EUR 12,435.50"],["Tax Amount","EUR 1,130.50"],["Tax Code","1I (10% Input Tax (Training))"],["Reference Document Category","Delivery Note"],["Delivery Note","DN##06"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Logistics Invoice Verification → Document Entry → Enter Invoice (MIRO)</b>'ya gidin.","Company Code <b>1010</b> girin ve <b>(Continue)</b>'ya basın.","<b>Basic Data</b> sekmesinde tablodaki verileri girin.","<b>PO Reference</b> sekmesinde referans belge kategorisi olarak <b>Delivery Note</b>'u seçin; Delivery Note <b>DN##06</b>'yı girin.","<b>(Enter)</b>'a basın — sistem PO verilerini önerir; bakiye sıfır olmalıdır.","<b>Simulate</b>'e tıklayın.","<b>Post</b>'a tıklayın; fatura belge numarasını not edin."],info:null,warn:null,result:"Fatura belgesi oluşturulur."},
{num:"2",title:"Fatura Belgesini Görüntüleme ve PO Geçmişi",app:"SAP GUI – MIRO",path:["MIRO","Invoice Document","Display","Show PO structure"],fields:[],steps:["<b>Invoice Document → Display</b>'i seçin; sistem son faturayı önerir.","<b>(Continue)</b>'ya tıklayın.","<b>Show PO structure</b>'a tıklayın — PO geçmişi gösterilir.","Alternatif: Item overview'da PO numarasını çift tıklayın; bir kalemin detail data'sında <b>Purchase Order History</b> sekmesini seçin."],info:null,warn:null,result:"PO geçmişi hem Goods Receipt hem de Invoice kaydını doğru şekilde gösterir."}
]}
]},
{unit:8,title:"Automated Procurement Process",ex:[
{id:31,title:"Material Master Record: Create MRP Data",app:"Display Material / Create Material",sc:"E500-## malzemesi gelecekte MRP ile otomatik planlanacak. MRP görünümü henüz oluşturulmamış; önce görüntüle, sonra oluştur.",tasks:[
{num:"1",title:"MRP Görünümünün Mevcut Olup Olmadığını Kontrol Etme",app:"Display Material",path:["Material Master","Display Material","Select View(s)"],fields:[["Material","E500-##"]],steps:["<b>Display Material</b> uygulamasını başlatın (tile grubu <b>Material Master</b>).","Material <b>E500-##</b> girin ve <b>Select View(s)</b>'e tıklayın.","<b>Select View(s)</b> penceresinde MRP görünümünün kullanıcı departmanı tarafından henüz oluşturulmadığını kontrol edin."],info:"MRP görünümü henüz oluşturulmamıştır.",warn:null,result:null},
{num:"2",title:"MRP Verisi Oluşturma",app:"Create Material",path:["Material Master","Create Material"],fields:[["Material","E500-##"],["Views","MRP 1 + MRP 2"],["Plant","1010"],["MRP Type (MRP 1)","VB (Manual Reorder Point)"],["Reorder Point (MRP 1)","100 PC"],["MRP Controller (MRP 1)","0##"],["Lot Sizing Procedure (MRP 1)","FX (Fixed Lot Size)"],["Fixed Lot Size (MRP 1)","300 PC"],["Planned Delivery Time (MRP 2)","7 gün"],["GR Processing Time (MRP 2)","1 gün (zaten girilmiş olmalı)"]],steps:["<b>Create Material</b> uygulamasını başlatın (tile grubu <b>Material Master</b>).","MRP verisi henüz oluşturulmadığı için <b>Change Material değil Create Material</b> kullanılmalıdır.","Material <b>E500-##</b> girin; <b>Continue</b>'ya basın — malzeme tipi ve sektörün kopyalanacağına dair mesajı <b>Continue</b> ile onaylayın.","<b>MRP 1</b> ve <b>MRP 2</b> görünümlerini seçin; <b>(Continue)</b>'ya basın.","Plant <b>1010</b> girin; <b>(Continue)</b>'ya basın.","MRP 1 görünümünde tablodaki verileri girin.","<b>MRP 2</b> sekmesine tıklayın; tablodaki verileri girin.","<b>Save</b>'e tıklayın."],info:null,warn:"MRP verisi hiç oluşturulmamışsa <b>Create Material</b> (Change Material değil!) kullanılmalıdır.",result:null}
]},
{id:32,title:"Run MRP with Automatic Source Determination",app:"Manage Purchasing Info Records / Check Material Coverage",sc:"MRP malzeme gereksinimlerini belirleyecek ve mümkünse otomatik kaynak ataması yapacak.",tasks:[
{num:"1",title:"Info Record'da Automatic Sourcing Göstergesini Seç",app:"Manage Purchasing Info Records",path:["Sources of Supply Management","Manage Purchasing Info Records"],fields:[["Material","E500-##"],["Supplier","T-S50C##"],["Automatic Sourcing","X (Seçili)"]],steps:["<b>Manage Purchasing Info Records</b> uygulamasını başlatın (tile grubu <b>Sources of Supply Management</b>).","Gerekirse <b>(Expand Header)</b>'a tıklayın; Material <b>E500-##</b>, Supplier <b>T-S50C##</b> girin.","<b>Go</b>'ya tıklayın.","Info record satırının sağındaki <b>(arrow)</b> ikonuna tıklayarak detayları açın.","<b>Edit</b>'e tıklayın.","<b>Delivery and Quantity</b> bölümünde <b>Automatic Sourcing</b> göstergesini işaretleyin.","<b>Save</b>'e tıklayın."],info:null,warn:null,result:null},
{num:"2",title:"Stok/Gereksinim Listesini Görüntüleme",app:"Check Material Coverage",path:["MRP","Check Material Coverage"],fields:[["Material","E500-##"],["Plant","1010"],["Shortage Definition","MRP Standard"]],steps:["<b>Check Material Coverage</b> uygulamasını açın (tile grubu <b>MRP</b>).","Tablodaki verileri girin ve <b>OK</b>'e tıklayın.","<b>Stock/Requirements List</b> sekmesinde: mevcut miktar 10 PC'nin reorder point olan 100 PC'nin altında olduğunu görün.","Listeden çıkmayın."],info:"Mevcut miktar (10 PC) reorder point'in (100 PC) altındadır — MRP yeni talep oluşturur.",warn:null,result:null},
{num:"3",title:"MRP Çalıştırma ve Sonucu Kontrol Etme",app:"Check Material Coverage",path:["Check Material Coverage","Stock/Requirements List","Start MRP Run"],fields:[["Requested Quantity","300 PC"],["Fixed Vendor","T-S50C##"]],steps:["<b>Stock/Requirements List</b> ekranında sağ alttaki <b>Start MRP Run</b> butonuna tıklayın.","'MRP run in progress' mesajını bekleyin.","MRP tamamlandığında listede yeni satın alma talebinin oluştuğunu görün — talep miktarı <b>300 PC</b>.","Satın alma talebi numarasına tıklayarak <b>Quick View</b>'ı açın.","Fixed Vendor'ı not edin: <b>T-S50C##</b>."],info:null,warn:null,result:"300 PC'lik satın alma talebi oluşur. Fixed Vendor: T-S50C##."}
]},
{id:33,title:"Create a Purchase Order Automatically",app:"Maintain Business Partner / Change Material / Automatic Creation of POs from Requisitions",sc:"MRP'nin oluşturduğu talep otomatik PO'ya dönüştürülecek. Aynı zamanda ERS de aktifleştirilecek.",tasks:[
{num:"1",title:"T-S50C## Tedarikçi Göstergelerini Doğrulama ve ERS Ayarlama",app:"Maintain Business Partner",path:["Supplier and BP","Maintain Business Partner"],fields:[["Business Partner","T-S50C##"],["BP Role","FLVN01 (Supplier)"],["GR-Based Invoice Verification","X (Purchasing Data – Control Data bölümünde — kontrol edin)"],["Automatic Purchase Order","X (Purchasing Data – Additional Purchasing Data — kontrol edin)"],["Eval. Receipt Settlement","X (Additional Purchasing Data — SET EDIN)"]],steps:["<b>Maintain Business Partner</b> uygulamasını başlatın (tile grubu <b>Supplier and BP</b>).","<b>T-S50C##</b> girin; <b>Start</b>'a tıklayın.","Tedarikçi numarasını çift tıklayın.","<b>Display in BP role</b> alanından <b>(arrow)</b>: <b>Supplier (FLVN01)</b>'i seçin.","<b>Purchasing</b>'e tıklayın (menü üstünde).","Purchasing Organization'ın <b>101C</b> olduğunu doğrulayın.","<b>Purchasing Data</b> sekmesinde <b>Control Data</b> bölümünde <b>GR-Based Invoice Verif.</b> göstergesini kontrol edin — set edilmiş olmalıdır.","<b>Additional Purchasing Data</b> bölümünde: <b>Automatic Purchase Order</b> set edilmiş; <b>Eval. Receipt Settlement</b> SET EDİLMEMİŞ.","<b>Switch Between Display and Change</b>'e tıklayın (menü üstünde).","<b>Additional Purchasing Data</b> bölümünde <b>Eval. Receipt Settlement</b> göstergesini işaretleyin.","<b>Save</b>'e tıklayın."],info:null,warn:null,result:null},
{num:"2",title:"E500-## Malzemesinde Automatic PO Göstergesini Ayarlama",app:"Change Material",path:["Material Master","Change Material"],fields:[["Material","E500-##"],["View","Purchasing"],["Plant","1010"],["Automatic PO (Autom. PO)","X (Set edin)"]],steps:["<b>Change Material</b> uygulamasını başlatın (tile grubu <b>Material Master</b>).","Material <b>E500-##</b> girin; <b>Continue</b>'ya basın.","<b>Purchasing</b> görünümünü seçin; <b>Org. Levels</b>'a basın; Plant <b>1010</b> girin; <b>(Continue)</b>'ya basın.","<b>General Data</b> bölümünde <b>Autom. PO</b> göstergesini işaretleyin.","<b>Save</b>'e tıklayın."],info:null,warn:null,result:null},
{num:"3",title:"Otomatik PO Oluşturma",app:"Automatic Creation of Purchase Orders from Requisitions",path:["SAP Fiori Search (üst sağ köşe)","Apps","Automatic Creation of Purchase Orders from Requisitions"],fields:[["Purch. Organization","101C"],["Fixed Vendor","T-S50C##"],["Detailed Log","2 (All Messages)"]],steps:["SAP Fiori Search'te <b>Search In</b> alanını <b>Apps</b> olarak seçin.","<b>Automatic Creation of Purchase Orders from Requisitions</b> uygulamasını arayın; yeni sekmede açılır.","Tablodaki verileri girin.","<b>Execute</b>'e tıklayın.","Fonksiyon tamamlandığında mesajları not edin; PO numarasını not edin."],info:null,warn:null,result:"'Purchase order successfully created, Requisition successfully converted.' mesajı görünür. PO numarasını not edin."}
]},
{id:34,title:"Execute Evaluated Receipt Settlement",app:"Manage Purchase Orders / Post GR / Create Evaluated Receipt Settlement",sc:"Otomatik oluşturulan PO için mal girişi yapın ve ERS ile otomatik fatura oluşturun.",tasks:[
{num:"1",title:"PO Kaleminde Göstergeleri Doğrulama",app:"Manage Purchase Orders",path:["Purchase Order Processing","Manage Purchase Orders"],fields:[["PO Numarası","<Ex.33'ten not alınan>"],["Tax Code","Doğrulayın"],["GR-Based Invoice Verification","X (Process Control)"],["Automatic GR Settlement (ERS)","X (Process Control)"]],steps:["<b>Manage Purchase Orders</b> uygulamasını başlatın (tile grubu <b>Purchase Order Processing</b>).","PO numarasını veya supplier <b>T-S50C##</b>'yi girin; <b>Go</b>.","Satır sağındaki <b>(arrow)</b> ikonuna tıklayın — PO detayı açılır.","<b>Items</b> sekmesine tıklayın; kalem sağındaki <b>(arrow)</b>'a tıklayın.","<b>Process Control</b> ve <b>Tax</b> bölümlerinde istenen göstergelerin set edildiğini kontrol edin.","<b>(Back)</b>'e iki kez tıklayarak PO listesinde kalın."],info:null,warn:"Bu task tamamlandıktan sonra <b>Manage Purchase Orders</b> uygulamasından ÇIKMAYIN — sonraki task için gereklidir.",result:null},
{num:"2",title:"Manage PO'dan Mal Girişi",app:"Manage Purchase Orders",path:["Manage Purchase Orders","PO List","Standard PO","Post Goods Receipt for Purchasing Document"],fields:[["Delivery Note","DN##08"],["Document Date","<Bugünün tarihi>"],["Storage Location","0001"]],steps:["PO listesinde satırın ilk kolonunda <b>Standard PO</b>'ya tıklayın.","<b>Post Goods Receipt for Purchasing Document</b>'i seçin.","Delivery note <b>DN##08</b> girin.","Storage location <b>0001</b>'i seçin.","<b>Post</b>'a tıklayın — materyal belge numarasını not edin."],info:null,warn:null,result:"Materyal belgesi oluşturulur. Belge numarasını not edin."},
{num:"3",title:"ERS ile Otomatik Fatura Oluşturma",app:"Create Evaluated Receipt Settlement",path:["Supplier Invoice Processing","Create Evaluated Receipt Settlement"],fields:[["Company Code","1010"],["Goods Receipt Posting Date From","<Dünün tarihi>"],["Goods Receipt Posting Date To","<Bugünün tarihi>"],["Supplier","T-S50C##"],["Document Selection","3 (Document Selection per Order Item)"],["Test Run","X (Önce test çalıştırın)"]],steps:["<b>Create Evaluated Receipt Settlement</b> uygulamasını başlatın (tile grubu <b>Supplier Invoice Processing</b>).","Tablodaki verileri girin; <b>Test Run</b>'ı işaretleyin.","<b>Execute</b>'e tıklayın.","Bir kalem settlement için seçilir — sol kolonda 'postable' (kayıt edilebilir) olduğu görülür.","<b>Cancel</b>'e tıklayın.","<b>Test Run</b> checkbox'ını kaldırın.","<b>Execute</b>'e tıklayın.","<b>Inv. Doc. No.</b> kolonundan fatura belge numarasını not edin.","Faturayı açmak için belge numarasına tıklayın (isteğe bağlı)."],info:null,warn:null,result:"ERS ile otomatik fatura oluşturulur. Fatura belge numarasını not edin. FI Doc. kolonunda ilgili muhasebe belgesi görünür."}
]}
]},
{unit:9,title:"Reporting and Analytics",ex:[
{id:35,title:"Evaluate Some KPIs for Contracts",app:"Contract Expiry / Off-Contract Spend / Manage Purchase Contracts",sc:"Analytics tile grubu oluşturun ve sözleşme KPI'larını analiz edin.",tasks:[
{num:"1",title:"Analytics Tile Grubu Oluşturma",app:"SAP Fiori Launchpad",path:["SAP Fiori Launchpad","(Profile of Employee)","Edit Home Page","+ Add Group"],fields:[["Tile Grubu Adı","Analytics"],["App 1 (Catalog: Purchasing Analytics)","Contract Expiry"],["App 2 (Catalog: Purchasing Analytics)","Off-Contract Spend"],["App 3 (Catalog: Purchasing Analytics)","Purchasing Group Activities"],["App 4 (Catalog: Purchasing – Procurement Overview Page)","Procurement Overview"]],steps:["Sağ üst köşede <b>(Profile of Employee)</b>'a tıklayın.","<b>Edit Home Page</b>'i seçin.","İstediğiniz konumda <b>+ Add Group</b>'a tıklayın; <b>Analytics</b> adını girin.","<b>(App Finder)</b>'a tıklayın.","Sol taraftan <b>Purchasing Analytics</b> kataloğunu seçin.","<b>Contract Expiry</b>, <b>Off-Contract Spend</b> ve <b>Purchasing Group Activities</b> uygulamalarını raptiyeleyin.","Sol taraftan <b>Purchasing – Procurement Overview Page</b> kataloğunu seçin.","<b>Procurement Overview</b> uygulamasını raptiyeleyin.","<b>(Navigate to Home)</b>'a tıklayarak geri dönün.","<b>Close</b> ile kişiselleştirme modundan çıkın."],info:null,warn:null,result:null},
{num:"2",title:"Sona Erme Analizi — Maksimum Gün Sayısı",app:"Contract Expiry",path:["Analytics","Contract Expiry"],fields:[["Filter: Relative Date Function","Sonraki 90 gün içinde"]],steps:["<b>Analytics</b> tile grubunda <b>Contract Expiry</b> tile'ına bakın — sona yaklaşan sözleşme sayısı tile üzerinde gösterilir.","<b>Contract Expiry</b> uygulamasını başlatın.","Filtre alanındaki <b>Relative Date Function</b> girişini kontrol edin — sonraki <b>90 gün</b> içinde sona erecek sözleşmeler seçilmiştir.","Drilldown'ı <b>By Supplier</b>'dan <b>By Purchasing Organization</b>'a değiştirin.","101C için en az bir sözleşme listelenmelidir.","<b>(Navigate to Home)</b>'a tıklayın."],info:"Tile'daki bilgi tüm satın alma organizasyonlarını kapsar. Maksimum gün sayısı: 90 gün.",warn:null,result:null},
{num:"3",title:"KPI Tile Oluşturma (Actual vs. Target)",app:"Contract Expiry",path:["Analytics","Contract Expiry","(Share)","Save as Tile"],fields:[["Tile Format","Actual vs. Target"],["Title","Contract Expiry"],["Subtitle","Actual vs. Target"],["Groups","Analytics"],["Value Measure","Expiring Contracts"],["Goal Type","Minimizing"],["Critical","10"],["Warning","3"],["Target","0"]],steps:["<b>Contract Expiry</b> uygulamasını başlatın (tile grubu <b>Analytics</b>).","Sağ üst köşede <b>(Share)</b> ikonuna tıklayın.","<b>Save as Tile</b>'ı seçin.","Tablodaki verileri girin ve <b>OK</b>'e tıklayın.","SAP Fiori Launchpad ana sayfasına dönün; <b>F5</b> ile yenileyin.","<b>Analytics</b> tile grubunda yeni KPI tile'ını görün.","Tile'a tıklayarak uygulamayı açın; sonraki adım için uygulamada kalın."],info:null,warn:null,result:null},
{num:"4",title:"Sözleşme Tarihi Güncelleme",app:"Contract Expiry → Manage Purchase Contracts",path:["Contract Expiry","(Add Filter)","Supplier: T-S52A##","Jump To","Manage Purchase Contracts"],fields:[["Supplier Filter","T-S52A##"],["Valid To","<Gelecek yıl sonu>"]],steps:["Filtre çubuğu kapalıysa <b>(Expand Header)</b>'a tıklayın.","<b>(Add Filter)</b>'e tıklayın; <b>Supplier</b>'ı seçin.","<b>(Search)</b>'e tıklayın; <b>T-S52A##</b>'yi seçin ve <b>OK</b>'e tıklayın.","Sağ üstte <b>Jump To → Manage Purchase Contracts</b>'a tıklayın — filtre değerleriyle uygulama açılır.","Sözleşme numarasına tıklayın.","<b>Edit</b>'e tıklayın.","<b>Valid To</b> tarihini gelecek yıl sonuna değiştirin; <b>Save</b>'e tıklayın.","SAP Fiori Launchpad ana sayfasına dönün; <b>Contract Expiry</b> KPI tile'ını kontrol edin.","Tile'ı yenilemek için <b>(Refresh)</b> ikonuna tıklayın — sona erme sayısı azalmış olmalıdır."],info:null,warn:null,result:"Sona erme KPI'ı düşer (sözleşme uzatıldı)."},
{num:"5",title:"Sözleşme Dışı Harcama Analizi",app:"Off-Contract Spend",path:["Analytics","Off-Contract Spend","(Add Filter): Calendar Year","By Purchasing Organization"],fields:[["Filter: Calendar Year","<Cari yıl>"],["View","By Purchasing Organization"],["101C için yazılacak değerler","Off Contract Spend Amount / Off Contract Spend %"]],steps:["<b>Off-Contract Spend</b> uygulamasını başlatın (tile grubu <b>Analytics</b>).","Filtre çubuğu kapalıysa <b>(Expand Header)</b>'a tıklayın.","<b>(Add Filter)</b>'e tıklayın; <b>Calendar Year</b>'ı seçin; cari yılı seçin ve <b>OK</b>.","Görünümü <b>By Purchasing Organization</b>'a değiştirin.","101C için <b>Off Contract Spend Amount</b> (mavi bar) ve <b>Off Contract Spend %</b> (turuncu bar) değerlerini not edin.","Sonraki adım için uygulamada kalın."],info:null,warn:null,result:null},
{num:"6",title:"Tedarikçi Bazlı Filtreleme",app:"Off-Contract Spend",path:["Off-Contract Spend","(Add Filter): Supplier","By Supplier"],fields:[["Supplier Filter","T-S50A## / T-S50C## / T-S52A##"]],steps:["<b>(Add Filter)</b>'e tıklayın; <b>Supplier</b>'ı seçin.","<b>(Search)</b>'e tıklayın; <b>T-S50A##</b>, <b>T-S50C##</b> ve <b>T-S52A##</b>'yi seçin; <b>OK</b>.","Görünümü <b>By Supplier</b>'a değiştirin.","Sözleşme kapsamı dışında harcaması olmayan tedarikçileri kontrol edin."],info:null,warn:null,result:"Yanıt önceki egzersizlere göre değişir."}
]},
{id:36,title:"Control the Purchasing Group Activities",app:"Purchasing Group Activities",sc:"Z## satın alma grubunuzla kaç satın alma belgesi oluşturulduğunu analiz edin.",tasks:[
{num:"1",title:"Varsayılan Grafik Tipi ve Ölçüleri Belirleme",app:"Purchasing Group Activities",path:["Analytics","Purchasing Group Activities"],fields:[["Grafik Tipi","Column Chart with 2 Y-Axes"],["1. Y-Ekseni Ölçüleri","# of POs, # of Contracts, # of Deliveries, Scheduling Agreement"],["2. Y-Ekseni Ölçüleri","Invoice Amount, PO Net Amount"],["Varsayılan View","By Purchasing Group"]],steps:["<b>Purchasing Group Activities</b> uygulamasını başlatın (tile grubu <b>Analytics</b>).","Sağ üstteki <b>(Chart Type)</b> butonu üzerine gelin — <b>Column Chart with 2 Y-Axes</b> olarak ayarlandığını görün.","Legend veya kolon bölümlerine tıklayarak ölçü isimlerini öğrenin.","Sol üstteki view'ın <b>By Purchasing Group</b> olduğunu not edin.","Uygulamadan çıkmayın."],info:"Varsayılan grafik tipi: Column Chart with 2 Y-Axes | 1. Y-ekseni: PO sayısı, Sözleşme sayısı, Teslimat sayısı, Scheduling Agreement | 2. Y-ekseni: Fatura tutarı, PO net tutarı | Varsayılan view: By Purchasing Group",warn:null,result:null},
{num:"2",title:"Grafik Ayarlarını Yapılandırma",app:"Purchasing Group Activities",path:["Purchasing Group Activities","(Settings)"],fields:[["Dimension 1","Calendar Year — Category"],["Dimension 2","Calendar Month — Category"],["Dimension 3","Purchasing Group — Category"],["Measure 1 (Axis 1)","Number of POs"],["Measure 2 (Axis 2)","PO Net Amount"],["Sıralama 1","Calendar Year — Ascending"],["Sıralama 2","Calendar Month — Ascending"],["Sıralama 3","Purchasing Group — Ascending"]],steps:["<b>(Settings)</b> ikonuna tıklayın.","Tablodaki Dimension ve Measure değerlerini seçin; diğerlerini kaldırın (sağ taraftaki <b>(X)</b> ile).","Sırayı ve rolleri tabloya göre düzenleyin (<b>(Up)</b> ve <b>(Down)</b> oklarını kullanın).","<b>Sort</b> sekmesine tıklayın; tablodaki sıralama değerlerini girin.","<b>OK</b>'e tıklayın.","Uygulamadan çıkmayın."],info:null,warn:null,result:null},
{num:"3",title:"Z## Satın Alma Grubu Filtresi ve Excel Export",app:"Purchasing Group Activities",path:["Purchasing Group Activities","(Add Filter): Purchasing Group Z##","(Drill Down): Supplier","(Tabular View)","(Export to Spreadsheet)"],fields:[["Filter: Purchasing Group","Z## (Purch. Group Z##)"]],steps:["<b>(Add Filter)</b>'e tıklayın; <b>Purchasing Group</b>'u seçin; <b>Z##</b>'yi arayın ve seçin; <b>OK</b>.","<b>(Drill Down)</b>'a tıklayın; <b>Supplier</b>'ı seçin.","<b>(Tabular View)</b> ikonuna tıklayın — tedarikçi isimleri listede görünür.","<b>(Export to Spreadsheet)</b> ikonuna tıklayın.","Tarayıcının indirme geçmişinden dosyayı açın."],info:null,warn:null,result:"Tedarikçi bazında PO sayısı ve net tutar verileri Excel'e aktarılır."}
]},
{id:37,title:"Use the Procurement Overview Page",app:"Procurement Overview",sc:"Procurement Overview sayfasını kişiselleştirin ve Monitor Purchase Requisition Items kartını test edin.",tasks:[
{num:"1",title:"Varsayılan Filtre Varyantı Oluşturma",app:"Procurement Overview",path:["Analytics","Procurement Overview"],fields:[["Display Currency","EUR"],["Purchasing Group","Z##"],["Diğer değerleri silin","—"],["Varyant Adı","Z##"],["Set as Default","Evet"]],steps:["<b>Procurement Overview</b> uygulamasını başlatın (tile grubu <b>Analytics</b>).","Filtre çubuğuna Display Currency <b>EUR</b> ve Purchasing Group <b>Z##</b> girin; diğer tüm değerleri silin.","Sol üstten <b>(Select View)</b>'e tıklayın; <b>Save As</b>'i seçin.","Ad: <b>Z##</b>, <b>Set as Default</b>'ı işaretleyin; <b>Save</b>'e tıklayın.","Launchpad ana sayfasına dönün; <b>Procurement Overview</b>'ı tekrar başlatın — seçili view <b>Z##</b> olmalıdır.","<b>Go</b>'ya tıklayın."],info:null,warn:null,result:null},

const UC=['u1','u2','u3','u4','u5','u6','u7','u8','u9'];

function path(a){if(!a||!a.length)return'';return'<div class="pr">'+a.map((p,i)=>`<span class="pc">${p}</span>${i<a.length-1?'<span class="pa">›</span>':''}`).join('')+'</div>';}

function tbl(f){if(!f||!f.length)return'';return'<table class="fvt"><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>'+f.map(([a,b])=>`<tr><td>${a}</td><td>${b}</td></tr>`).join('')+'</tbody></table>';}

function steps(s){if(!s||!s.length)return'';return'<ol class="sl">'+s.map(x=>`<li><span></span>${x}</li>`).join('')+'</ol>';}

function task(t){
  let h=`<div class="task"><div class="thdiv"><span class="tn">Görev ${t.num}</span><span class="tt">${t.title}</span><span class="ab">${t.app}</span></div>`;
  if(t.path&&t.path.length){h+=`<div class="sl2">PATH</div>${path(t.path)}`;}
  if(t.fields&&t.fields.length){h+=`<div class="sl2">Field / Value</div>${tbl(t.fields)}`;}
  if(t.steps&&t.steps.length){h+=`<div class="sl2">Adımlar</div>${steps(t.steps)}`;}
  if(t.warn)h+=`<div class="box warn"><span class="bi">⚠</span><div>${t.warn}</div></div>`;
  if(t.info)h+=`<div class="box info"><span class="bi">ℹ</span><div>${t.info}</div></div>`;
  if(t.result)h+=`<div class="box result"><span class="bi">✓</span><div>${t.result}</div></div>`;
  return h+'</div>';
}

function card(e,uid){
  const sc=e.tasks.reduce((a,t)=>a+(t.steps?t.steps.length:0),0);
  const tc=e.tasks.length;
  const body=e.tasks.map((t,i)=>task(t)+(i<e.tasks.length-1?'<div class="dv"></div>':'')).join('');
  return `<div class="card" id="ex-${e.id}"><div class="ch" onclick="toggle(this)"><span class="exn">EX ${e.id}</span><div class="cl"><div class="ct">${e.title}</div><div class="ca">${e.app}</div></div><div class="cr"><span class="sb">${tc} görev · ${sc} adım</span><span class="chev">›</span></div></div><div class="cb"><div class="scenario">${e.sc}</div>${body}</div></div>`;
}

function unit(u,i){
  const cls=UC[i]||'u1';
  return `<div class="ug ${cls}"><div class="uh"><span class="ubadge">Ünite ${u.unit}</span><span class="utitle">${u.title}</span><span class="uc">${u.ex.length} egzersiz</span></div>${u.ex.map(e=>card(e,i)).join('')}</div>`;
}

// ── RENDER ──
document.getElementById('app').innerHTML=D.map((u,i)=>unit(u,i)).join('');

// ── BUILD FILTER BUTTONS ──
const USHORT=['Navigasyon','Org. Yapı','Plain Proc.','Master Data','Stock/Cons.','Self-Service','Adv. Trans.','Automated','Raporlama'];
const frow=document.getElementById('frow');
D.forEach(function(u,i){
  var b=document.createElement('button');
  b.className='fb';
  b.dataset.u=String(u.unit);
  b.textContent='U'+u.unit+' · '+(USHORT[i]||u.title.split(' ')[0]);
  frow.appendChild(b);
});

// snapshot card body HTML for highlight restore
const origHTML=new Map();
document.querySelectorAll('.card').forEach(function(c){
  var cb=c.querySelector('.cb');
  if(cb) origHTML.set(c.id,cb.innerHTML);
});

// ── STATE ──
var activeU='all';
var expanded=false;
var searchActive=false;

// ── ORIGINAL TOGGLE — untouched ──
function toggle(h){h.parentElement.classList.toggle('open');}

// ── EXPAND / COLLAPSE ALL ──
var xpb=document.getElementById('xpb');
xpb.addEventListener('click',function(){
  // when search is active, toggle only visible open cards
  if(searchActive){
    var visCards=[].slice.call(document.querySelectorAll('.card:not(.hid)'));
    var anyOpen=visCards.some(function(c){return c.classList.contains('open');});
    visCards.forEach(function(c){c.classList.toggle('open',!anyOpen);});
    xpb.textContent=!anyOpen?'Tümünü Kapat':'Tümünü Aç';
    xpb.classList.toggle('active',!anyOpen);
    return;
  }
  expanded=!expanded;
  document.querySelectorAll('.card:not(.hid)').forEach(function(c){
    c.classList.toggle('open',expanded);
  });
  xpb.textContent=expanded?'Tümünü Kapat':'Tümünü Aç';
  xpb.classList.toggle('active',expanded);
});

// ── SEARCH ELEMENTS ──
var searchEl=document.getElementById('search');
var clrBtn=document.getElementById('clr');
var cntEl=document.getElementById('cnt');
var nores=document.getElementById('nores');

function escRe(s){return s.replace(/[.+?^${}()|[\]\\]/g,'\\$&').replace(/\*/g,'\\*');}

function hlNode(node,re){
  var w=document.createTreeWalker(node,NodeFilter.SHOW_TEXT,null,false);
  var hits=[],n;
  while((n=w.nextNode())){
    if(n.parentElement.closest('mark')) continue;
    re.lastIndex=0;
    if(re.test(n.textContent)) hits.push(n);
  }
  hits.forEach(function(tn){
    var frag=document.createDocumentFragment();
    var last=0;
    tn.textContent.replace(re,function(m,o){
      frag.appendChild(document.createTextNode(tn.textContent.slice(last,o)));
      var mk=document.createElement('mark');
      mk.textContent=m;
      frag.appendChild(mk);
      last=o+m.length;
    });
    frag.appendChild(document.createTextNode(tn.textContent.slice(last)));
    tn.parentNode.replaceChild(frag,tn);
  });
}

// ── MAIN FILTER FUNCTION ──
function run(){
  var raw=searchEl.value.trim();
  var q=raw.toLowerCase();
  // safe regex — escape special chars
  var re=raw?new RegExp(raw.replace(/[.+?^${}()|[\]\\]/g,'\\$&').replace(/\*/g,'\\*'),'gi'):null;
  searchActive=!!raw;
  clrBtn.style.display=raw?'block':'none';
  var shown=0;
  var totalVisible=0;

  document.querySelectorAll('.ug').forEach(function(ug){
    var badge=ug.querySelector('.ubadge');
    var uNum=badge?badge.textContent.replace(/[^0-9]/g,''):'';
    var unitOk=(activeU==='all'||activeU===uNum);
    if(!unitOk){ug.classList.add('hid');return;}
    ug.classList.remove('hid');
    var ugVis=false;

    ug.querySelectorAll('.card').forEach(function(card){
      // restore original body HTML (removes stale highlights)
      var cb=card.querySelector('.cb');
      if(cb&&origHTML.has(card.id)) cb.innerHTML=origHTML.get(card.id);
      // remove highlights from card header
      var hdr=card.querySelector('.ch');
      if(hdr){
        hdr.querySelectorAll('mark').forEach(function(mk){
          mk.replaceWith(document.createTextNode(mk.textContent));
        });
        hdr.normalize();
      }

      // build searchable text from title + app name + full body
      var txt=(card.querySelector('.ct')?card.querySelector('.ct').textContent:'')+' '+
              (card.querySelector('.ca')?card.querySelector('.ca').textContent:'')+' '+
              (cb?cb.textContent:'');
      var match=!q||txt.toLowerCase().indexOf(q)>=0;

      if(match){
        card.classList.remove('hid');
        ugVis=true;
        shown++;
        totalVisible++;
        if(re){
          // apply highlight
          if(hdr) hlNode(hdr,re);
          if(cb) hlNode(cb,re);
          // auto-open card so highlights are visible
          if(!card.classList.contains('open')){
            card.classList.add('open');
            card.dataset.soq='1';
          }
        } else {
          // search cleared — close cards we auto-opened, restore expanded state
          if(card.dataset.soq){
            card.classList.remove('open');
            delete card.dataset.soq;
          }
          // re-apply expanded state
          if(expanded) card.classList.add('open');
        }
      } else {
        card.classList.add('hid');
        if(card.dataset.soq){card.classList.remove('open');delete card.dataset.soq;}
      }
    });

    ug.classList.toggle('hid',!ugVis);
  });

  // update counter
  cntEl.textContent=String(shown);

  // show no-result only when there is an active query or filter
  nores.style.display=(shown===0&&(raw||activeU!=='all'))?'block':'none';

  // sync expand button label — when search active, reflect visible open state
  if(raw){
    var anyOpen=[].slice.call(document.querySelectorAll('.card:not(.hid)')).some(function(c){return c.classList.contains('open');});
    xpb.textContent=anyOpen?'Tümünü Kapat':'Tümünü Aç';
    xpb.classList.toggle('active',anyOpen);
  } else {
    xpb.textContent=expanded?'Tümünü Kapat':'Tümünü Aç';
    xpb.classList.toggle('active',expanded);
  }
}

// ── EVENTS ──
searchEl.addEventListener('input',run);
searchEl.addEventListener('keydown',function(e){
  if(e.key==='Escape'){searchEl.value='';run();searchEl.blur();}
});
clrBtn.addEventListener('click',function(){searchEl.value='';run();searchEl.focus();});

frow.addEventListener('click',function(e){
  var b=e.target.closest('.fb');
  if(!b) return;
  activeU=b.dataset.u;
  frow.querySelectorAll('.fb').forEach(function(x){x.classList.remove('on');});
  b.classList.add('on');
  run();
});

// ── INIT ──
run();
</script>
