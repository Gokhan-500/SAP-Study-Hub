<!DOCTYPE html>

<title>SAP S4500 – S/4HANA Sourcing &amp; Procurement Çözüm Ağacı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#263145;--border:#334155;--bh:#475569;--text:#e2e8f0;--tm:#94a3b8;--td:#64748b;--blue:#3b82f6;--bl:#60a5fa;--bbg:rgba(59,130,246,.10);--bbd:rgba(59,130,246,.30);--green:#22c55e;--gbg:rgba(34,197,94,.10);--gbd:rgba(34,197,94,.30);--yellow:#f59e0b;--ybg:rgba(245,158,11,.10);--ybd:rgba(245,158,11,.35);--red:#ef4444;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh;}
header{background:linear-gradient(135deg,#0f1f3d 0%,#0f172a 60%);border-bottom:1px solid var(--border);padding:18px 32px 14px;}
header .meta{display:flex;align-items:baseline;gap:12px;margin-bottom:3px;}
.cid{font-family:var(--mono);font-size:11px;color:var(--bl);background:var(--bbg);border:1px solid var(--bbd);padding:2px 8px;border-radius:4px;letter-spacing:.06em;}
header h1{font-size:19px;font-weight:600;letter-spacing:-.3px;}
.sub{font-family:var(--mono);font-size:11px;color:var(--td);letter-spacing:.04em;margin-top:2px;}
.sr{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap;}
.st{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--tm);}
.st .n{color:var(--bl);font-weight:600;}
main{max-width:1100px;margin:0 auto;padding:26px 22px 60px;}
.ug{margin-bottom:34px;}
.uh{display:flex;align-items:center;gap:12px;margin-bottom:13px;padding-bottom:9px;border-bottom:1px solid var(--border);}
.ubadge{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;padding:3px 10px;border-radius:3px;text-transform:uppercase;}
.utitle{font-size:15px;font-weight:600;}
.uc{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--td);}
.u1 .ubadge{background:rgba(6,182,212,.15);color:#06b6d4;border:1px solid rgba(6,182,212,.3);}
.u2 .ubadge{background:rgba(168,85,247,.15);color:#a855f7;border:1px solid rgba(168,85,247,.3);}
.u3 .ubadge{background:rgba(59,130,246,.15);color:#60a5fa;border:1px solid rgba(59,130,246,.4);}
.u4 .ubadge{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.4);}
.u5 .ubadge{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.4);}
.u6 .ubadge{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.4);}
.u7 .ubadge{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
.u8 .ubadge{background:rgba(52,211,153,.15);color:#34d399;border:1px solid rgba(52,211,153,.3);}
.u9 .ubadge{background:rgba(129,140,248,.15);color:#818cf8;border:1px solid rgba(129,140,248,.3);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:9px;overflow:hidden;transition:border-color .18s;}
.card:hover{border-color:var(--bh);}
.card.open{border-color:var(--bbd);}
.ch{display:flex;align-items:center;gap:13px;padding:13px 17px;cursor:pointer;user-select:none;}
.ch:hover{background:rgba(255,255,255,.02);}
.exn{font-family:var(--mono);font-size:10px;color:var(--td);min-width:28px;flex-shrink:0;}
.cl{flex:1;min-width:0;}
.ct{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ca{font-family:var(--mono);font-size:10.5px;color:var(--td);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cr{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.sb{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:20px;background:var(--bg3);color:var(--td);border:1px solid var(--border);white-space:nowrap;}
.chev{color:var(--td);font-size:12px;transition:transform .2s;flex-shrink:0;}
.card.open .chev{transform:rotate(90deg);}
.cb{display:none;padding:0 17px 17px;border-top:1px solid var(--border);}
.card.open .cb{display:block;}
.scenario{font-style:italic;color:var(--tm);font-size:13px;border-left:3px solid var(--bbd);padding:9px 13px;margin:13px 0;background:var(--bbg);border-radius:0 6px 6px 0;line-height:1.7;}
.task{margin-bottom:6px;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.task.open{border-color:var(--bbd);}
.thdiv{display:flex;align-items:center;gap:9px;padding:9px 13px;cursor:pointer;user-select:none;background:var(--bg3);transition:background .15s;}
.thdiv:hover{background:rgba(255,255,255,.04);}
.task-body{display:none;padding:12px 14px 14px;border-top:1px solid var(--border);}
.task.open .task-body{display:block;}
.task-chev{font-size:12px;color:var(--td);transition:transform .2s;flex-shrink:0;margin-left:auto;}
.task.open .task-chev{transform:rotate(90deg);}
.thdiv{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;gap:9px;}
.tn{font-family:var(--mono);font-size:11px;color:var(--bl);font-weight:600;flex-shrink:0;}
.tt{font-size:13px;font-weight:500;flex:1;}
.ab{font-family:var(--mono);font-size:10px;padding:2px 9px;border-radius:4px;background:var(--bbg);color:var(--bl);border:1px solid var(--bbd);white-space:nowrap;flex-shrink:0;}
.pr{display:flex;align-items:center;flex-wrap:wrap;gap:0;margin:7px 0 9px;}
.pc{font-family:var(--mono);font-size:10.5px;background:var(--bg3);color:var(--tm);padding:3px 9px;border:1px solid var(--border);}
.pc:first-child{border-radius:4px 0 0 4px;}
.pc:last-child{border-radius:0 4px 4px 0;}
.pc:only-child{border-radius:4px;}
.pa{font-size:10px;color:var(--td);padding:0 1px;background:var(--bg3);border-top:1px solid var(--border);border-bottom:1px solid var(--border);height:25px;display:flex;align-items:center;}
.fvt{width:100%;border-collapse:collapse;margin:7px 0 11px;font-size:12.5px;}
.fvt th{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--td);background:var(--bg3);padding:5px 9px;border:1px solid var(--border);text-align:left;}
.fvt td{padding:5px 9px;border:1px solid var(--border);vertical-align:top;}
.fvt td:first-child{font-family:var(--mono);font-size:11.5px;color:var(--tm);background:rgba(30,41,59,.6);white-space:nowrap;}
.fvt td:last-child{color:var(--text);}
.fvt tr:hover td{background:rgba(255,255,255,.02);}
.sl{list-style:none;counter-reset:s;margin:7px 0;}
.sl li{counter-increment:s;display:flex;gap:9px;margin-bottom:5px;font-size:13px;color:var(--tm);line-height:1.6;}
.sl li::before{content:counter(s);font-family:var(--mono);font-size:10px;font-weight:600;color:var(--bl);background:var(--bbg);border:1px solid var(--bbd);border-radius:3px;padding:1px 5px;min-width:22px;text-align:center;flex-shrink:0;line-height:17px;margin-top:2px;}
.box{display:flex;gap:9px;padding:9px 12px;border-radius:6px;margin:9px 0;font-size:12.5px;line-height:1.6;}
.bi{font-size:14px;flex-shrink:0;margin-top:1px;}
.warn{background:var(--ybg);border:1px solid var(--ybd);color:#fde68a;}
.info{background:var(--bbg);border:1px solid var(--bbd);color:#bfdbfe;}
.result{background:var(--gbg);border:1px solid var(--gbd);color:#bbf7d0;}
.sl2{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--td);margin:11px 0 5px;}
.dv{height:1px;background:var(--border);margin:13px 0;}
b{color:var(--text);font-weight:500;}

/* ── TOOLBAR ── */
html{scroll-padding-top:120px;}
#toolbar{position:sticky;top:0;z-index:100;background:rgba(15,23,42,.97);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:8px 32px 10px;}
#search-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;margin-bottom:7px;}
#search-wrap{position:relative;}
#search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--td);pointer-events:none;width:13px;height:13px;}
#search{width:100%;font-family:var(--mono);font-size:12px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:6px 30px 6px 29px;outline:none;transition:border-color .18s;}
#search:focus{border-color:var(--bbd);background:#1a2744;}
#search::placeholder{color:var(--td);}
#clr{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--td);cursor:pointer;font-size:13px;line-height:1;padding:2px;display:none;border-radius:3px;transition:color .15s;}
#clr:hover{color:var(--text);}
#sctr{font-family:var(--mono);font-size:11px;color:var(--tm);white-space:nowrap;text-align:right;}
#sctr b{color:var(--bl);font-weight:600;}
#xpb{font-family:var(--mono);font-size:11px;background:var(--bg2);color:var(--tm);border:1px solid var(--border);border-radius:4px;padding:5px 11px;cursor:pointer;white-space:nowrap;transition:border-color .15s,color .15s,background .15s;}
#xpb:hover{border-color:var(--bbd);color:var(--bl);background:var(--bbg);}
#xpb.active{border-color:var(--bbd);color:var(--bl);background:var(--bbg);}
/* filter row */
#frow{display:flex;gap:5px;flex-wrap:wrap;align-items:center;}
.fb{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.05em;padding:3px 9px;border-radius:3px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--td);transition:all .15s;white-space:nowrap;}
.fb:hover{color:var(--text);border-color:var(--bh);}
.fb[data-u="all"]{border-color:var(--bh);color:var(--tm);}
.fb[data-u="all"].on{background:var(--bg2);border-color:var(--bh);color:var(--text);}
.fb[data-u="u1"].on{background:rgba(6,182,212,.15);color:#06b6d4;border-color:rgba(6,182,212,.4);}
.fb[data-u="u2"].on{background:rgba(168,85,247,.15);color:#a855f7;border-color:rgba(168,85,247,.4);}
.fb[data-u="u3"].on{background:rgba(59,130,246,.15);color:#60a5fa;border-color:rgba(59,130,246,.4);}
.fb[data-u="u4"].on{background:rgba(245,158,11,.15);color:#f59e0b;border-color:rgba(245,158,11,.4);}
.fb[data-u="u5"].on{background:rgba(34,197,94,.15);color:#22c55e;border-color:rgba(34,197,94,.4);}
.fb[data-u="u6"].on{background:rgba(239,68,68,.15);color:#ef4444;border-color:rgba(239,68,68,.4);}
.fb[data-u="u7"].on{background:rgba(251,191,36,.15);color:#fbbf24;border-color:rgba(251,191,36,.4);}
.fb[data-u="u8"].on{background:rgba(52,211,153,.15);color:#34d399;border-color:rgba(52,211,153,.4);}
.fb[data-u="u9"].on{background:rgba(129,140,248,.15);color:#818cf8;border-color:rgba(129,140,248,.4);}
/* highlight */
mark{background:rgba(245,158,11,.32);color:#fef08a;border-radius:2px;padding:0 2px;font-style:normal;}
/* ── ARAMA SONUÇ PANELİ ── */
#sr-panel{max-width:1100px;margin:0 auto;padding:18px 22px 60px;display:none;}
.sr-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:var(--bg2);border:1px solid var(--border);border-radius:6px;margin-bottom:14px;font-family:var(--mono);font-size:11px;}
.sr-count{color:var(--tm);}
.sr-count b{color:var(--bl);}
.sr-close{background:none;border:none;color:var(--td);cursor:pointer;font-family:var(--mono);font-size:11px;padding:2px 6px;border-radius:3px;transition:color .15s;}
.sr-close:hover{color:var(--text);}
.sr-card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:10px;padding:14px 17px;transition:border-color .18s;}
.sr-card:hover{border-color:var(--bh);}
.sr-bc{display:flex;align-items:center;flex-wrap:wrap;gap:5px;margin-bottom:9px;}
.sr-unit{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;padding:2px 8px;border-radius:3px;border:1px solid;text-transform:uppercase;}
.sr-sep{color:var(--td);font-size:11px;}
.sr-exn{font-family:var(--mono);font-size:11px;color:var(--tm);}
.sr-tn{font-family:var(--mono);font-size:11px;font-weight:700;color:var(--bl);background:var(--bbg);border:1px solid var(--bbd);padding:1px 6px;border-radius:3px;}
.sr-th{display:flex;align-items:center;gap:9px;margin-bottom:10px;flex-wrap:wrap;}
.sr-tt{font-size:14px;font-weight:600;flex:1;}
.sr-ab{font-family:var(--mono);font-size:10px;padding:2px 9px;border-radius:4px;background:var(--bbg);color:var(--bl);border:1px solid var(--bbd);white-space:nowrap;}
.sr-sc{font-style:italic;color:var(--tm);font-size:12.5px;border-left:3px solid var(--bbd);padding:7px 11px;margin-bottom:10px;background:var(--bbg);border-radius:0 5px 5px 0;line-height:1.7;}
.sr-path{display:flex;align-items:center;flex-wrap:wrap;gap:0;margin:0 0 9px;}
.sr-pc{font-family:var(--mono);font-size:10.5px;background:var(--bg3);color:var(--tm);padding:3px 9px;border:1px solid var(--border);}
.sr-pc:first-child{border-radius:4px 0 0 4px;}
.sr-pc:last-child{border-radius:0 4px 4px 0;}
.sr-pc:only-child{border-radius:4px;}
.sr-pa{font-size:10px;color:var(--td);padding:0 1px;background:var(--bg3);border-top:1px solid var(--border);border-bottom:1px solid var(--border);height:25px;display:flex;align-items:center;}
/* no result */
#nores{display:none;max-width:1100px;margin:0 auto;text-align:center;padding:80px 20px;font-family:var(--mono);font-size:13px;color:var(--td);}
#nores .ico{display:block;font-size:34px;margin-bottom:12px;opacity:.3;}
#nores .hint{display:block;margin-top:8px;font-size:11px;color:var(--td);opacity:.7;}
/* hidden */
.card.hid,.ug.hid{display:none;}
/* mobile */
@media(max-width:600px){
  #toolbar{padding:8px 14px 9px;}
  #search-row{grid-template-columns:1fr auto;gap:6px;}
  #sctr{display:none;}
  main{padding:18px 12px 60px;}
}

#homebtn{position:absolute;top:18px;right:32px;font-family:var(--mono);font-size:11px;background:var(--bg2);color:var(--tm);border:1px solid var(--border);border-radius:5px;padding:5px 12px;cursor:pointer;transition:border-color .15s,color .15s;}
#homebtn:hover{border-color:var(--bbd);color:var(--bl);}
.fvt-sec td{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--bl);background:rgba(59,130,246,.08);padding:4px 9px;border:1px solid var(--border);}
/* ── ÜNİTE ACCORDION ── */
.uh{cursor:pointer;user-select:none;transition:opacity .15s;}
.uh:hover{opacity:.85;}
.uchev{font-size:13px;color:var(--td);transition:transform .25s;flex-shrink:0;margin-left:8px;}
.ug.collapsed .uchev{transform:rotate(-90deg);}
.ug-body{transition:none;}
.ug.collapsed .ug-body{display:none;}</style>
</head>

{num:"3",title:"Call Transaction SM04",app:"SAP GUI",path:["Command Field","SM04"],fields:[],steps:["<b>F3</b> tuşuna basın veya <b>(Exit)</b> ikonuna tıklayın.","Enter <b>SM04</b> in the <b>Command Field</b> and press <b>Enter</b>."],info:null,warn:null,result:null},
{num:"4",title:"Display Technical Names in Menu",app:"SAP GUI",path:["Extras","Settings"],fields:[],steps:["SAP Easy Access ekranında <b>Extras → Settings</b>'i seçin.","Menüde teknik isimlerin görünmesi için ilgili ayarı aktifleştirin.","<b>Tools → Administration → Monitor → System Monitoring → User Overview</b> yolundan geçerek ayarı test edin — <b>SM04</b> işlem kodu artık menüde görünür."],info:null,warn:null,result:null},
{num:"5",title:"Add SM04 to Favorites",app:"SAP GUI",path:["Favorites","Insert Transaction"],fields:[["Transaction Code","SM04"]],steps:["Aşağıdaki yöntemlerden birini kullanın:","<b>Yöntem 1 (Drag & Drop):</b> Menüden gerekli işlemi favoriler listesine sürükleyin.","<b>Yöntem 2 (Sağ tık):</b> İşlemi sağ tıklayın ve <b>Add to Favorites</b>'i seçin.","<b>Yöntem 3 (Toolbar):</b> Standart araç çubuğunda <b>Favorites → Insert Transaction</b>'ı seçin ve <b>SM04</b> girin.","Favori listenizdeki girişi kontrol edin."],info:null,warn:null,result:null}
]}

{unit:3,title:"Plain Procurement Process",ex:[
{id:4,title:"Create and Display a Purchase Order",app:"Manage Purchase Orders",sc:"A500-## malzemesinin depo stoğu yenilenmesi gerekiyor. Bir satın alma siparişi oluşturun ve tedarikçi mesajının doğruluğunu kontrol edin.",tasks:[
{num:"1",title:"Create a Purchase Order",app:"Manage Purchase Orders",path:["Purchase Order Processing","Manage Purchase Orders","Create"],fields:[["── Items ──",""],["Supplier","T-S50A##"],["Material","A500-## (Oil pump 500/##)"],["Purchasing Document Type","Info Record"],["Order Quantity","100 PC"],["Plant","1010"],["── Proposed Values (Basic Data) ──",""],["Purchasing Group","Z##"],["Purchasing Organization","101C"],["Net Order Price","EUR 52.00"]],steps:["<b>Manage Purchase Orders</b> uygulamasını başlatın (tile grubu <b>Purchase Order Processing</b> veya <b>Favorites</b>).","<b>Create</b>'e tıklayın.","<b>Items</b> alanında <b>Add from Document</b>'i seçin.","Açılan dialog'da: Supplier <b>T-S50A##</b>, Material <b>A500-##</b>, Purchasing Document Type olarak <b>Info Record</b> seçin.","<b>Go</b>'ya tıklayın.","A500-## için info record'u seçin ve <b>Add Items</b>'a tıklayın.","Plant <b>1010</b> ve miktar <b>100 PC</b> girin.","Satır sağındaki <b>(arrow)</b> ikonuna tıklayarak item detaylarını açın.","<b>Process Control</b> sekmesinde <b>Goods Receipt</b> ve <b>Invoice Receipt</b> göstergelerinin işaretli olduğunu kontrol edin.","<b>Apply</b>'a tıklayın.","<b>Basic Data</b> bölümünde: Purchasing Group <b>Z##</b>, Purchasing Organization <b>101C</b> ve Net Order Price <b>52 EUR</b> değerlerini not edin.","<b>Order</b>'a tıklayın ve oluşan PO numarasını not edin."],info:null,warn:"## karakterlerini eğitmenin size atadığı numarayla değiştirin.",result:"Satın alma siparişi oluşturulur. PO numarasını not edin."},
{num:"2",title:"Check PO List and Supplier Message",app:"Manage Purchase Orders",path:["Manage Purchase Orders","Filter (Supplier + Purch. Group)","Go","Output Management"],fields:[["Supplier","T-S50A##"],["Purchasing Group","Z##"]],steps:["<b>Manage Purchase Orders</b> uygulamasını başlatın.","Filtre olarak Supplier <b>T-S50A##</b> ve Purchasing Group <b>Z##</b> girin.","<b>Go</b>'ya tıklayın.","PO numaranıza veya satır sağındaki <b>(arrow)</b> ikonuna tıklayın.","<b>Output Management</b> alanına kadar aşağı kaydırın.","Gerekirse <b>Show More per Row</b>'a tıklayın.","<b>(Display Document)</b> ikonuna tıklayın — mesaj önizlemesi yeni sekmede açılır."],info:null,warn:null,result:"Tedarikçiye gönderilen satın alma mesajı ekranda görüntülenir."}
]},
{id:5,title:"Post a Goods Receipt for Purchase Order",app:"Stock – Single Material / Post GR for Purchasing Document / Material Documents Overview",sc:"Depo çalışanı olarak, satın alma siparişine referansla mal girişi yapacaksınız. Mal girişi öncesi ve sonrası stoku karşılaştıracaksınız.",tasks:[
{num:"1",title:"Analyze Stock Before Goods Receipt",app:"Stock – Single Material",path:["Goods Receipt Processing","Stock – Single Material"],fields:[["── Data ──",""],["Material","A500-##"],["Plant","1010"],["Storage Location","0001"]],steps:["<b>Stock – Single Material</b> uygulamasını başlatın (tile grubu <b>Goods Receipt Processing</b>).","Malzeme <b>A500-##</b> girin.","Plant <b>1010</b>, Storage Location <b>0001</b> için stok miktarlarını not edin."],info:"Mal girişi öncesi beklenen değerler: Unrestricted-use stock: 10 PC | Quality inspection: 0 | Blocked: 0",warn:null,result:null},
{num:"2",title:"Post Goods Receipt",app:"Post Goods Receipt for Purchasing Document",path:["Goods Receipt Processing","Post Goods Receipt for Purchasing Document"],fields:[["── Selection ──",""],["Purchase Order","<PO number from Ex. 4>"],["Delivery Note","DN##01"],["Document Date","<Today's date>"],["Material","A500-##"],["Quantity","100 PC"],["Storage Location","0001"]],steps:["<b>Post Goods Receipt for Purchasing Document</b> uygulamasını başlatın (tile grubu <b>Goods Receipt Processing</b> veya <b>Favorites</b>).","Ex.4'teki PO numarasını girin.","Delivery Note olarak <b>DN##01</b> girin.","Storage location <b>0001</b>'i seçin.","<b>Post</b>'a tıklayın — materyal belgesinin oluştuğuna dair mesaj alırsınız.","Materyal belge numarasını not edin."],info:null,warn:"Bu egzersizi yapmak için Ex. 4'teki satın alma siparişi numarasını bilmeniz gerekir.",result:"Materyal belgesi oluşturulur. Belge numarasını not edin."},
{num:"3",title:"Review Material Document and Accounting Document",app:"Material Documents Overview",path:["Goods Receipt Processing","Material Documents Overview"],fields:[["── Selection ──",""],["Plant","1010"],["Storage Location","0001"],["Posting Date","<Today's date>"]],steps:["<b>Material Documents Overview</b> uygulamasını başlatın (tile grubu <b>Goods Receipt Processing</b>).","Plant <b>1010</b>, Storage Location <b>0001</b> ve bugünün tarihini filtre olarak girin.","<b>Go</b>'ya tıklayın.","Materyal belge numaranıza tıklayarak fact sheet'i açın.","<b>Process Flow</b>'a tıklayın — PO numarası ve muhasebe belgesi numarası burada görünür.","<b>(Back)</b> ile listeye dönün ve listeden çıkmayın."],info:"<b>Process Flow</b>'da hem PO numarası hem de muhasebe belgesi numarası görüntülenir.",warn:null,result:null},
{num:"4",title:"Analyze Stock After Goods Receipt",app:"Stock – Single Material",path:["Material Documents Overview","Material (A500-##) linkine tıkla","More Links","Stock – Single Material"],fields:[],steps:["Materyal belgeler listesinde malzeme <b>A500-##</b>'ye tıklayın — bir popover açılır.","Popover'da <b>More Links</b>'e tıklayın.","<b>Stock – Single Material</b> bağlantısını seçin ve <b>OK</b>'e tıklayın.","Güncel stok verilerini not edin."],info:null,warn:null,result:"Mal girişi sonrası: Unrestricted-use stock: 110 PC (Plant 1010, Storage Location 0001)."}
]},
{id:6,title:"Enter an Invoice",app:"Create Supplier Invoice / Supplier Invoices List",sc:"Tedarikçiden gelen faturayı sisteme girecek ve sipariş ile mal girişi verileriyle karşılaştıracaksınız.",tasks:[
{num:"1",title:"Enter Supplier Invoice (IV##01)",app:"Create Supplier Invoice",path:["Supplier Invoice Processing","Create Supplier Invoice"],fields:[["── Invoice Header ──",""],["Company Code","1010"],["Gross Invoice Amount","EUR 5,720.00"],["Invoice Date","<Today's date>"],["Reference","IV##01"],["── Purchasing Document Reference ──",""],["Reference Document Category","Delivery Note"],["Delivery Note","DN##01"]],steps:["<b>Create Supplier Invoice</b> uygulamasını başlatın (tile grubu <b>Supplier Invoice Processing</b> veya <b>Favorites</b>).","Fatura verilerini tablodaki gibi girin.","<b>Purchasing Document References</b> altında referans belge kategorisi olarak <b>Delivery Note</b> seçin.","Delivery note olarak <b>DN##01</b> girin ve <b>Enter</b>'a basın.","Sistem tarafından önerilen fiyat ve miktarı tedarikçi faturasıyla karşılaştırın; gerekirse düzenleyin.","<b>Post</b>'a tıklayın — fatura belgesinin oluştuğuna dair mesaj alırsınız.","Fatura belge numarasını not edin."],info:null,warn:"Fatura tutarı ve miktarını sistem önerisiyle mutlaka karşılaştırın; uyumsuzluk varsa düzeltin.",result:"Fatura başarıyla kaydedilir. Belge numarasını not edin."},
{num:"2",title:"Configure Invoice List Columns and Save Variant",app:"Supplier Invoices List",path:["Supplier Invoice Processing","Supplier Invoices List"],fields:[["── Company Code Data ──",""],["Company Code","1010"],["Columns (in this order)","Invoicing Party → Blocked (Logistics) → Reference → Invoice Number → Status → Gross Invoice Amount → Entry Type → Posting Date"],["Sort by","Reference — Descending (Azalan)"],["Variant Name","Sorted by Reference ##"],["Set as Default","Evet"]],steps:["<b>Supplier Invoices List</b> uygulamasını başlatın.","Company Code <b>1010</b> girin ve <b>Go</b>'ya tıklayın.","<b>(Settings)</b> ikonuna tıklayın.","Tablodaki kolonları seçin, diğerlerini kaldırın; yukarı/aşağı okları ile sıralamayı ayarlayın.","<b>Sort</b> sekmesini seçin: <b>Reference</b> ve <b>Descending</b>'i seçin.","<b>OK</b>'e tıklayın.","Listenin sol üstünden <b>(Select View)</b>'e tıklayın ve <b>Save As</b>'i seçin.","Ad: <b>Sorted by Reference ##</b>, <b>Set as Default</b>'ı işaretleyin ve <b>Save</b>'e tıklayın."],info:null,warn:null,result:null},
{num:"3",title:"Review Invoice Details and PO Reference",app:"Supplier Invoices List",path:["Supplier Invoices List","Invoice Number","Purchasing Document References"],fields:[],steps:["Listeden T-S50A## tedarikçisine ait fatura numaranıza tıklayın.","<b>Purchasing Document References</b> sekmesini açın.","Satın alma siparişi numarasının burada görüntülendiğini doğrulayın."],info:null,warn:null,result:"3'lü eşleşme (PO–GR–Fatura) tamamdır. Fatura belgesinde PO numarası görüntülenir."}
]}
]},

{num:"2",title:"Display Supplier Data in FI/MM Role",app:"Maintain Business Partner",path:["Maintain Business Partner","Display in BP role: Supplier centrally FI/MM","Company Code / Purchasing"],fields:[["── Header ──",""],["Role","Supplier centrally FI/MM"],["Adres","Mannheimer Str. 14 / 69115 Heidelberg"],["Company Code","1010"],["Purchasing Organization","101C"]],steps:["<b>Supplier centrally FI/MM</b> rolünü seçin.","<b>Address</b> veya <b>Address Overview</b> sekmesinde adresi kontrol edin.","Menü üstünde <b>Company Code</b>'a tıklayın.","<b>(Company Codes)</b> ikonu ile şirket kodları listesini görüntüleyin — sadece <b>1010</b> listelidir.","Pencereyi kapatmak için <b>Cancel</b>'a tıklayın.","Menü üstünde <b>Purchasing</b>'e tıklayın.","<b>(Purchasing Organizations)</b> ikonu ile satın alma organizasyonları listesini görüntüleyin — sadece <b>101C</b> listelidir.","Pencereyi kapatmak için <b>Cancel</b>'a tıklayın."],info:null,warn:null,result:null}
]},

{num:"1",title:"Create New Supplier Master Record",app:"Manage Supplier Master Data",path:["Supplier and BP","Manage Supplier Master Data","Create","Organization"],fields:[["── Basic & Address Data ──",""],["Business Partner","T-S50C##"],["Grouping","BPAB"],["Name 1","Martin Vehicle-Parts ##"],["Street","Heidelberger Str."],["House Number","##"],["Postal Code / City","68161 Mannheim"],["Country / Region","DE — BW (Baden-Wuerttemberg)"],["Language","EN"],["── More Basic Data ──",""],["Search Term 1","SUPP##"],["── Roles ──",""],["Role 1","FLVN00 (Business Partner FI Vendor)"],["Role 2","FLVN01 (Business Partner Supplier)"],["Purchasing Organization","101C (Purch. Org. 101)"],["Purchasing Group","Z## (Purch. Group Z##)"],["Planned Delivery Time","7 days"],["Order Currency","EUR"],["Payment Terms","0002 (14 days 2% cash discount / 30 days net)"],["Automatic Purchasing Order","X"],["GR-Based Invoice Verification","X"],["Company Code","1010"],["Payment Terms (Company Code)","0002"],["Reconciliation Account","21100000 (Trade Payables Domestic)"]],steps:["<b>Manage Supplier Master Data</b> uygulamasını başlatın (tile grubu <b>Supplier and BP</b>).","Sağ üstten <b>Create</b>'e tıklayın, ardından <b>Organization</b>'ı seçin.","<b>Create Organization</b> ekranında Tablo 1'deki temel ve adres verilerini girin.","<b>OK</b>'e tıklayın.","<b>Basic Data</b> bölümünde Tablo 2'deki ek veriyi girin (<b>Search Term 1: SUPP##</b>).","<b>Roles</b> bölümüne geçin.","<b>FLVN00</b> rolünü girin, <b>Create</b>'e tıklayın, ardından <b>FLVN01</b> rolünü ekleyin.","<b>Purchasing Organizations</b> bölümüne gidin.","<b>101C</b> satırının sağındaki oka tıklayın.","Tablo 4'teki satın alma organizasyonu verilerini girin, <b>Apply</b>'a tıklayın.","<b>Company Codes</b> bölümüne geçin.","Tablo 5'teki şirket kodu verilerini girin.","Ekranın sağ altındaki <b>Create</b>'e tıklayın."],info:null,warn:"Hem FI rolü (<b>FLVN00</b>) hem MM rolü (<b>FLVN01</b>) mutlaka girilmelidir.",result:"Yeni tedarikçi ana kaydı T-S50C## başarıyla oluşturulur."}
]},

{num:"1",title:"Display Basic Data and Material Information",app:"Display Material",path:["Material Master","Display Material","Select View(s): Basic Data 1","(Information on material)"],fields:[["── Data ──",""],["Material","A500-##"],["Material Type","ROH (Raw materials)"],["Industry Sector","M (Mechanical Engineering)"]],steps:["<b>Display Material</b> uygulamasını başlatın (tile grubu <b>Material Master</b>).","Malzeme numarası <b>A500-##</b> girin.","<b>Select View(s)</b>'e tıklayın, <b>Basic Data 1</b>'i seçin ve <b>Data</b>'ya tıklayın.","<b>(Information on material)</b> ikonuna tıklayın — malzeme tipi, sektör, oluşturan kullanıcı ve tarih gösterilir.","Uygulamadan çıkmayın."],info:"Malzeme Tipi: ROH (Ham madde) | Sektör: M (Makine Mühendisliği) | Oluşturan kullanıcı ve tarih bilgi diyaloğunda görünür.",warn:null,result:null},
{num:"2",title:"Display Material Group and Base Unit of Measure",app:"Display Material",path:["Basic Data 1 view"],fields:[["Material Group","L003"],["Base Unit of Measure","PC (Piece)"]],steps:["<b>Basic Data 1</b> görünümüne dönün.","<b>Material Group</b> ve <b>Base Unit of Measure</b> bilgilerini kontrol edin."],info:"Material Group: L003 | Base Unit of Measure: PC (Piece)",warn:null,result:null},
{num:"3",title:"Check Purchasing Group for Plant 1010",app:"Display Material",path:["Purchasing tab","Organizational Levels: Plant 1010"],fields:[["Plant","1010"],["Purchasing Group","Z##"]],steps:["<b>Purchasing</b> sekmesine tıklayın.","Açılan <b>Organizational Levels</b> dialog'unda Plant olarak <b>1010</b> girin ve <b>Continue</b>'ya tıklayın.","<b>Purchasing Group</b>'u not edin."],info:"Purchasing Group: Z##",warn:null,result:null},
{num:"4",title:"Display Stock Quantity in Storage Location 0001",app:"Display Material",path:["Storage Location Stock tab","Organizational Levels: Storage Location 0001"],fields:[["Storage Location","0001"],["Unrestricted-use stock","110 PC (may vary)"]],steps:["<b>Storage Location Stock</b> sekmesine tıklayın.","<b>Organizational Levels</b> dialog'unda Storage Location <b>0001</b> girin ve <b>Continue</b>'ya tıklayın.","Unrestricted-use stok miktarını not edin."],info:"Stok miktarı önceki egzersizlere göre değişir; Ex. 5 sonrasında 110 PC olmalıdır.",warn:null,result:null}
]},
{id:10,title:"Create New Material Master Data",app:"Create Material",sc:"Ürün yelpazenize yangın söndürücü eklediniz. E500-## numaralı yeni malzeme ana kaydını oluşturun.",tasks:[
{num:"1",title:"Create New Material Master Record",app:"Create Material",path:["Material Master","Create Material"],fields:[["── Initial Screen ──",""],["Material Number","E500-##"],["Industry Sector","Mechanical Engineering"],["Material Type","Trading Goods"],["── Basic Data 1 View ──",""],["Material Description (EN)","Fire Extinguisher ## for Forklift"],["Material Description (DE)","Feuerlöscher ## für Gabelstapler"],["Base Unit of Measure","PC (Piece)"],["Material Group","L001 (Trading Materials)"],["── Purchasing View ──",""],["Purchasing Group","Z##"],["Purchasing Value Key","1"],["GR Processing Time","1 day"],["── General Plant Data / Storage 1 View ──",""],["Plant / Storage Location","1010 / 0001"],["Storage Bin","BI-##"]],steps:["<b>Create Material</b> uygulamasını başlatın (tile grubu <b>Material Master</b>).","Material numarası <b>E500-##</b>, Industry Sector <b>Mechanical Engineering</b>, Material Type <b>Trading Goods</b> girin.","<b>Continue</b>'ya basın veya <b>Enter</b>'a basın.","View seçiminde <b>Basic Data 1</b>, <b>Purchasing</b> ve <b>General Plant Data / Storage 1</b>'i seçin.","<b>Org. Levels</b>'a basın; Plant <b>1010</b>, Storage Location <b>0001</b> girin, <b>Continue</b>'ya basın.","<b>Basic Data 1</b> görünümünde kısa tanımı giriş dilinizde girin, Base Unit of Measure ve Material Group'u girin.","<b>Enter</b>'a basarak <b>Purchasing</b> görünümüne geçin; tablodaki değerleri girin.","<b>Purchasing Value Key</b> için 'Check the data' mesajı gelirse <b>Enter</b> ile onaylayın.","<b>Enter</b>'a basarak <b>Plant data / stor. 1</b> görünümüne geçin; Storage Bin <b>BI-##</b> girin.","<b>Additional Data</b> butonuna tıklayın; ikinci dili (DE) ve Almanca kısa tanımı girin.","<b>Save</b>'e tıklayın."],info:null,warn:"<b>Check the data for the purchasing value key</b> mesajı gelirse <b>Enter</b> ile onaylayın.",result:"Malzeme ana kaydı E500-## başarıyla oluşturulur."}
]},

{id:12,title:"Create a New Info Record",app:"Create Purchasing Info Record",sc:"Martin Vehicle-Parts ## iş ortağı, E500-## (Fire Extinguisher ##) malzemesi için tedarikçidir. Bu tedarikçi ve malzeme için satın alma bilgi kaydı oluşturun.",tasks:[
{num:"1",title:"Create Purchasing Info Record",app:"Create Purchasing Info Record",path:["Sources of Supply Management","Create Purchasing Info Record"],fields:[["── Header ──",""],["Supplier","T-S50C##"],["Material","E500-##"],["Purchasing Organization","101C"],["Purchasing Group","Z## (Purch. Group Z##)"],["Standard Quantity","10"],["Tax Code","1I (10% Input Tax (Training))"],["Validity Period","Today – End of next year"],["Gross Price (1–4 PC)","EUR 180/PC"],["Gross Price (5–9 PC)","EUR 170/PC"],["Gross Price (10+ PC)","EUR 150/PC"],["Discount % on Gross (RA01)","10%"],["Net Price","EUR 180"]],steps:["<b>Create Purchasing Info Record</b> uygulamasını başlatın (tile grubu <b>Sources of Supply Management</b>).","Aşağıdaki verileri girin ve <b>Enter</b>'a basın: Supplier <b>T-S50C##</b>, Material <b>E500-##</b>, Purchasing Organization <b>101C</b>.","<b>Purch. Org. Data 1</b>'e tıklayın; Purchasing Group, Net Price <b>180 EUR</b>, Standard Quantity <b>10</b> ve Tax Code <b>1I</b>'yi girin.","<b>Conditions</b>'a tıklayın.","Geçerlilik süresini girin.","Koşul tipi <b>RA01</b>'i (Discount % on Gross) ekleyin, değer olarak <b>10</b> girin ve <b>Enter</b>'a basın.","<b>PB00</b> koşul tipini seçin ve <b>Scales</b>'e tıklayın.","Aşağıdaki kademeli fiyat değerlerini girin: Scale quantity 1 → 180 EUR | Scale quantity 5 → 170 EUR | Scale quantity 10 → 150 EUR.","<b>Save</b>'e tıklayın."],info:null,warn:null,result:"Info record başarıyla oluşturulur. Kademeli fiyatlandırma tanımlanmıştır."}
]},

{num:"1",title:"Determine Material Type and Valuation Price",app:"Display Material",path:["Material Master","Display Material","Accounting 1","Plant: 1010"],fields:[["── Data ──",""],["A500-## Material Type","ROH (Raw materials)"],["A500-## Valuation Price","EUR 51.50 (may vary)"],["B500-## Material Type","ROH (Raw materials)"],["B500-## Valuation Price","EUR 450.00"],["Quantity & Value-based inventory mgmt","Evet (aktif)"]],steps:["<b>Display Material</b> uygulamasını başlatın (tile grubu <b>Material Master</b>).","Material <b>A500-##</b> girin ve <b>Enter</b>'a basın.","<b>Accounting 1</b> görünümünü seçin; Plant <b>1010</b> girin.","Başlık çubuğunda malzeme tipini, <b>Accounting 1</b> görünümünde değerleme fiyatını not edin.","B500-## için aynı adımları tekrarlayın."],info:"Her iki malzeme de ROH (Ham madde) tipindedir. Envanter stok ve değeri sıfır değildir (bu egzersizden önce kaydedilmiştir).",warn:null,result:null},

{num:"1",title:"Create Quantity Contract (MK)",app:"SAP GUI – ME31K",path:["Logistics","Materials Management","Purchasing","Outline Agreement","Contract","Create (ME31K)"],fields:[["── Header ──",""],["Supplier","T-S52A##"],["Agreement Type","MK (Quantity Contract)"],["Purchasing Organization","101C"],["Purchasing Group","Z##"],["Plant","------- (All plants)"],["Validity Start","<1st day of previous month>"],["Validity End","<Today + 2 months>"],["Item 10: Material / Target Qty / Net Price","A500-## / 10,000 PC / EUR 50"],["Item 20: Material / Target Qty / Net Price","C500-## (Wheel bearing) / 40,000 PC / EUR 48"],["Item 30: Material / Target Qty / Net Price","D500-## (Suspension) / 40,000 PC / EUR 66"],["Header Condition RA01","5% (Discount % on Gross)"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Outline Agreement → Contract → Create (ME31K)</b>'e gidin.","Initial Screen'de tablodaki değerleri girin; <b>Enter</b>'a basın.","<b>Header Data</b>'da geçerlilik tarihlerini girin; <b>Enter</b>'a basın.","Geçerlilik tarihi mesajlarını <b>Enter</b> ile onaylayın.","<b>Item Overview</b>'da 3 kalemi tablodaki gibi girin; hesap atama mesajlarını <b>Enter</b> ile onaylayın.","<b>Header → Conditions</b>'a gidin.","<b>RA01</b> koşul tipi için değer <b>5</b> girin.","<b>Valid from</b> tarihini <b>önceki ayın 1. günü</b> olarak değiştirin.","<b>(Save)</b>'e tıklayın ve sözleşme numarasını not edin."],info:"Sözleşme Tipi: MK = Miktar Sözleşmesi (Quantity Contract)",warn:null,result:"Miktar sözleşmesi (MK) oluşturulur. Sözleşme numarasını not edin."}
]},
{id:25,title:"Maintain the Source List",app:"SAP GUI – ME01 / ME05",sc:"T-S52A## ile sözleşme yapıldıktan sonra, sözleşme kalemlerinin malzeme için otomatik kaynak olarak kullanılmasını sağlayın.",tasks:[
{num:"1",title:"Create Source List for A500-## (ME01)",app:"SAP GUI – ME01",path:["Logistics","Materials Management","Purchasing","Master Data","Source List","Maintain (ME01)"],fields:[["── Data ──",""],["Material","A500-##"],["Plant","1010"],["Valid From","<1st day of previous month>"],["Valid To","<Until end of year>"],["Fixed (Fixed source indicator)","X"],["MRP Indicator","1 (MRP'de dikkate al)"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Master Data → Source List → Maintain (ME01)</b>'e gidin.","Material <b>A500-##</b>, Plant <b>1010</b> girin; <b>Enter</b>'a basın.","<b>Edit → Generate Records</b>'u seçin.","Dialog'da geçerlilik tarihlerini girin ve <b>(Continue)</b>'ya basın.","Sistem iki kaynak otomatik oluşturur: T-S52A## (sözleşme) ve T-S50A## (info record).","Sözleşme kalemi satırında <b>Fixed</b> ve <b>MRP 1</b> göstergelerini işaretleyin.","<b>(Save)</b>'e tıklayın."],info:"Sistem otomatik olarak 2 kaynak oluşturur: T-S52A## (sözleşme) ve T-S50A## (info record).",warn:null,result:null},
{num:"2",title:"Create Source List in Mass Maintenance for C500-## and D500-## (ME05)",app:"SAP GUI – ME05",path:["Logistics","Materials Management","Purchasing","Master Data","Source List","Follow-On Functions","Generate (ME05)"],fields:[["── Data ──",""],["Material","C500-## and D500-## (as SINGLE VALUES — not a range!)"],["Generate: Outline Agreements Only","X"],["Existing Records: Become Invalid","X"],["Test Run","Not selected"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Master Data → Source List → Follow-On Functions → Generate (ME05)</b>'e gidin.","Material alanına <b>C500-##</b> girin.","<b>(Multiple Selection)</b> ikonuna tıklayın; <b>Select Single Values</b> sekmesinde <b>D500-##</b>'yi ayrıca girin.","<b>(Copy)</b>'ye tıklayın.","Diğer alanları tablodaki gibi doldurun.","<b>(Execute)</b>'e tıklayın.","Sonuç listesinde tüm kalemleri seçin ve <b>Fix</b>'e tıklayın.","Tüm kalemleri tekrar seçin ve değişiklikleri kaydedin."],info:null,warn:"C500-## ile D500-## arasında ARALIK SEÇMEYİN. Yalnızca tek değerleri (single values) girin.",result:"Kaynak listesi kayıtları oluşturulur."}
]},
{id:26,title:"Create a Purchase Requisition with the Advanced Transaction ME51N",app:"SAP GUI – ME51N / ME5A",sc:"Gelişmiş işlem ME51N ile satın alma talepleri oluşturun. Kaynakların otomatik atanmasını sağlayın.",tasks:[
{num:"1",title:"Set Default Values in ME51N",app:"SAP GUI – ME51N",path:["Logistics","Materials Management","Purchasing","Purchase Requisition","Create (ME51N)","(Personal Setting)","Default Values"],fields:[["── Header ──",""],["Purchasing Group","Z## (Purch. Group Z##)"],["Plant","1010"],["Tracking Number","GR##"],["Source Determination","X (Selected)"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Purchase Requisition → Create (ME51N)</b>'e gidin.","<b>(Personal Setting)</b> ikonuna tıklayın.","<b>Default Values</b> sekmesini seçin.","Eksik alanları eklemek için <b>More Fields...</b>'a tıklayın — <b>Source Determination</b>, <b>Plant</b> ve <b>Purchasing Group</b>'u gizli alanlar listesinden seçin ve <b>(Show Selected Fields)</b>'e tıklayın; <b>Copy</b>'ye tıklayın.","Tablodaki değerleri girin.","<b>(Save)</b>'e tıklayın.","İşlemden çıkmayın."],info:null,warn:null,result:null},
{num:"2",title:"Create Requisition for Stock Materials",app:"SAP GUI – ME51N",path:["ME51N","Item Overview","Item Details","Source of Supply Tab"],fields:[["── Data ──",""],["Item 10","B500-## (Oil tray 500/##) / 20 PC"],["Item 20","C500-## (Wheel bearing 500/##) / 100 PC"],["Item 30","D500-## (Suspension 500/##) / 100 PC"],["Item 10 Fixed Vendor","T-S50A## — Info Record"],["Item 20 Fixed Vendor","T-S52A## — Contract item"],["Item 30 Fixed Vendor","T-S52A## — Contract item"]],steps:["Item Overview'da kalemleri tablodaki gibi girin (gerekirse <b>(Expand Items)</b> ikonuna tıklayın).","<b>Enter</b>'a basın.","Item Details'ı açmak için <b>(Expand Item Details)</b>'a tıklayın.","<b>Source of Supply</b> sekmesinde kaynak bilgisini not edin; <b>(Next item)</b> ile diğer kalemlere geçin.","<b>(Save)</b>'e tıklayın; belge numarasını not edin.","İşlemden çıkmayın."],info:"B500-##: Sabit tedarikçi T-S50A## — Info Record | C500-##: Sabit tedarikçi T-S52A## — Contract",warn:null,result:null},
{num:"3",title:"Create Requisition with Multiple Account Assignment",app:"SAP GUI – ME51N",path:["ME51N","Item Overview","Account Assignment Tab","(Multiple Account Assignment)"],fields:[["── Account Assignment ──",""],["Account Assignment Category","K (Cost center)"],["Material","A500-##"],["Quantity","10"],["4 PC → Cost Center / G/L","T-ENG## / 51700000"],["6 PC → Cost Center / G/L","T-CCB## / 51100000"],["Item 10 Fixed Vendor","T-S52A## — Contract item"]],steps:["Item Overview'da A500-##, miktar <b>10</b>, Account Assignment Category <b>K</b> girin.","<b>Enter</b>'a basın.","<b>Account Assignment</b> sekmesinde <b>(Multiple Account Assignment)</b> ikonuna tıklayın.","Her iki satır için miktar, cost center ve G/L hesabını girin; <b>Enter</b>'a basın.","<b>Source of Supply</b> sekmesinde Fixed Vendor'ı not edin: T-S52A## — Contract item.","<b>(Save)</b>'e tıklayın; belge numarasını not edin."],info:"A500-## Sabit tedarikçi: T-S52A## — Contract kalemi (kaynak listesinden gelir).",warn:null,result:null},
{num:"4",title:"Display Requisition List (ME5A)",app:"SAP GUI – ME5A",path:["Logistics","Materials Management","Purchasing","Purchase Requisition","List Displays","General (ME5A)"],fields:[["Tracking Number","GR##"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Purchase Requisition → List Displays → General (ME5A)</b>'ya gidin.","Tracking Number <b>GR##</b> girin; <b>(Execute)</b>'e tıklayın.","Listede bir talep kalem numarasını çift tıklayın — talep açılır.","Item Details'ta <b>Status</b> sekmesini seçin: durum <b>Not edited</b> olmalıdır.","<b>(Back)</b> ile listeye dönün."],info:"Listedeki 2. kolon işlem durumunu gösterir (N = Not edited). Sabit tedarikçi ve sözleşme/info record numaraları da listede görünür.",warn:null,result:"İşlem durumu: N = Not edited. Sabit tedarikçi ve kaynak numaraları listede görünür."}
]},
{id:27,title:"Create a Purchase Order with the Advanced Transaction ME21N",app:"SAP GUI – ME21N",sc:"T-S50A## tedarikçisine atanmış 20 adet oil tray talebini ME21N ile manuel olarak PO'ya dönüştürün.",tasks:[
{num:"1",title:"Configure Document Overview and Save Variant",app:"SAP GUI – ME21N",path:["Logistics","Materials Management","Purchasing","Purchase Order","Create","Vendor/Supplying Plant Known (ME21N)"],fields:[["── Selection ──",""],["Selection Variant Name","SV##"],["Selection Variant Description","PurchRequ Group ##"],["Filter","Assigned + open + released / Purchasing Group Z##"],["Layout Name","L##"],["Layout Description","Layout Group ##"],["Breakdown","Fixed vendor / Purchase Requisition / PR Item"],["Additional Columns","Material / Short Text"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Purchase Order → Create → Vendor/Supplying Plant Known (ME21N)</b>'e gidin.","Gerekirse <b>(Close)</b> ile yardım alanını kapatın.","<b>Document Overview On</b>'a tıklayın.","<b>(Selection Variant)</b>'a tıklayın, ardından <b>Purchase Requisitions</b>'ı seçin.","<b>Assigned, open, and released</b> bayrağını seçin; Purchasing Group <b>Z##</b> girin; diğer tüm değerleri silin.","<b>(Save as Variant...)</b>'e tıklayın: Variant Name <b>SV##</b>, Description <b>PurchRequ Group ##</b>; <b>(Save)</b>'e tıklayın.","<b>(Execute)</b>'e tıklayın — Z## satın alma grubu talepleri görünür.","<b>(Change breakdown)</b>'a tıklayın: Column Set'ten <b>Fixed vendor</b>'ı, Sort Criteria'dan <b>Purchase Requisition</b>'ı seçin; <b>(Add sort criterion)</b> ve <b>(Transfer)</b>'e tıklayın.","Layout butonunun küçük üçgenine tıklayın: <b>Change layout…</b> → <b>Material</b>'ı seçin → <b>(Show Selected Fields)</b> → <b>Short Text</b> için aynısını yapın → <b>(Transfer)</b>.","Layout butonunun üçgenine tekrar tıklayın: <b>Save layout…</b> → Layout <b>L##</b>, Description <b>Layout Group ##</b>, <b>User-specific</b> seçin → <b>Save</b>."],info:null,warn:null,result:null},
{num:"2",title:"Convert T-S50A## Requisitions to Purchase Order",app:"SAP GUI – ME21N",path:["ME21N","Document Overview","Fixed Vendor T-S50A##","(Adopt)"],fields:[],steps:["Document Overview'da <b>Fixed Vendor T-S50A##</b> satırını seçin.","<b>(Adopt)</b> ikonuna tıklayın.","<b>(Save)</b>'e tıklayın; PO numarasını not edin.","ME21N işleminden çıkmayın."],info:null,warn:null,result:"PO başarıyla oluşturulur."},
{num:"3",title:"Check Processing Status of Converted Requisition",app:"SAP GUI – ME21N",path:["Document Overview","Purchase Requisition Number","Item Details","Status Tab"],fields:[["Processing Status","PO created"]],steps:["Document Overview'da dönüştürdüğünüz talep numarasını çift tıklayın.","B500-## (Oil tray 500/##) kalemi için item detail'i açın.","<b>Status</b> sekmesine tıklayın — işlem durumu <b>PO created</b> olmalıdır."],info:null,warn:null,result:"İşlem durumu: PO created."}
]},
{id:28,title:"Convert Purchase Requisitions Automatically to Purchase Order",app:"SAP GUI – MK02 / MM02 / ME59N / ME23N",sc:"T-S52A## tedarikçisine atanmış tüm talepler otomatik olarak PO'ya dönüştürülmeli.",tasks:[
{num:"1",title:"Check Automatic PO Indicator for Supplier T-S52A## (MK02)",app:"SAP GUI – MK02",path:["Logistics","Materials Management","Purchasing","Master Data","Vendor","Purchasing","Change Current (MK02)"],fields:[["── Header ──",""],["Supplier","T-S52A##"],["Purchasing Organization","101C"],["Purchasing Data","X"],["Change in BP role","FLVN01 Supplier (Maintained)"],["Automatic Purchase Order indicator","X (Already set)"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Master Data → Vendor → Purchasing → Change (Current) (MK02)</b>'ye gidin.","Supplier <b>T-S52A##</b>, Purchasing Organization <b>101C</b>, Purchasing Data <b>X</b> girin; <b>Enter</b>.","<b>Change in BP role</b> alanının <b>FLVN01 Supplier (Maintained)</b> olduğunu kontrol edin; değilse değiştirin.","<b>Purchasing</b>'e tıklayın.","<b>Purchasing Data</b> sekmesinde <b>Automatic Purchase Order</b> göstergesini kontrol edin — set edilmiş olmalıdır."],info:"Gösterge zaten işaretli durumdadır.",warn:null,result:null},
{num:"2",title:"Check Automatic PO Indicator in Material Master (MM02)",app:"SAP GUI – MM02",path:["Logistics","Materials Management","Material Master","Material","Change","Immediately (MM02)"],fields:[["── Materials ──",""],["Materials","A500-## / C500-## / D500-##"],["View","Purchasing"],["Plant","1010"],["Automatic PO","X (Set)"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Material Master → Material → Change → Immediately (MM02)</b>'ye gidin.","Material <b>A500-##</b> girin; <b>Enter</b>.","<b>Purchasing</b> görünümünü seçin; Plant <b>1010</b> girin; <b>Enter</b>.","<b>Automatic PO</b> göstergesini kontrol edin — set edilmiş olmalıdır.","İlk material için view seçimini ve org. levels'ı varsayılan olarak kaydedin.","C500-## ve D500-## için aynı adımları tekrarlayın."],info:"Tüm malzemelerde <b>Automatic PO</b> göstergesi işaretli olmalıdır.",warn:null,result:null},
{num:"3",title:"Automatic PO Conversion (ME59N)",app:"SAP GUI – ME59N",path:["Logistics","Materials Management","Purchasing","Purchase Requisition","Follow-On Functions","Create Purchase Order","Automatically via Purchase Requisitions (ME59N)"],fields:[["── Header ──",""],["Purchasing Group","Z##"],["Fixed Vendor","T-S52A##"],["New PO — Per Purchasing Group","Selected"],["Detailed Log","2 (All Messages)"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Purchase Requisition → Follow-On Functions → Create Purchase Order → Automatically via Purchase Requisitions (ME59N)</b>'ye gidin.","Tablodaki değerleri girin.","<b>(Execute)</b>'e tıklayın.","Fonksiyon tamamlandığında mesajları not edin.","PO numarasını not edin."],info:null,warn:null,result:"'Purchase order successfully created, Requisition successfully converted.' mesajı görüntülenir. PO numarasını not edin."},
{num:"4",title:"Check Reference Information and Contract Release in PO",app:"SAP GUI – ME23N",path:["Logistics","Materials Management","Purchasing","Purchase Order","Display (ME23N)"],fields:[["── Data ──",""],["PO Number","<Noted from ME59N>"],["PR Number (visible after scrolling right)","PR No. / PR Item visible"],["Outline Agreement","Contract number visible"],["%5 Header Condition","Conditions sekmesinde RA01 ile"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Purchasing → Purchase Order → Display (ME23N)</b>'e gidin.","<b>Purchase Order → Other Purchase Order</b>; PO numarasını girin ve <b>Other Document</b>'e tıklayın.","Item overview'da sağa kaydırın — <b>Purchase Requisition</b>, <b>Requisition Item</b> ve <b>Outline Agreement</b>, <b>Contract Item</b> kolonlarını görün.","Bir kalemin net fiyatını çift tıklayın — <b>Conditions</b> sekmesinde %5 header condition indirimi (RA01) görünür.","Sonraki adım için işlemden çıkmayın."],info:null,warn:null,result:"PO kalemlerinde PR numarası, sözleşme numarası ve %5 indirim görüntülenir."},
{num:"5",title:"Check Contract Release Documentation",app:"SAP GUI – ME23N",path:["ME23N","Item Overview","Contract Number","Item","Statistics","Release Documentation"],fields:[],steps:["Item overview'da sözleşme numarasını çift tıklayın — sözleşme açılır.","Bir sözleşme kalemini seçin.","<b>Item → Statistics → Release Documentation</b>'a gidin.","PO numarasının dokümantasyona eklendiğini doğrulayın."],info:null,warn:null,result:"Onay dokümantasyonu doğru şekilde güncellenmiştir."}
]},
{id:29,title:"Post Goods Receipt with Transaction for Goods Movements",app:"SAP GUI – MIGO_GR / MMBE",sc:"T-S50A## ve T-S52A## tedarikçileri malzemeleri teslim ediyor. Mal girişlerini MIGO ile kaydedin.",tasks:[
{num:"1",title:"Set Default Values in MIGO",app:"SAP GUI – MIGO_GR",path:["Logistics","Materials Management","Inventory Management","Goods Movement","GR for Purchase Order (MIGO_GR)","Settings","Default Values"],fields:[["── Data ──",""],["Storage Location","0001"],["Plant","1010"],["Propose the OK Function in Future","X"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Inventory Management → Goods Movement → GR for Purchase Order (MIGO_GR)</b>'ye gidin.","<b>Settings → Default Values</b>'a gidin.","Tablodaki değerleri girin.","<b>Adopt</b>'a tıklayın; ipucu mesajını <b>(Continue)</b> ile onaylayın.","İşlemden çıkmayın."],info:null,warn:null,result:null},
{num:"2",title:"Post Goods Receipt for T-S52A## Delivery",app:"SAP GUI – MIGO",path:["MIGO","Goods Receipt","Purchase Order","(Find Purch. Order)"],fields:[["── Settings ──",""],["Transaction","Goods Receipt"],["Reference Document","Purchase Order"],["Find PO – Vendor","T-S52A##"],["Find PO – Plant","1010 (NOT Supplying Plant)"],["Delivery Note","DN##06"],["Stock Type","Unrestricted-Use"],["Storage Location","0001 (Material)"]],steps:["Transaction <b>Goods Receipt</b>, reference document <b>Purchase Order</b>'ı seçin.","<b>(Find Purch. Order)</b>'a tıklayın.","Vendor <b>T-S52A##</b>, Plant <b>1010</b> girin (Supplying Plant değil!); <b>Find</b>'a tıklayın.","PO'nuzun tüm kalemlerini seçin; <b>(Adopt)</b>'a tıklayın.","Arama alanını <b>(Close Search Result)</b> ile kapatın.","<b>General</b> sekmesinde Delivery Note <b>DN##06</b>'yı girin.","Tüm kalemler için <b>OK</b> checkbox'larının seçili olduğunu kontrol edin.","Stok malzemeleri için Storage Location'ın <b>Material (0001)</b> olduğunu kontrol edin.","<b>Post</b>'a tıklayın; materyal belge numarasını not edin.","İşlemden çıkmayın."],info:null,warn:null,result:null},
{num:"3",title:"Review Material Document and Accounting Document",app:"SAP GUI – MIGO",path:["MIGO","Display","Material Document","(Execute)","Document info tab","FI Documents"],fields:[],steps:["<b>Display</b> transaction'ını seçin — <b>Material Document</b> referans belgesi ve son materyal belge numaranız otomatik önerilir.","<b>(Execute)</b>'e tıklayın.","Header data'da <b>Document info</b> sekmesine tıklayın.","<b>FI Documents</b>'a tıklayarak muhasebe belgesine gidin.","<b>List of Documents in Accounting</b> dialog'unda muhasebe belgesini çift tıklayın.","<b>(Back)</b> ile materyal belgesine dönün."],info:null,warn:null,result:null},
{num:"4",title:"Analyze B500-## Stock (Before Goods Receipt)",app:"SAP GUI – MMBE",path:["Logistics","Materials Management","Inventory Management","Environment","Stock","Stock Overview (MMBE)"],fields:[["── Data ──",""],["Material","B500-##"],["Plant","1010"],["Unrestricted use","10 PC"],["Quality inspection","0 PC"],["On-Order Stock","20 PC"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Inventory Management → Environment → Stock → Stock Overview (MMBE)</b>'ye gidin.","Material <b>B500-##</b>, Plant <b>1010</b> girin; <b>(Execute)</b>'e tıklayın.","Unrestricted-use, Quality inspection ve On-Order Stock değerlerini tablodaki beklenen değerlerle karşılaştırın."],info:null,warn:null,result:"Unrestricted use: 10 PC | Quality inspection: 0 PC | On-Order Stock: 20 PC"},
{num:"5",title:"Post Goods Receipt to B500-## Quality Inspection Stock",app:"SAP GUI – MIGO",path:["MIGO","Goods Receipt","Purchase Order","Item Detail","Where Tab","Quality Inspection Stock"],fields:[["── Data ──",""],["Material","B500-##"],["Supplier","T-S50A##"],["Delivery Note","DN##07"],["Plant","1010"],["Stock Type","Quality Inspection"],["Storage Location","0001"]],steps:["MIGO'da Goods Receipt, Purchase Order'ı seçin.","Kendi PO numaranızı girin (bilmiyorsanız: <b>(Find Purch. Order)</b> → material <b>B500-##</b>, vendor <b>T-S50A##</b>, plant <b>1010</b>).","<b>General</b> sekmesinde Delivery Note <b>DN##07</b>'yi girin.","Gerekirse item number'a tıklayarak item detayını açın.","<b>Where</b> sekmesinde Stock Type olarak <b>Quality Inspection</b>'ı seçin.","<b>Post</b>'a tıklayın; materyal belge numarasını not edin."],info:null,warn:null,result:"Materyal belgesi oluşturulur."},
{num:"6",title:"Analyze B500-## Stock (After Goods Receipt)",app:"SAP GUI – MMBE",path:["Logistics","Materials Management","Inventory Management","Environment","Stock","Stock Overview (MMBE)"],fields:[["── Data ──",""],["Material","B500-##"],["Plant","1010"],["Unrestricted use","10 PC"],["Quality inspection","20 PC"],["On-Order Stock","0 PC"]],steps:["<b>MMBE</b>'ye gidin; B500-##, Plant 1010.","Choose <b>(Execute)</b>; note the stock values."],info:null,warn:null,result:"Unrestricted use: 10 PC | Quality inspection: 20 PC | On-Order Stock: 0 PC"}
]},

{num:"1",title:"Enter Invoice via MIRO",app:"SAP GUI – MIRO",path:["Logistics","Materials Management","Logistics Invoice Verification","Document Entry","Enter Invoice (MIRO)"],fields:[["── Company Code Data ──",""],["Company Code","1010"],["Invoice Date","<Today's date>"],["Reference","IV##06"],["Amount","EUR 12,435.50"],["Tax Amount","EUR 1,130.50"],["Tax Code","1I (10% Input Tax (Training))"],["Reference Document Category","Delivery Note"],["Delivery Note","DN##06"]],steps:["SAP GUI'da <b>Logistics → Materials Management → Logistics Invoice Verification → Document Entry → Enter Invoice (MIRO)</b>'ya gidin.","Company Code <b>1010</b> girin ve <b>(Continue)</b>'ya basın.","<b>Basic Data</b> sekmesinde tablodaki verileri girin.","<b>PO Reference</b> sekmesinde referans belge kategorisi olarak <b>Delivery Note</b>'u seçin; Delivery Note <b>DN##06</b>'yı girin.","<b>(Enter)</b>'a basın — sistem PO verilerini önerir; bakiye sıfır olmalıdır.","<b>Simulate</b>'e tıklayın.","<b>Post</b>'a tıklayın; fatura belge numarasını not edin."],info:null,warn:null,result:"Fatura belgesi oluşturulur."},
{num:"2",title:"Display Invoice Document and PO History",app:"SAP GUI – MIRO",path:["MIRO","Invoice Document","Display","Show PO structure"],fields:[],steps:["<b>Invoice Document → Display</b>'i seçin; sistem son faturayı önerir.","<b>(Continue)</b>'ya tıklayın.","<b>Show PO structure</b>'a tıklayın — PO geçmişi gösterilir.","Alternatif: Item overview'da PO numarasını çift tıklayın; bir kalemin detail data'sında <b>Purchase Order History</b> sekmesini seçin."],info:null,warn:null,result:"PO geçmişi hem Goods Receipt hem de Invoice kaydını doğru şekilde gösterir."}
]}

{unit:8,title:"Automated Procurement Process",ex:[

{num:"2",title:"Create MRP Data",app:"Create Material",path:["Material Master","Create Material"],fields:[["── Data ──",""],["Material","E500-##"],["Views","MRP 1 + MRP 2"],["Plant","1010"],["MRP Type (MRP 1)","VB (Manual Reorder Point)"],["Reorder Point (MRP 1)","100 PC"],["MRP Controller (MRP 1)","0##"],["Lot Sizing Procedure (MRP 1)","FX (Fixed Lot Size)"],["Fixed Lot Size (MRP 1)","300 PC"],["Planned Delivery Time (MRP 2)","7 days"],["GR Processing Time (MRP 2)","1 day (should already be entered)"]],steps:["<b>Create Material</b> uygulamasını başlatın (tile grubu <b>Material Master</b>).","MRP verisi henüz oluşturulmadığı için <b>Change Material değil Create Material</b> kullanılmalıdır.","Material <b>E500-##</b> girin; <b>Continue</b>'ya basın — malzeme tipi ve sektörün kopyalanacağına dair mesajı <b>Continue</b> ile onaylayın.","<b>MRP 1</b> ve <b>MRP 2</b> görünümlerini seçin; <b>(Continue)</b>'ya basın.","Plant <b>1010</b> girin; <b>(Continue)</b>'ya basın.","MRP 1 görünümünde tablodaki verileri girin.","<b>MRP 2</b> sekmesine tıklayın; tablodaki verileri girin.","<b>Save</b>'e tıklayın."],info:null,warn:"MRP verisi henüz oluşturulmamışsa <b>Change Material</b> değil, <b>Create Material</b> kullanarak MRP 1 görünümünü ekleyin.",result:null}

{num:"2",title:"Display Stock/Requirements List",app:"Check Material Coverage",path:["MRP","Check Material Coverage"],fields:[["── Data ──",""],["Material","E500-##"],["Plant","1010"],["Shortage Definition","MRP Standard"]],steps:["<b>Check Material Coverage</b> uygulamasını açın (tile grubu <b>MRP</b>).","Tablodaki verileri girin ve <b>OK</b>'e tıklayın.","<b>Stock/Requirements List</b> sekmesinde: mevcut miktar 10 PC'nin reorder point olan 100 PC'nin altında olduğunu görün.","Listeden çıkmayın."],info:"Mevcut miktar (10 PC), yeniden sipariş noktasının (100 PC) altındadır — MRP yeni bir talep oluşturacaktır.",warn:null,result:null},

]},

{num:"1",title:"Verify T-S50C## Supplier Indicators and Set ERS",app:"Maintain Business Partner",path:["Supplier and BP","Maintain Business Partner"],fields:[["── Basic & Address Data ──",""],["Business Partner","T-S50C##"],["BP Role","FLVN01 (Supplier)"],["GR-Based Invoice Verification","X (in Purchasing Data – Control Data section — verify)"],["Automatic Purchase Order","X (Purchasing Data – Additional Purchasing Data — kontrol edin)"],["Eval. Receipt Settlement","X (Additional Purchasing Data — SET EDIN)"]],steps:["<b>Maintain Business Partner</b> uygulamasını başlatın (tile grubu <b>Supplier and BP</b>).","<b>T-S50C##</b> girin; <b>Start</b>'a tıklayın.","Tedarikçi numarasını çift tıklayın.","<b>Display in BP role</b> alanından <b>(arrow)</b>: <b>Supplier (FLVN01)</b>'i seçin.","<b>Purchasing</b>'e tıklayın (menü üstünde).","Purchasing Organization'ın <b>101C</b> olduğunu doğrulayın.","<b>Purchasing Data</b> sekmesinde <b>Control Data</b> bölümünde <b>GR-Based Invoice Verif.</b> göstergesini kontrol edin — set edilmiş olmalıdır.","<b>Additional Purchasing Data</b> bölümünde: <b>Automatic Purchase Order</b> set edilmiş; <b>Eval. Receipt Settlement</b> SET EDİLMEMİŞ.","<b>Switch Between Display and Change</b>'e tıklayın (menü üstünde).","<b>Additional Purchasing Data</b> bölümünde <b>Eval. Receipt Settlement</b> göstergesini işaretleyin.","<b>Save</b>'e tıklayın."],info:null,warn:null,result:null},
{num:"2",title:"Set Automatic PO Indicator in E500-## Material Master",app:"Change Material",path:["Material Master","Change Material"],fields:[["── Data ──",""],["Material","E500-##"],["View","Purchasing"],["Plant","1010"],["Automatic PO (Autom. PO)","X (Set edin)"]],steps:["<b>Change Material</b> uygulamasını başlatın (tile grubu <b>Material Master</b>).","Material <b>E500-##</b> girin; <b>Continue</b>'ya basın.","<b>Purchasing</b> görünümünü seçin; <b>Org. Levels</b>'a basın; Plant <b>1010</b> girin; <b>(Continue)</b>'ya basın.","<b>General Data</b> bölümünde <b>Autom. PO</b> göstergesini işaretleyin.","<b>Save</b>'e tıklayın."],info:null,warn:null,result:null},
{num:"3",title:"Create Purchase Order Automatically",app:"Automatic Creation of Purchase Orders from Requisitions",path:["SAP Fiori Search (üst sağ köşe)","Apps","Automatic Creation of Purchase Orders from Requisitions"],fields:[["── Selection Screen ──",""],["Purch. Organization","101C"],["Fixed Vendor","T-S50C##"],["New PO per Purchasing Group","Selected"],["Detailed Log","2 (All Messages)"]],steps:["SAP Fiori Search'te <b>Search In</b> alanını <b>Apps</b> olarak seçin.","<b>Automatic Creation of Purchase Orders from Requisitions</b> uygulamasını arayın; yeni sekmede açılır.","Tablodaki verileri girin.","<b>Execute</b>'e tıklayın.","Fonksiyon tamamlandığında mesajları not edin; PO numarasını not edin."],info:null,warn:null,result:"'Purchase order successfully created, Requisition successfully converted.' mesajı görüntülenir. PO numarasını not edin."}
]},

]}

{num:"1",title:"Create Analytics Tile Group",app:"SAP Fiori Launchpad",path:["SAP Fiori Launchpad","(Profile of Employee)","Edit Home Page","+ Add Group"],fields:[["── Settings ──",""],["Tile Group Name","Analytics"],["App 1 (Catalog: Purchasing Analytics)","Contract Expiry"],["App 2 (Catalog: Purchasing Analytics)","Off-Contract Spend"],["App 3 (Catalog: Purchasing Analytics)","Purchasing Group Activities"],["App 4 (Catalog: Purchasing – Procurement Overview Page)","Procurement Overview"]],steps:["Sağ üst köşede <b>(Profile of Employee)</b>'a tıklayın.","<b>Edit Home Page</b>'i seçin.","İstediğiniz konumda <b>+ Add Group</b>'a tıklayın; <b>Analytics</b> adını girin.","<b>(App Finder)</b>'a tıklayın.","Sol taraftan <b>Purchasing Analytics</b> kataloğunu seçin.","<b>Contract Expiry</b>, <b>Off-Contract Spend</b> ve <b>Purchasing Group Activities</b> uygulamalarını raptiyeleyin.","Sol taraftan <b>Purchasing – Procurement Overview Page</b> kataloğunu seçin.","<b>Procurement Overview</b> uygulamasını raptiyeleyin.","<b>(Navigate to Home)</b>'a tıklayarak geri dönün.","<b>Close</b> ile kişiselleştirme modundan çıkın."],info:null,warn:null,result:null},

{num:"3",title:"Create KPI Tile (Actual vs. Target)",app:"Contract Expiry",path:["Analytics","Contract Expiry","(Share)","Save as Tile"],fields:[["── Tile Configuration ──",""],["Tile Format","Actual vs. Target"],["Title","Contract Expiry"],["Subtitle","Actual vs. Target"],["Groups","Analytics"],["── KPI Settings ──",""],["Value Measure","Expiring Contracts"],["Goal Type","Minimizing"],["Critical Threshold","10"],["Warning Threshold","3"],["Target","0"]],steps:["<b>Contract Expiry</b> uygulamasını başlatın (tile grubu <b>Analytics</b>).","Sağ üst köşede <b>(Share)</b> ikonuna tıklayın.","<b>Save as Tile</b>'ı seçin.","Tablodaki verileri girin ve <b>OK</b>'e tıklayın.","SAP Fiori Launchpad ana sayfasına dönün; <b>F5</b> ile yenileyin.","<b>Analytics</b> tile grubunda yeni KPI tile'ını görün.","Tile'a tıklayarak uygulamayı açın; sonraki adım için uygulamada kalın."],info:null,warn:null,result:null},

{num:"5",title:"Analyze Off-Contract Spending",app:"Off-Contract Spend",path:["Analytics","Off-Contract Spend","(Add Filter): Calendar Year","By Purchasing Organization"],fields:[["── Filter Settings ──",""],["Filter: Calendar Year","Current year"],["View","By Purchasing Organization"],["Values for Purch. Org. 101C","Off Contract Spend Amount / Off Contract Spend %"]],steps:["<b>Off-Contract Spend</b> uygulamasını başlatın (tile grubu <b>Analytics</b>).","Filtre çubuğu kapalıysa <b>(Expand Header)</b>'a tıklayın.","<b>(Add Filter)</b>'e tıklayın; <b>Calendar Year</b>'ı seçin; cari yılı seçin ve <b>OK</b>.","Görünümü <b>By Purchasing Organization</b>'a değiştirin.","101C için <b>Off Contract Spend Amount</b> (mavi bar) ve <b>Off Contract Spend %</b> (turuncu bar) değerlerini not edin.","Sonraki adım için uygulamada kalın."],info:null,warn:null,result:null},
{num:"6",title:"Filter by Supplier",app:"Off-Contract Spend",path:["Off-Contract Spend","(Add Filter): Supplier","By Supplier"],fields:[["Supplier Filter","T-S50A## / T-S50C## / T-S52A##"]],steps:["<b>(Add Filter)</b>'e tıklayın; <b>Supplier</b>'ı seçin.","<b>(Search)</b>'e tıklayın; <b>T-S50A##</b>, <b>T-S50C##</b> ve <b>T-S52A##</b>'yi seçin; <b>OK</b>.","Görünümü <b>By Supplier</b>'a değiştirin.","Sözleşme kapsamı dışında harcaması olmayan tedarikçileri kontrol edin."],info:null,warn:null,result:"Sonuç, önceki egzersizlere göre değişir."}
]},

const colors={1:'#06b6d4',2:'#a855f7',3:'#60a5fa',4:'#f59e0b',5:'#22c55e',6:'#ef4444',7:'#fbbf24',8:'#34d399',9:'#818cf8'};
const UC=['u1','u2','u3','u4','u5','u6','u7','u8','u9'];

function path(a){if(!a||!a.length)return'';return'<div class="pr">'+a.map((p,i)=>`<span class="pc">${p}</span>${i<a.length-1?'<span class="pa">›</span>':''}`).join('')+'</div>';}

function tbl(f){
  if(!f||!f.length)return'';
  const rows=f.map(([a,b])=>{
    if(a.startsWith('──'))return`<tr class="fvt-sec"><td colspan="2">${a}</td></tr>`;
    return`<tr><td>${a}</td><td>${b}</td></tr>`;
  }).join('');
  return`<table class="fvt"><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function steps(s){
  if(!s||!s.length)return'';
  return'<ol class="sl">'+s.map(x=>`<li><span></span>${x}</li>`).join('')+'</ol>';
}

function task(t){
  const body=
    path(t.path)+
    (t.warn?`<div class="box warn"><span class="bi">⚠</span><div>${t.warn}</div></div>`:'')+
    (t.info?`<div class="box info"><span class="bi">ℹ</span><div>${t.info}</div></div>`:'')+
    tbl(t.fields)+
    steps(t.steps)+
    (t.result?`<div class="box result"><span class="bi">✓</span><div>${t.result}</div></div>`:'');
  return`<div class="task">
    <div class="thdiv" onclick="togTask(this)">
      <span class="tn">${t.num}</span>
      <span class="tt">${t.title}</span>
      ${t.app?`<span class="ab">${t.app}</span>`:''}
      <span class="task-chev">›</span>
    </div>
    <div class="task-body">${body}</div>
  </div>`;
}

function card(e,uid){
  const sc=e.tasks.reduce((a,t)=>a+(t.steps?t.steps.length:0),0);
  const tc=e.tasks.length;
  const body=e.tasks.map((t,i)=>task(t)+(i<e.tasks.length-1?'<div class="dv"></div>':'')).join('');
  return `<div class="card" id="ex-${e.id}"><div class="ch" onclick="toggle(this)"><span class="exn">EX ${e.id}</span><div class="cl"><div class="ct">${e.title}</div><div class="ca">${e.app}</div></div><div class="cr"><span class="sb">${tc} görev · ${sc} adım</span><span class="chev">›</span></div></div><div class="cb"><div class="scenario">${e.sc}</div>${body}</div></div>`;
}

function unit(u,i){
  const cls=UC[i]||'u1';
  return `<div class="ug collapsed ${cls}"><div class="uh" onclick="togUnit(this)"><span class="ubadge">Ünite ${u.unit}</span><span class="utitle">${u.title}</span><span class="uc">${u.ex.length} egzersiz</span><span class="uchev">›</span></div><div class="ug-body">${u.ex.map(e=>card(e,i)).join('')}</div></div>`;
}

// ── RENDER ──
document.getElementById('app').innerHTML=D.map((u,i)=>unit(u,i)).join('');

// ── BUILD FILTER BUTTONS ──
const USHORT=['Navigasyon','Org. Yapı','Plain Proc.','Master Data','Stock/Cons.','Self-Service','Adv. Trans.','Automated','Raporlama'];
const frow=document.getElementById('frow');
D.forEach(function(u,i){
  var b=document.createElement('button');
  b.className='fb';
  b.dataset.u=`u${u.unit}`;
  b.textContent='U'+u.unit+' · '+(USHORT[i]||u.title.split(' ')[0]);
  frow.appendChild(b);
});

// snapshot card body HTML for highlight restore
const origHTML=new Map();
document.querySelectorAll('.card').forEach(function(c){
  var cb=c.querySelector('.cb');
  if(cb) origHTML.set(c.id,cb.innerHTML);
});

// ── STATE ──
var activeU='all';
var expanded=false;
var searchActive=false;

// ── TOGGLE FUNCTIONS ──
function togTask(hdr){ hdr.parentElement.classList.toggle('open'); }
function togUnit(uh){ uh.closest('.ug').classList.toggle('collapsed'); }
function toggle(h){ h.parentElement.classList.toggle('open'); }

// ── EXPAND / COLLAPSE ALL ──
var xpb=document.getElementById('xpb');
xpb.addEventListener('click',function(){
  expanded=!expanded;
  document.querySelectorAll('.card:not(.hid)').forEach(function(c){
    c.classList.toggle('open',expanded);
    if(expanded) c.querySelectorAll('.task').forEach(function(t){ t.classList.add('open'); });
    else c.querySelectorAll('.task').forEach(function(t){ t.classList.remove('open'); });
  });
  xpb.textContent=expanded?'Tümünü Kapat':'Tümünü Aç';
  xpb.classList.toggle('active',expanded);
});

// ── SEARCH ELEMENTS ──
var searchEl=document.getElementById('search');
var clrBtn=document.getElementById('clr');
var cntEl=document.getElementById('cnt');
var nores=document.getElementById('nores');
// Search result panel — injected below toolbar
var srPanel=document.createElement('div');
srPanel.id='sr-panel';
document.getElementById('app').parentNode.insertBefore(srPanel, document.getElementById('app'));

function escRe(s){ return s.replace(/[.+?^${}()|[\]\\]/g,'\\$&'); }

// Highlight text nodes inside an element
function hlNode(node,re){
  var w=document.createTreeWalker(node,NodeFilter.SHOW_TEXT,null,false);
  var hits=[],n;
  while((n=w.nextNode())){
    if(n.parentElement.closest('mark')) continue;
    re.lastIndex=0;
    if(re.test(n.textContent)) hits.push(n);
  }
  hits.forEach(function(tn){
    var frag=document.createDocumentFragment(),last=0;
    tn.textContent.replace(re,function(m,o){
      frag.appendChild(document.createTextNode(tn.textContent.slice(last,o)));
      var mk=document.createElement('mark'); mk.textContent=m; frag.appendChild(mk);
      last=o+m.length;
    });
    frag.appendChild(document.createTextNode(tn.textContent.slice(last)));
    tn.parentNode.replaceChild(frag,tn);
  });
}

// ── SEARCH RESULT PANEL BUILDER ──
// Renders a flat list of matching tasks with full detail, bypassing accordion structure
function buildSearchPanel(q, re, unitFilter){
  srPanel.innerHTML='';
  if(!q) return;

  var results=[];
  D.forEach(function(unit){
    var uid='u'+unit.unit;
    if(unitFilter!=='all' && unitFilter!==uid) return;
    unit.ex.forEach(function(ex){
      ex.tasks.forEach(function(t){
        // searchable text: exercise title + app + task title + task app + fields + steps text
        var fieldsTxt=(t.fields||[]).map(function(f){ return f[0]+' '+f[1]; }).join(' ');
        var stepsTxt=(t.steps||[]).join(' ').replace(/<[^>]+>/g,' ');
        var txt=[ex.title, ex.app||'', ex.sc||'', t.title, t.app||'',
                 fieldsTxt, stepsTxt,
                 t.warn||'', t.info||'', t.result||''].join(' ');
        if(txt.toLowerCase().indexOf(q)>=0){
          results.push({unit:unit, ex:ex, task:t, uid:uid});
        }
      });
    });
  });

  if(results.length===0){ srPanel.innerHTML=''; return; }

  // Header bar
  var bar=document.createElement('div');
  bar.className='sr-bar';
  bar.innerHTML='<span class="sr-count"><b>'+results.length+'</b> eşleşen görev</span>'+
    '<button class="sr-close" onclick="clearSearch()">✕ Aramayı Temizle</button>';
  srPanel.appendChild(bar);

  // Result cards
  results.forEach(function(r){
    var t=r.task, ex=r.ex, u=r.unit;
    var c=({1:'#06b6d4',2:'#a855f7',3:'#60a5fa',4:'#f59e0b',5:'#22c55e',
             6:'#ef4444',7:'#fbbf24',8:'#34d399',9:'#818cf8'})[u.unit]||'#60a5fa';

    var div=document.createElement('div');
    div.className='sr-card';

    // Breadcrumb: Unit > Exercise > Task
    var bc='<div class="sr-bc">'+
      '<span class="sr-unit" style="color:'+c+';border-color:'+c+'40;background:'+c+'12">U'+u.unit+' · '+u.title+'</span>'+
      '<span class="sr-sep">›</span>'+
      '<span class="sr-exn">EX '+ex.id+' · '+hlStr(ex.title,re)+'</span>'+
      '<span class="sr-sep">›</span>'+
      '<span class="sr-tn">'+t.num+'</span>'+
    '</div>';

    // Task header
    var th='<div class="sr-th">'+
      '<span class="sr-tt">'+hlStr(t.title,re)+'</span>'+
      (t.app?'<span class="sr-ab">'+hlStr(t.app,re)+'</span>':'')+
    '</div>';

    // Scenario (from exercise)
    var sc=ex.sc?'<div class="sr-sc">'+hlStr(ex.sc,re)+'</div>':'';

    // Path
    var pathHtml='';
    if(t.path&&t.path.length){
      pathHtml='<div class="sr-path">'+t.path.map(function(p,i){
        return '<span class="sr-pc">'+hlStr(p,re)+'</span>'+(i<t.path.length-1?'<span class="sr-pa">›</span>':'');
      }).join('')+'</div>';
    }

    // Fields table
    var fieldsHtml='';
    if(t.fields&&t.fields.length){
      var rows=t.fields.map(function(f){
        if(f[0].startsWith('──'))
          return '<tr class="fvt-sec"><td colspan="2">'+hlStr(f[0],re)+'</td></tr>';
        return '<tr><td>'+hlStr(f[0],re)+'</td><td>'+hlStr(f[1],re)+'</td></tr>';
      }).join('');
      fieldsHtml='<table class="fvt"><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>'+rows+'</tbody></table>';
    }

    // Steps
    var stepsHtml='';
    if(t.steps&&t.steps.length){
      stepsHtml='<ol class="sl">'+t.steps.map(function(s){
        return '<li><span></span>'+hlStr(s,re)+'</li>';
      }).join('')+'</ol>';
    }

    // Boxes
    var boxes='';
    if(t.warn) boxes+='<div class="box warn"><span class="bi">⚠</span><div>'+hlStr(t.warn,re)+'</div></div>';
    if(t.info) boxes+='<div class="box info"><span class="bi">ℹ</span><div>'+hlStr(t.info,re)+'</div></div>';
    if(t.result) boxes+='<div class="box result"><span class="bi">✓</span><div>'+hlStr(t.result,re)+'</div></div>';

    div.innerHTML=bc+th+sc+pathHtml+
      (t.warn?'<div class="box warn"><span class="bi">⚠</span><div>'+hlStr(t.warn,re)+'</div></div>':'')+
      (t.info?'<div class="box info"><span class="bi">ℹ</span><div>'+hlStr(t.info,re)+'</div></div>':'')+
      fieldsHtml+stepsHtml+
      (t.result?'<div class="box result"><span class="bi">✓</span><div>'+hlStr(t.result,re)+'</div></div>':'');
    srPanel.appendChild(div);
  });
}

function hlStr(s,re){
  if(!s||!re) return s||'';
  re.lastIndex=0;
  return String(s).replace(re,function(m){ return '<mark>'+m+'</mark>'; });
}

function clearSearch(){
  searchEl.value='';
  run();
  searchEl.focus();
}

// ── MAIN RUN FUNCTION ──
function run(){
  var raw=searchEl.value.trim();
  var q=raw.toLowerCase();
  var re=raw?new RegExp(escRe(raw),'gi'):null;
  searchActive=!!raw;
  clrBtn.style.display=raw?'block':'none';

  if(raw){
    // ── SEARCH MODE: hide normal tree, show flat result panel ──
    document.getElementById('app').style.display='none';
    nores.style.display='none';
    buildSearchPanel(q, re, activeU);
    srPanel.style.display='block';
    // update counter = task count
    var cnt=srPanel.querySelectorAll('.sr-card').length;
    cntEl.textContent=String(cnt);
    if(cnt===0){
      srPanel.style.display='none';
      nores.style.display='block';
    }
    xpb.style.display='none';
  } else {
    // ── NORMAL MODE: restore tree, hide panel ──
    document.getElementById('app').style.display='';
    srPanel.style.display='none';
    srPanel.innerHTML='';
    nores.style.display='none';
    xpb.style.display='';

    // Apply unit filter only
    var shown=0;
    document.querySelectorAll('.ug').forEach(function(ug){
      var badge=ug.querySelector('.ubadge');
      var uNum=badge?badge.textContent.replace(/[^0-9]/g,''):'';
      var unitOk=(activeU==='all'||activeU===('u'+uNum)||activeU===uNum);
      if(!unitOk){ ug.classList.add('hid'); return; }
      ug.classList.remove('hid');
      // restore card visibility
      ug.querySelectorAll('.card').forEach(function(card){
        card.classList.remove('hid');
        shown++;
        // restore original HTML (remove stale highlights)
        var cb=card.querySelector('.cb');
        if(cb&&origHTML.has(card.id)) cb.innerHTML=origHTML.get(card.id);
        var hdr=card.querySelector('.ch');
        if(hdr){ hdr.querySelectorAll('mark').forEach(function(mk){ mk.replaceWith(document.createTextNode(mk.textContent)); }); hdr.normalize(); }
        // restore open state
        if(!expanded) card.classList.remove('open');
        else card.classList.add('open');
      });
    });
    cntEl.textContent=String(shown);
  }
}

// ── EVENTS ──
searchEl.addEventListener('input',run);
searchEl.addEventListener('keydown',function(e){
  if(e.key==='Escape'){ clearSearch(); }
});
clrBtn.addEventListener('click',function(){ clearSearch(); });

frow.addEventListener('click',function(e){
  var b=e.target.closest('.fb');
  if(!b) return;
  activeU=b.dataset.u;
  frow.querySelectorAll('.fb').forEach(function(x){ x.classList.remove('on'); });
  b.classList.add('on');
  run();
});

// ── INIT ──
run();

</script>
