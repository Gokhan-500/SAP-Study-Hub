<title>SAP S45250 – Consumption-Based Planning &amp; Forecasting Çözüm Ağacı</title>
<link rel="preconnect" href="https://fonts.googleapis.com">

<style>
:root{--bg:#0f172a;--bg2:#1e293b;--bg3:#263145;--border:#334155;--bh:#475569;--text:#e2e8f0;--tm:#94a3b8;--td:#64748b;--blue:#3b82f6;--bl:#60a5fa;--bbg:rgba(59,130,246,.10);--bbd:rgba(59,130,246,.30);--green:#22c55e;--gbg:rgba(34,197,94,.10);--gbd:rgba(34,197,94,.30);--yellow:#f59e0b;--ybg:rgba(245,158,11,.10);--ybd:rgba(245,158,11,.35);--red:#ef4444;--mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;}
*{box-sizing:border-box;margin:0;padding:0;}
body{background:var(--bg);color:var(--text);font-family:var(--sans);font-size:14px;line-height:1.6;min-height:100vh;}
header{background:linear-gradient(135deg,#0f1f3d 0%,#0f172a 60%);border-bottom:1px solid var(--border);padding:18px 32px 14px;position:relative;}
header .meta{display:flex;align-items:baseline;gap:12px;margin-bottom:3px;}
.cid{font-family:var(--mono);font-size:11px;color:var(--bl);background:var(--bbg);border:1px solid var(--bbd);padding:2px 8px;border-radius:4px;letter-spacing:.06em;}
header h1{font-size:19px;font-weight:600;letter-spacing:-.3px;}
.sub{font-family:var(--mono);font-size:11px;color:var(--td);letter-spacing:.04em;margin-top:2px;}
.sr{display:flex;gap:18px;margin-top:10px;flex-wrap:wrap;}
.st{display:flex;align-items:center;gap:5px;font-family:var(--mono);font-size:11px;color:var(--tm);}
.st .n{color:var(--bl);font-weight:600;}
#homebtn{position:absolute;top:18px;right:32px;font-family:var(--mono);font-size:11px;background:var(--bg2);color:var(--tm);border:1px solid var(--border);border-radius:5px;padding:5px 12px;cursor:pointer;transition:border-color .15s,color .15s;}
#homebtn:hover{border-color:var(--bbd);color:var(--bl);}
html{scroll-padding-top:120px;}
#toolbar{position:sticky;top:0;z-index:100;background:rgba(15,23,42,.97);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid var(--border);padding:8px 32px 10px;}
#search-row{display:grid;grid-template-columns:1fr auto auto;align-items:center;gap:8px;margin-bottom:7px;}
#search-wrap{position:relative;}
#search-wrap svg{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--td);pointer-events:none;width:13px;height:13px;}
#search{width:100%;font-family:var(--mono);font-size:12px;background:var(--bg2);color:var(--text);border:1px solid var(--border);border-radius:5px;padding:6px 30px 6px 29px;outline:none;transition:border-color .18s;}
#search:focus{border-color:var(--bbd);background:#1a2744;}
#search::placeholder{color:var(--td);}
#clr{position:absolute;right:7px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--td);cursor:pointer;font-size:13px;line-height:1;padding:2px;display:none;border-radius:3px;transition:color .15s;}
#clr:hover{color:var(--text);}
#sctr{font-family:var(--mono);font-size:11px;color:var(--tm);white-space:nowrap;text-align:right;}
#sctr b{color:var(--bl);font-weight:600;}
#xpb{font-family:var(--mono);font-size:11px;background:var(--bg2);color:var(--tm);border:1px solid var(--border);border-radius:4px;padding:5px 11px;cursor:pointer;white-space:nowrap;transition:border-color .15s,color .15s,background .15s;}
#xpb:hover{border-color:var(--bbd);color:var(--bl);background:var(--bbg);}
#xpb.active{border-color:var(--bbd);color:var(--bl);background:var(--bbg);}

#frow{display:flex;gap:5px;flex-wrap:wrap;}
.fb{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.05em;padding:3px 9px;border-radius:3px;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--bg3);color:var(--td);transition:all .15s;white-space:nowrap;}
.fb:hover{color:var(--text);border-color:var(--bh);}
.fb[data-u="all"]{border-color:var(--bh);color:var(--tm);}
.fb[data-u="all"].on{background:var(--bg2);border-color:var(--bh);color:var(--text);}
.fb[data-u="u2"].on{background:rgba(168,85,247,.15);color:#a855f7;border-color:rgba(168,85,247,.4);}
.fb[data-u="u3"].on{background:rgba(59,130,246,.15);color:#60a5fa;border-color:rgba(59,130,246,.4);}
.fb[data-u="u4"].on{background:rgba(245,158,11,.15);color:#f59e0b;border-color:rgba(245,158,11,.4);}
.fb[data-u="u5"].on{background:rgba(34,197,94,.15);color:#22c55e;border-color:rgba(34,197,94,.4);}
.fb[data-u="u6"].on{background:rgba(239,68,68,.15);color:#ef4444;border-color:rgba(239,68,68,.4);}
.fb[data-u="u7"].on{background:rgba(251,191,36,.15);color:#fbbf24;border-color:rgba(251,191,36,.4);}
.fb[data-u="u8"].on{background:rgba(52,211,153,.15);color:#34d399;border-color:rgba(52,211,153,.4);}
mark{background:rgba(245,158,11,.32);color:#fef08a;border-radius:2px;padding:0 2px;font-style:normal;}
#nores{display:none;max-width:1100px;margin:0 auto;text-align:center;padding:80px 20px;font-family:var(--mono);font-size:13px;color:var(--td);}
#nores .ico{display:block;font-size:34px;margin-bottom:12px;opacity:.3;}
#nores .hint{display:block;margin-top:8px;font-size:11px;color:var(--td);opacity:.7;}
.card.hid,.ug.hid{display:none;}
main{max-width:1100px;margin:0 auto;padding:26px 22px 60px;}
.ug{margin-bottom:34px;}
.uh{display:flex;align-items:center;gap:12px;margin-bottom:13px;padding-bottom:9px;border-bottom:1px solid var(--border);}
.ubadge{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.08em;padding:3px 10px;border-radius:3px;text-transform:uppercase;}
.utitle{font-size:15px;font-weight:600;}
.uc{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--td);}
.u2 .ubadge{background:rgba(6,182,212,.15);color:#06b6d4;border:1px solid rgba(6,182,212,.3);}
.u3 .ubadge{background:rgba(168,85,247,.15);color:#a855f7;border:1px solid rgba(168,85,247,.3);}
.u4 .ubadge{background:rgba(59,130,246,.15);color:var(--bl);border:1px solid var(--bbd);}
.u5 .ubadge{background:rgba(245,158,11,.15);color:var(--yellow);border:1px solid var(--ybd);}
.u6 .ubadge{background:rgba(34,197,94,.15);color:var(--green);border:1px solid var(--gbd);}
.u7 .ubadge{background:rgba(239,68,68,.15);color:var(--red);border:1px solid rgba(239,68,68,.3);}
.u8 .ubadge{background:rgba(251,191,36,.15);color:#fbbf24;border:1px solid rgba(251,191,36,.3);}
.card{background:var(--bg2);border:1px solid var(--border);border-radius:8px;margin-bottom:9px;overflow:hidden;transition:border-color .18s;}
.card:hover{border-color:var(--bh);}
.card.open{border-color:var(--bbd);}
.ch{display:flex;align-items:center;gap:13px;padding:13px 17px;cursor:pointer;user-select:none;}
.ch:hover{background:rgba(255,255,255,.02);}
.exn{font-family:var(--mono);font-size:10px;color:var(--td);min-width:28px;flex-shrink:0;}
.cl{flex:1;min-width:0;}
.ct{font-size:13.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.ca{font-family:var(--mono);font-size:10.5px;color:var(--td);margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.cr{display:flex;align-items:center;gap:9px;flex-shrink:0;}
.sb{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:20px;background:var(--bg3);color:var(--td);border:1px solid var(--border);white-space:nowrap;}
.chev{color:var(--td);font-size:12px;transition:transform .2s;flex-shrink:0;}
.card.open .chev{transform:rotate(90deg);}
.cb{display:none;padding:0 17px 17px;border-top:1px solid var(--border);}
.card.open .cb{display:block;}
.scenario{font-style:italic;color:var(--tm);font-size:13px;border-left:3px solid var(--bbd);padding:9px 13px;margin:13px 0;background:var(--bbg);border-radius:0 6px 6px 0;line-height:1.7;}
.task{margin-bottom:6px;border:1px solid var(--border);border-radius:6px;overflow:hidden;}
.task.open{border-color:var(--bbd);}
.thdiv{display:flex;align-items:center;gap:9px;padding:9px 13px;cursor:pointer;user-select:none;background:var(--bg3);transition:background .15s;}
.thdiv:hover{background:rgba(255,255,255,.04);}
.task-body{display:none;padding:12px 14px 14px;border-top:1px solid var(--border);}
.task.open .task-body{display:block;}
.task-chev{font-size:12px;color:var(--td);transition:transform .2s;flex-shrink:0;margin-left:auto;}
.task.open .task-chev{transform:rotate(90deg);}
.thdiv{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px;gap:9px;}
.tn{font-family:var(--mono);font-size:11px;color:var(--bl);font-weight:600;flex-shrink:0;}
.tt{font-size:13px;font-weight:500;flex:1;}
.ab{font-family:var(--mono);font-size:10px;padding:2px 9px;border-radius:4px;background:var(--bbg);color:var(--bl);border:1px solid var(--bbd);white-space:nowrap;flex-shrink:0;}
.pr{display:flex;align-items:center;flex-wrap:wrap;gap:0;margin:7px 0 9px;}
.pc{font-family:var(--mono);font-size:10.5px;background:var(--bg3);color:var(--tm);padding:3px 9px;border:1px solid var(--border);}
.pc:first-child{border-radius:4px 0 0 4px;}
.pc:last-child{border-radius:0 4px 4px 0;}
.pc:only-child{border-radius:4px;}
.pa{font-size:10px;color:var(--td);padding:0 1px;background:var(--bg3);border-top:1px solid var(--border);border-bottom:1px solid var(--border);height:25px;display:flex;align-items:center;}
.fvt{width:100%;border-collapse:collapse;margin:7px 0 11px;font-size:12.5px;}
.fvt th{font-family:var(--mono);font-size:10px;font-weight:600;letter-spacing:.06em;text-transform:uppercase;color:var(--td);background:var(--bg3);padding:5px 9px;border:1px solid var(--border);text-align:left;}
.fvt td{padding:5px 9px;border:1px solid var(--border);vertical-align:top;}
.fvt td:first-child{font-family:var(--mono);font-size:11.5px;color:var(--tm);background:rgba(30,41,59,.6);white-space:nowrap;}
.fvt td:last-child{color:var(--text);}
.fvt tr:hover td{background:rgba(255,255,255,.02);}
.sl{list-style:none;counter-reset:s;margin:7px 0;}
.sl li{counter-increment:s;display:flex;gap:9px;margin-bottom:5px;font-size:13px;color:var(--tm);line-height:1.6;}
.sl li::before{content:counter(s);font-family:var(--mono);font-size:10px;font-weight:600;color:var(--bl);background:var(--bbg);border:1px solid var(--bbd);border-radius:3px;padding:1px 5px;min-width:22px;text-align:center;flex-shrink:0;line-height:17px;margin-top:2px;}
.box{display:flex;gap:9px;padding:9px 12px;border-radius:6px;margin:9px 0;font-size:12.5px;line-height:1.6;}
.bi{font-size:14px;flex-shrink:0;margin-top:1px;}
.warn{background:var(--ybg);border:1px solid var(--ybd);color:#fde68a;}
.info{background:var(--bbg);border:1px solid var(--bbd);color:#bfdbfe;}
.result{background:var(--gbg);border:1px solid var(--gbd);color:#bbf7d0;}
.sl2{font-family:var(--mono);font-size:10px;letter-spacing:.07em;text-transform:uppercase;color:var(--td);margin:11px 0 5px;}
.dv{height:1px;background:var(--border);margin:13px 0;}
b{color:var(--text);font-weight:500;}
@media(max-width:600px){#toolbar{padding:8px 14px 9px;}#search-row{grid-template-columns:1fr auto;}#sctr{display:none;}main{padding:18px 12px 60px;}header{padding:14px 16px 12px;}#homebtn{top:14px;right:16px;}}

.fvt-sec td{font-family:var(--mono);font-size:10px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;color:var(--bl);background:rgba(59,130,246,.08);padding:4px 9px;border:1px solid var(--border);}
/* ── ÜNİTE ACCORDION ── */
.uh{cursor:pointer;user-select:none;transition:opacity .15s;}
.uh:hover{opacity:.85;}
.uchev{font-size:13px;color:var(--td);transition:transform .25s;flex-shrink:0;margin-left:8px;}
.ug.collapsed .uchev{transform:rotate(-90deg);}
.ug-body{transition:none;}
.ug.collapsed .ug-body{display:none;}</style>
</head>

{num:"T1",title:"Create L5250-## as Copy of A5250-##",app:"Create Material",path:["SAP Fiori Launchpad","Create Material"],fields:[["── Initial Screen ──",""],["Material","L5250-##"],["Material Type","Raw material"],["Industry sector","Mechanical Engineering"],["Copy from Material","A5250-##"],["── Views ──",""],["Views","Basic Data 1 / Purchasing / MRP 1 / MRP 2 / Accounting 1"],["── Org. Levels ──",""],["Plant","1010"],["Copy from Plant","1010"]],steps:["SAP Fiori Launchpad'de <b>Create Material</b> uygulamasını başlatın.","Material <b>L5250-##</b>, Copy from Material <b>A5250-##</b> girin; <b>Continue</b>.","View'leri seçin: <b>Purchasing, MRP 1, MRP 2, Accounting 1</b>; <b>Create views selected</b> seçin; <b>Org. Levels</b>.","Plant <b>1010</b>, Copy from Plant <b>1010</b> girin; <b>Continue</b>; uyarıyı onaylayın; <b>Continue</b>.","<b>Save</b>."],info:null,warn:null,result:null},
{num:"T2",title:"Test Lot-Size Variations — 6 Column Simulation",app:"Change Material + MRP-Individual Planning-Single Level",path:["SAP Fiori Launchpad","Change Material"],fields:[["── Value 1 — EX ──",""],["Lot Sizing","EX (Lot-for-lot)"],["Result","1 PR × 80 PC"],["── Value 2 — EX + Min 100 ──",""],["Min. Lot Size","100"],["Result","1 PR × 100 PC"],["── Value 3 — EX + Max 50 ──",""],["Max. Lot Size","50"],["Result","1 PR × 50 PC + 1 PR × 30 PC"],["── Value 4 — EX + Max 50 + Round 50 ──",""],["Max. Lot Size","50"],["Rounding Value","50"],["Result","2 PRs × 50 PC (both rounded up)"],["── Value 5 — HB + Max Stock 800 ──",""],["Lot Sizing","HB (Replenish to max stock level)"],["Maximum Stock Level","800"],["Result","1 PR × 800 PC"],["── Value 6 — HB + Max Stock 900 ──",""],["Maximum Stock Level","900"],["Rounding Profile","0001"],["Result","1 PR × 900 PC"]],steps:["Her sütun için: <b>Change Material</b> uygulamasını başlatın; L5250-## + MRP 1 görünümü + Plant 1010.","<b>MRP 1</b> sekmesinde <b>Lot-size data</b> bölümündeki alanları tabloya göre doldurun (diğer alanları temizleyin); <b>Save</b>.","Simülasyon için: <b>MRP-Individual Planning-Single Level</b> uygulamasını başlatın; Material <b>L5250-##</b>, Plant <b>1010</b>; <b>Display Results Prior to Saving</b> seçin.","<b>Enter</b>; uyarı mesajını onaylayın.","<b>Rec./reqd</b> kolonundaki sonuçları not edin; kaydetmeden başlangıç ekranına dönün.","Tüm sütunlar için tekrarlayın."],info:"Değer 1: Lot=<b>EX</b> | Değer 2: Lot=<b>EX</b>, Min=100 | Değer 3: Lot=<b>EX</b>, Max=50 | Değer 4: Lot=<b>EX</b>, Max=50, Yuvarlama=50 | Değer 5: Lot=<b>HB</b>, MaxStok=800 | Değer 6: Lot=<b>HB</b>, MaxStok=900, YuvarlamaProfili=0001",warn:"Her değişiklikten önce diğer Lot-size data alanlarının boş olduğundan emin olun.",result:"Sonuçlar: D1: 80 PC | D2: 100 PC | D3: 50+30 PC | D4: 2×50 PC | D5: 800 PC | D6: 900 PC"},
{num:"T3",title:"Optimal Lot Sizing with Price Scale — Rounding Profile Logic",app:"Analiz",path:[],fields:[["── Price Scale ──",""],["PO Qty 1","EUR 100/PC"],["PO Qty 100","EUR 80/PC"],["PO Qty 1000","EUR 68/PC"],["── Rounding Logic ──",""],["Above 80 PC","Round up to 100 (80×100/100 = break-even)"],["Above 850 PC","Round up to 1000 (68×1000/80 = break-even)"],["── Conclusion ──",""],["Recommendation","Use a rounding profile to optimize lot sizes"]],steps:["80 PC üzerindeki miktarları 100'e yuvarlamak karlıdır (80 × 100 EUR = 100 × 80 EUR).","850 PC üzerindeki miktarları 1000'e yuvarlamak karlıdır (68 × 1000 = 850 × 80).","Bu eşik değerleri yuvarlama profiline girilecek."],info:null,warn:null,result:"Yuvarlama profili (static) oluşturarak fiyat skalasından en iyi şekilde yararlanılır."},
{num:"T4",title:"Create Rounding Profile Z0## in Customizing and Test",app:"SAP GUI – SPRO (OWD1) + Change Material + MRP-Individual Planning-Single Level",path:["SAP GUI","Materials Management","Consumption-Based Planning","Planning","Lot-Size Calculation","Maintain Rounding Profile (OWD1)"],fields:[["── Rounding Profile Setup ──",""],["Rounding Profile","Z0##"],["Type","Static"],["Profile Name","Rounding Profile Z0##"],["── Threshold Values ──",""],["Threshold Value 1","80 → Rounding Value: 100"],["Threshold Value 2","850 → Rounding Value: 1000"],["── Test Settings ──",""],["Lot Sizing Procedure","HB (Replenish to max stock level)"],["Maximum Stock Level","80"],["Rounding Profile","Z0##"],["── Test Result ──",""],["MRP Result","1 PR × 100 PC (rounded up from 80 by profile)"]],steps:["SAP back-end sisteminde Customizing'e gidin: <b>Materials Management → Consumption-Based Planning → Planning → Lot-Size Calculation → Maintain Rounding Profile (OWD1)</b>.","Rounding Profile alanına <b>Z0##</b> girin; <b>Static</b>'i seçin.","Profile Name: <b>Rounding Profile Z0##</b>; tabloyu doldurun: 80→100, 850→1000.","<b>Save</b>.","Test için: <b>Change Material</b>'ı başlatın; L5250-## + MRP 1 + Plant 1010.","Lot Sizing Procedure <b>HB</b>, Maximum Stock Level <b>80</b>, Rounding Profile <b>Z0##</b>; <b>Save</b>.","<b>MRP-Individual Planning-Single Level</b>: L5250-##, Plant 1010, <b>Display Results Prior to Saving</b> seçin; <b>Enter</b>; onaylayın."],info:"Plant alanını boş bırakın — yuvarlama profilleri plant olmadan da tanımlanabilir.",warn:null,result:"Stok 20 PC, max stok 80 PC. Gereksinim = 60 PC. Eşik değere (80) göre 100'e yuvarlanır. Sonuç: 1 PR × 100 PC."}
]}
]},

{num:"T1",title:"Extend A5250-## for Plant 1020 (Berlin)",app:"Create Material",path:["SAP Fiori Launchpad","Create Material"],fields:[["── Initial Screen ──",""],["Material","A5250-##"],["Copy from Material","A5250-##"],["── Views ──",""],["Views","Purchasing / MRP 1 / MRP 2 / Accounting 1"],["Create views selected","X"],["── Org. Levels ──",""],["Plant (new)","1020"],["Copy from Plant","1010"],["Storage Location","101A"],["── MRP 1 View ──",""],["MRP Type","VB (Manual Reorder Point Planning)"],["Reorder Point","100 PC"],["Fixed Lot Size","400 PC"],["── MRP 2 View ──",""],["Safety Stock","20 PC"],["── Accounting 1 View ──",""],["Valuation Class","3001"]],steps:["SAP Fiori Launchpad'de <b>Create Material</b> uygulamasını başlatın.","Material <b>A5250-##</b>, Copy from <b>A5250-##</b>; <b>Continue</b>.","<b>Select Views(s)</b>'a tıklayın; <b>Purchasing, MRP 1, MRP 2, Accounting 1</b> seçin; <b>Create views selected</b> seçin.","<b>Org. Levels</b>: Plant <b>1020</b>, Stor.Loc. <b>101A</b>; Copy from: Plant <b>1010</b>, Stor.Loc. <b>101A</b>; <b>Continue</b>; profil mesajını onaylayın.","<b>MRP 1</b>: MRP Type <b>VB</b>, Reorder Point <b>100</b>, Fixed lot size <b>400</b> girin/kontrol edin.","<b>MRP 2</b>: Safety Stock'u <b>20</b> olarak değiştirin.","<b>Accounting 1</b>: Valuation class'ı <b>3001</b> olarak değiştirin.","<b>Save</b>."],info:null,warn:null,result:null},

{unit:6,title:"Performing Planning",ex:[
{id:5,title:"Execute a Planning Run for a Material",app:"Create Material / Manage Stock / Monitor Material Coverage Net/Individual Segments / Monitor Stock/Requirements List (MD04)",sc:"Monitor Material Coverage Net/Individual Segments uygulamasıyla malzeme durumu izlenecek ve MRP çalıştırılacak; ardından MD04 uygulaması test edilecektir.",tasks:[
{num:"T1",title:"Create Material Master Data (B5250-##)",app:"Create Material",path:["SAP Fiori Launchpad","Create Material"],fields:[["── Initial Screen ──",""],["Material","B5250-##"],["Material Type","Raw materials"],["Industry","Mechanical Engineering"],["Copy from Material","A5250-##"],["── Views ──",""],["Views","Purchasing / MRP 1 / MRP 2 / General Plant Data/Storage 1 / Accounting 1"],["── Org. Levels ──",""],["Plant","1010"],["Storage Location","101A"],["── Purchasing View ──",""],["Description","Raw material B5250-##"],["── MRP 1 View ──",""],["MRP Type","VB (Reorder Point Planning)"],["Reorder Point","200 PC"],["MRP Controller","0##"],["Lot Sizing Procedure","HB (Replenish to maximum stock level)"],["Maximum Stock Level","500 PC"],["── MRP 2 View (noted, no change) ──",""],["Procurement Type","F (External Procurement)"],["Safety Stock","10 PC"]],steps:["<b>Create Material</b>'ı başlatın; Material <b>B5250-##</b>, Copy from <b>A5250-##</b>; <b>Continue</b>.","View'leri seçin + <b>Create views selected</b>; <b>Org. Levels</b>: Plant <b>1010</b>/Copy <b>1010</b>, Stor.Loc. <b>101A</b>/Copy <b>101A</b>; <b>Continue</b>.","<b>Purchasing</b>: Descr. <b>Raw material B5250-##</b>; <b>Enter</b>.","<b>MRP 1</b>: MRP Type <b>VB</b>, Reorder Point <b>200</b>, MRP Controller <b>0##</b>, Lot Sizing <b>HB</b>, Maximum Stock Level <b>500</b>; <b>Enter</b>.","<b>MRP 2</b> değerlerini not edin (F / 10 PC); <b>Save</b>."],info:"<b>HB</b> = Maksimum Stok Seviyesine Tamamlama | Yeniden Sipariş Noktası = 200 | Maks. Stok = 500 → 50 PC stokla MRP sonucu: 500-50=450 PC",warn:null,result:null},
{num:"T2",title:"Post Initial Stock (B5250-##, Plant 1010, 50 PC)",app:"Manage Stock",path:["SAP Fiori Launchpad","Manage Stock"],fields:[["── Initial Screen ──",""],["Plant","Plant 1 DE (1010)"],["Material","B5250-##"],["── Stock Entry ──",""],["Storage Location","Std. storage 1 (101A)"],["Stock Type","Unrestricted-Use Stock"],["Special Stock Type","Standard Stock"],["Stock Change","Initial Entry"],["Quantity","50 PC"],["Document Date","Today's date"],["Posting Date","Today's date"]],steps:["<b>Manage Stock</b>'u arayın ve açın.","Plant <b>Plant 1 DE (1010)</b>, Material <b>B5250-##</b>; <b>Enter</b>.","<b>Std. storage 1 (101A)</b>'da Unrestricted-Use Stock butonuna tıklayın.","Tablodaki verileri girin; <b>Post</b>; <b>OK</b>."],info:null,warn:null,result:null},
{num:"T3",title:"Monitor Material Coverage and Run MRP",app:"Monitor Material Coverage - Net and Individual Segments",path:["SAP Fiori Launchpad","Monitor Material Coverage - Net and Individual Segments"],fields:[["── Area of Responsibility ──",""],["Plant","1010"],["MRP Controller","0##"],["── Coverage Analysis ──",""],["B5250-## First Shortage","Today (shortage persists for next 21 days)"],["Current Stock","50 PC"],["Safety Stock","80 PC — shortage of 30 PC"],["Planned Receipts","None"],["── MRP Run Result ──",""],["PR Created","1 purchase requisition × 450 PC"],["Calculation","Stock (50) < Reorder Point (200) → HB lot → Max stock (500) – current (50) = 450 PC"]],steps:["SAP Fiori Launchpad'de <b>Monitor Material Coverage - Net and Individual Segments</b> uygulamasını bulun ve açın.","<b>Welcome!</b> dialog'unda <b>OK</b>; <b>My Area of Responsibility</b>'de Plant 1DE (1010), MRP Controller 0## satırını seçin; <b>Assign</b>; <b>Back</b>.","<b>Go</b>'ya tıklayın — sorumluluk alanınızdaki malzemelerin kıtlık miktarları ve 21 günlük stok durumu görünür.","B5250-## satırını seçin; <b>Manage Materials</b>'e tıklayın — Manage Material Coverage'a yönlendirilirsiniz.","Sağ tarafta <b>Stock/Requirements List</b> sekmesinde durumu not edin (Stok: 50, Safety Stock: 10 → 30 PC eksiklik var).","Kullanıcı profilinizden <b>MRP Settings → MRP Run Parameters</b>'ı kontrol edin; <b>Cancel</b>; <b>OK</b>.","Sağ üstteki <b>Start MRP Run</b>'a tıklayın; 'MRP run in progress' mesajını bekleyin.","Stock/Requirements List'te 450 PC satın alma talebi oluşturulduğunu doğrulayın."],info:"Net Gereksinim: Stok (50) < Reorder Point (200) → MRP tetiklenir. HB lot boyutu: Max Stock (500) - Stok (50) = 450 PC. Not: Monitor Material Coverage, güvenlik stoğu (80 PC) nedeniyle bugün 30 PC eksiklik gösterir (50-80=-30).",warn:null,result:"1 satın alma talebi × 450 PC oluşturulur."},
{num:"T4",title:"Test Monitor Stock/Requirements List (MD04)",app:"Monitor Stock/Requirements List (MD04)",path:["SAP Fiori Launchpad","Monitor Stock / Requirements List (MRP tile group)"],fields:[["── Initial Screen ──",""],["Material","B5250-##"],["Plant","1010"],["── PR Update ──",""],["PR Quantity Changed To","700 PC"],["Valuation Price (if prompted)","EUR 10"],["── Firming Indicator ──",""],["Firming Indicator (*)","Set — manual change prevents MRP from overwriting"],["── Date Settings ──",""],["Date Displayed","Availability date"],["── Navigation Profile ──",""],["Profile Assigned","ZSCM001 (MRP controller)"]],steps:["SAP Fiori Launchpad'de <b>Monitor Stock / Requirements List</b> uygulamasını başlatın (MRP tile group). Veya Back-end: <b>Logistics → Materials Management → MRP → MRP → Evaluations → Stock/Reqmts List (MD04)</b>.","Material <b>B5250-##</b>, Plant <b>1010</b>; <b>Enter</b>.","Listede önceki adımda oluşturulan satın alma talebini görün. Ekrandan ayrılmayın.","Satın alma talebi için <b>Details of Element</b>'e tıklayın; <b>Change Element</b>; Quantities/Dates sekmesinde miktarı <b>700</b> olarak değiştirin; <b>Enter</b>; istenirse Valuation Price <b>10</b>; <b>Save</b>; <b>Refresh</b>.","Firming indicator (<b>*</b>) set edildiğini not edin — manuel değişiklik nedeniyle MRP bu talebi artık değiştiremez.","<b>Menu → Settings → User Settings</b>: <b>Dates</b> sekmesinde <b>Availability date</b> görüntülendiğini not edin.","<b>Display</b> sekmesinde <b>With header details for matl</b> seçin; <b>Continue</b>; header detayları görünür; <b>Collapse header details</b>.","<b>Menu → Environment → Navigation Profile → Assign</b>; Navigation profile <b>ZSCM001</b> seçin; <b>Save</b>; <b>Continue</b>."],info:"Firming indicator (*): Satın alma talebi manuel güncellendikten sonra otomatik set edilir. MRP bir sonraki çalışmada bu talebi değiştiremez.",warn:"Navigation profil atandıktan sonra MRP Live veya Sng-item seçeneklerini test edebilirsiniz ama planlama çalışması başlatmayın.",result:null}
]},

const UC=['u2','u3','u4','u5','u6','u7','u8'];

function path(a){if(!a||!a.length)return'';return'<div class="pr">'+a.map((p,i)=>`<span class="pc">${p}</span>${i<a.length-1?'<span class="pa">›</span>':''}`).join('')+'</div>';}

function tbl(f){
  if(!f||!f.length)return'';
  const rows=f.map(([a,b])=>{
    if(a.startsWith('──'))return`<tr class="fvt-sec"><td colspan="2">${a}</td></tr>`;
    return`<tr><td>${a}</td><td>${b}</td></tr>`;
  }).join('');
  return`<table class="fvt"><thead><tr><th>Field</th><th>Value</th></tr></thead><tbody>${rows}</tbody></table>`;
}

function steps(s){
  if(!s||!s.length)return'';
  return'<ol class="sl">'+s.map(x=>`<li><span></span>${x}</li>`).join('')+'</ol>';
}
function task(t){
  const body=
    path(t.path)+
    (t.warn?`<div class="box warn"><span class="bi">⚠</span><div>${t.warn}</div></div>`:'')+
    (t.info?`<div class="box info"><span class="bi">ℹ</span><div>${t.info}</div></div>`:'')+
    tbl(t.fields)+
    steps(t.steps)+
    (t.result?`<div class="box result"><span class="bi">✓</span><div>${t.result}</div></div>`:'');
  return`<div class="task">
    <div class="thdiv" onclick="togTask(this)">
      <span class="tn">${t.num}</span>
      <span class="tt">${t.title}</span>
      ${t.app?`<span class="ab">${t.app}</span>`:''}
      <span class="task-chev">›</span>
    </div>
    <div class="task-body">${body}</div>
  </div>`;
}
function card(e,uid){
let html=`<div class="card" id="ex${e.id}" data-u="${uid}">`;
html+=`<div class="ch" onclick="toggle(this)"><span class="exn">${e.id}</span><div class="cl"><div class="ct">${e.title}</div><div class="ca">${e.app}</div></div><div class="cr"><span class="sb">${e.tasks.length} Adım</span><span class="chev">›</span></div></div>`;
html+=`<div class="cb">`;
if(e.sc)html+=`<div class="scenario">${e.sc}</div>`;
e.tasks.forEach(t=>html+=task(t));
html+=`</div></div>`;
return html;
}

function unit(u,i){
const uid=`u${u.unit}`;
const colors={1:'#06b6d4',2:'#a855f7',3:'#60a5fa',4:'#f59e0b',5:'#22c55e',6:'#ef4444',7:'#fbbf24',8:'#34d399',9:'#818cf8'};
let h=`<div class="ug collapsed ${uid}" id="${uid}"><div class="uh" onclick="togUnit(this)"><span class="ubadge" style="border-color:${colors[i]}30;color:${colors[i]};background:${colors[i]}18">Unit ${u.unit}</span><span class="utitle">${u.title}</span><span class="uc">${u.ex.length} egzersiz</span><span class="uchev">›</span></div><div class="ug-body">`;
u.ex.forEach(e=>h+=card(e,uid));
h+=`</div>`;
return h;
}

const app=document.getElementById('app');
const frow=document.getElementById('frow');
const cnt=document.getElementById('cnt');
const TOTAL=D.reduce((a,u)=>a+u.ex.length,0);
cnt.textContent=TOTAL;

D.forEach((u,i)=>{
app.innerHTML+=unit(u,i);
const b=document.createElement('button');
b.className='fb';b.dataset.u=`u${u.unit}`;
b.textContent=`U${u.unit}: ${u.title.length>22?u.title.slice(0,22)+'…':u.title}`;
frow.appendChild(b);
});

function togTask(hdr){hdr.parentElement.classList.toggle('open');}
function togUnit(uh){
  uh.closest('.ug').classList.toggle('collapsed');
}
function toggle(h){
const c=h.parentElement;
c.classList.toggle('open');
}

let term='',filterU='all';
const srch=document.getElementById('search');
const clr=document.getElementById('clr');
const nores=document.getElementById('nores');
const xpb=document.getElementById('xpb');
let allOpen=false;

function hl(t,q){
  if(!q)return t;
  const r=new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`,'gi');
  return t.replace(r,'<mark>$1</mark>');
}
function run(){
const q=term.toLowerCase().trim();
let vis=0;
document.querySelectorAll('.ug').forEach(ug=>{
const uid=ug.id;
const uMatch=filterU==='all'||filterU===uid;
let uVis=false;
ug.querySelectorAll('.card').forEach(card=>{
if(!uMatch){card.classList.add('hid');return;}
const raw=card.querySelector('.ch').textContent+card.querySelector('.cb').innerHTML;
const m=!q||raw.toLowerCase().includes(q);
if(m){card.classList.remove('hid');vis++;uVis=true;}
else{card.classList.add('hid');}
});
ug.classList.toggle('hid',!uVis||!uMatch);
});
cnt.textContent=vis||(!q&&filterU==='all'?TOTAL:vis);
nores.style.display=(vis===0&&(q||filterU!=='all'))?'block':'none';
clr.style.display=q?'inline':'none';
}

srch.addEventListener('input',e=>{term=e.target.value;run();});
srch.addEventListener('keydown',e=>{if(e.key==='Escape'){term='';srch.value='';run();}});
clr.addEventListener('click',()=>{term='';srch.value='';run();srch.focus();});

frow.addEventListener('click',e=>{
const b=e.target.closest('.fb');
if(!b)return;
filterU=b.dataset.u;
document.querySelectorAll('.fb').forEach(x=>x.classList.remove('on'));
b.classList.add('on');
run();
});
document.querySelector('.fb[data-u="all"]').classList.add('on');

xpb.addEventListener('click',()=>{
allOpen=!allOpen;
document.querySelectorAll('.card:not(.hid)').forEach(c=>c.classList.toggle('open',allOpen));
xpb.textContent=allOpen?'Tümünü Kapat':'Tümünü Aç';
xpb.classList.toggle('active',allOpen);
});
</script>
</body>
</html>
